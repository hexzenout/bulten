<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | COMMAND CENTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;700;900&display=swap');

        :root { 
            --gold: #fbbf24; 
            --green: #10b981; 
            --red: #ef4444; 
            --orange: #f97316; 
            --bg: #050505; 
            --panel: #0c0c0e; 
            --border: #1f1f23; 
            --text: #fff; 
            --muted: #71717a; 
        }
        
        /* TEMEL YAPI */
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* SIDEBAR (NAVİGASYON) */
        .sidebar { 
            width: 260px; 
            background: #000; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
        }

        .brand { 
            padding: 25px 20px; 
            font-weight: 900; 
            color: var(--green); 
            border-bottom: 1px solid var(--border); 
            text-align: center; 
            font-size: 1.1em; 
            letter-spacing: 1px; 
        }

        .nav-item { 
            padding: 15px 20px; 
            cursor: pointer; 
            color: var(--muted); 
            font-weight: 700; 
            font-size: 0.85em; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #0a0a0a; 
            transition: 0.2s; 
        }

        .nav-item i { 
            margin-right: 12px; 
            font-size: 1.2em; 
            width: 20px; 
            text-align: center; 
        }

        .nav-item:hover { 
            background: #0a0a0a; 
            color: #fff; 
        }

        .nav-item.active { 
            background: rgba(16,185,129,0.05); 
            color: #fff; 
            border-left: 3px solid var(--green); 
        }

        /* ANA İÇERİK ALANI */
        .main { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .header { 
            padding: 12px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000; 
            border-bottom: 1px solid var(--border); 
        }

        .content { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
        }

        /* BÜLTEN VE LİG TASARIMI */
        .filter-row { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
            background: var(--panel); 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            align-items: center; 
        }

        .c-select { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 8px; 
            border-radius: 4px; 
            font-size: 0.75em; 
            font-weight: bold; 
            outline: none; 
            cursor: pointer; 
        }

        /* ÖZEL LİG DROPDOWN */
        .c-dropdown { 
            position: relative; 
            min-width: 280px; 
        }

        .c-drop-btn { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 8px 12px; 
            border-radius: 4px; 
            font-size: 0.75em; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        .c-drop-btn img { 
            width: 18px; 
            height: 13px; 
            margin-right: 8px; 
            border-radius: 2px; 
        }

        .c-drop-list { 
            display: none; 
            position: absolute; 
            top: 105%; 
            left: 0; 
            right: 0; 
            background: #0a0a0c; 
            border: 1px solid var(--border); 
            z-index: 1000; 
            max-height: 350px; 
            overflow-y: auto; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
        }

        .c-drop-item { 
            padding: 10px 12px; 
            font-size: 0.75em; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            border-bottom: 1px solid #161618; 
        }

        .c-drop-item:hover { background: #1f1f23; }
        .c-drop-item img { width: 18px; height: 13px; margin-right: 10px; }

        .league-head { 
            background: #1e293b; 
            padding: 10px 15px; 
            font-weight: 900; 
            font-size: 0.75em; 
            border: 1px solid #334155; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
        }

        .league-content { 
            border: 1px solid var(--border); 
            border-top: none; 
            margin-bottom: 15px; 
            background: #0a0a0c; 
        }

        .match-row { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            border-bottom: 1px solid #161618; 
            font-size: 0.8em; 
        }

        .m-teams { 
            font-weight: 700; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
        }

        .flag { 
            width: 18px; 
            height: 13px; 
            object-fit: cover; 
            border-radius: 2px; 
            margin-left: 10px; 
        }

        /* ÇOKLU EKRAN SİSTEMİ */
        .stream-layout-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: var(--panel);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .layout-btn {
            background: #1f1f23;
            color: var(--muted);
            border: 1px solid #333;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: 900;
            cursor: pointer;
        }

        .layout-btn.active {
            background: var(--green);
            color: #000;
            border-color: var(--green);
        }

        .stream-grid {
            display: none;
            gap: 10px;
            height: calc(100vh - 200px);
            width: 100%;
        }

        .stream-grid.active { display: grid; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }

        .stream-box {
            background: #000;
            border: 1px solid #222;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .stream-header {
            padding: 5px;
            background: #0a0a0c;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #1f1f23;
        }

        .stream-input {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 10px;
            padding: 4px;
            border-radius: 3px;
        }

        /* FİNANS MASTER PANEL */
        .fin-master-wrapper {
            display: none;
            grid-template-columns: 1fr 420px;
            gap: 20px;
            height: 100%;
        }

        .fin-master-wrapper.active { display: grid; }

        .fin-left {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-right: 5px;
        }

        /* ROLLING KARTLARI */
        .rolling-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .roll-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .roll-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--muted);
        }

        .roll-card.active::before { background: var(--green); }

        .roll-title {
            font-size: 0.55em;
            font-weight: 900;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .roll-goal {
            font-family: 'JetBrains Mono';
            font-size: 1.2em;
            font-weight: 900;
            color: var(--gold);
        }

        /* LEDGER TABLO */
        .excel-mini {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .excel-title-bar {
            padding: 15px;
            border-bottom: 1px solid #1f1f23;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-scroll {
            overflow-y: auto;
            max-height: 500px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.72em;
        }

        th {
            background: #111;
            padding: 12px;
            text-align: left;
            color: var(--muted);
            position: sticky;
            top: 0;
            border-bottom: 1px solid #222;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #161618;
            color: #eee;
        }

        /* FİNANS SAĞ PANEL (GRAFİK VE KPI) */
        .fin-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            flex-grow: 1;
            min-height: 400px;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .kpi-mini {
            background: #000;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }

        .kpi-mini span {
            display: block;
            font-size: 0.6em;
            color: var(--muted);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .kpi-mini b {
            font-family: 'JetBrains Mono';
            font-size: 1.1em;
            color: #fff;
        }

        .action-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
        }

        .op-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-main {
            background: var(--green);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">V19 CAPITAL</div>
        
        <div class="nav-item active" id="btn-f" onclick="switchMode('futbol', this)">
            <i class="fa-solid fa-futbol"></i> FUTBOL
        </div>
        <div class="nav-item" id="btn-b" onclick="switchMode('basketbol', this)">
            <i class="fa-solid fa-basketball" style="color:var(--orange)"></i> BASKET
        </div>
        
        <div class="nav-item" onclick="switchMode('stream', this)" style="color:var(--green); border-top:1px solid #111; margin-top:10px;">
            <i class="fa-solid fa-tv"></i> CANLI YAYIN
        </div>
        
        <div class="nav-item" onclick="switchMode('finance', this)" style="color:var(--gold);">
            <i class="fa-solid fa-chart-line"></i> USDT FİNANS
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="page-title" style="margin:0; font-size:1em; font-weight:900; letter-spacing:1px;">BÜLTEN RADARI</h2>
            <div id="h-wallet" style="font-family:'JetBrains Mono'; font-weight:900; color:var(--gold)">100.00 USDT</div>
        </div>

        <div class="content">
            
            <div id="v-bulletin">
                <div class="filter-row">
                    <select id="date-sel" class="c-select" onchange="render()"><option value="ALL">TÜM TARİHLER</option></select>
                    
                    <div class="c-dropdown" id="league-dropdown">
                        <div class="c-drop-btn" onclick="toggleLeagueDrop(event)">
                            <div id="league-drop-text">TÜM LİGLER</div>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="c-drop-list" id="league-drop-list"></div>
                    </div>
                </div>
                <div id="list-area"></div>
            </div>

            <div id="v-stream" style="display:none;">
                <div class="stream-layout-header">
                    <button class="layout-btn" id="l-1" onclick="setLayout(1)">TEK EKRAN</button>
                    <button class="layout-btn" id="l-2" onclick="setLayout(2)">2 EKRAN</button>
                    <button class="layout-btn" id="l-4" onclick="setLayout(4)">4 EKRAN</button>
                    <button class="layout-btn active" id="l-6" onclick="setLayout(6)">6 EKRAN</button>
                </div>
                <div id="stream-grid" class="stream-grid grid-6 active"></div>
            </div>

            <div class="fin-master-wrapper" id="v-finance">
                
                <div class="fin-left">
                    <div class="rolling-grid">
                        <div class="roll-card active">
                            <span class="roll-title">1 HAFTALIK</span>
                            <div class="roll-goal">$1.000</div>
                        </div>
                        <div class="roll-card">
                            <span class="roll-title">15 GÜNLÜK</span>
                            <div class="roll-goal">$5.000</div>
                        </div>
                        <div class="roll-card">
                            <span class="roll-title">30 GÜNLÜK</span>
                            <div class="roll-goal">$15.000</div>
                        </div>
                        <div class="roll-card">
                            <span class="roll-title">60 GÜNLÜK</span>
                            <div class="roll-goal">$40.000</div>
                        </div>
                        <div class="roll-card">
                            <span class="roll-title">90 GÜNLÜK</span>
                            <div class="roll-goal">$100.000</div>
                        </div>
                    </div>

                    <div class="excel-mini">
                        <div class="excel-title-bar">
                            <span style="font-weight:900; font-size:0.8em;">İŞLEM DEFTERİ (LEDGER)</span>
                            <div style="display:flex; gap:5px;">
                                <button class="layout-btn active" id="f-pend" onclick="setTableFilter('pend')">BEKLEYEN</button>
                                <button class="layout-btn" id="f-all" onclick="setTableFilter('all')">HEPSİ</button>
                            </div>
                        </div>
                        <div class="table-scroll">
                            <table id="fin-table"></table>
                        </div>
                    </div>
                </div>

                <div class="fin-right">
                    <div class="chart-card">
                        <span class="roll-title">BORSA PERFORMANS ANALİZİ</span>
                        <div id="chart"></div>
                    </div>

                    <div class="action-card">
                        <div class="kpi-row">
                            <div class="kpi-mini"><span>KASA</span><b id="k-wallet">100.00</b></div>
                            <div class="kpi-mini"><span>NET K/Z</span><b id="k-pnl">0.00</b></div>
                            <div class="kpi-mini"><span>BAŞARI</span><b id="k-wr">%0</b></div>
                        </div>
                        
                        <div class="op-input-group" style="margin-top:15px;">
                            <input type="text" id="b-name" class="c-select" placeholder="Operasyon Adı">
                            <div style="display:flex; gap:5px;">
                                <input type="number" id="b-amt" class="c-select" style="flex:1" placeholder="USDT">
                                <input type="number" id="b-odds" class="c-select" style="flex:1" placeholder="Oran">
                            </div>
                            <button onclick="addBet()" class="btn-main">OPERASYONU BAŞLAT</button>
                            <button onclick="setManual()" style="background:transparent; color:#444; border:none; cursor:pointer; font-size:0.6em; font-weight:bold;">KASAYI ELLE GÜNCELLE</button>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        // --- DEĞİŞKENLER VE VERİ TABANI ---
        let allData = [];
        let ligSayac = {};
        let activeSport = 'futbol';
        let curMode = 'bulletin';
        let selectedLeague = 'ALL';
        let tableFilter = 'pend';

        let wallet = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let history = JSON.parse(localStorage.getItem('v19_h')) || [100];
        let pending = JSON.parse(localStorage.getItem('v19_p')) || [];
        let ledger = JSON.parse(localStorage.getItem('v19_ledger')) || [];

        // --- TARİH VE BAYRAK ZEKASI ---
        function getFlag(ligAdi) {
            const str = ligAdi.toUpperCase();
            if(str.includes("TÜRKİYE") || str.includes("SUPER LIG") || str.includes("SÜPER LİG") || str.includes("BSL")) return "tr";
            if(str.includes("İNGİLTERE") || str.includes("PREMIER") || str.includes("CHAMPIONSHIP")) return "gb-eng";
            if(str.includes("İSPANYA") || str.includes("LA LIGA") || str.includes("LIGA ACB")) return "es";
            if(str.includes("ALMANYA") || str.includes("BUNDESLIGA") || str.includes("BBL")) return "de";
            if(str.includes("İTALYA") || str.includes("SERIE A") || str.includes("LEGA A")) return "it";
            if(str.includes("FRANSA") || str.includes("LIGUE 1") || str.includes("LNB PRO A")) return "fr";
            if(str.includes("HOLLANDA") || str.includes("EREDIVISIE")) return "nl";
            if(str.includes("PORTEKİZ") || str.includes("PRIMEIRA")) return "pt";
            if(str.includes("BREZİLYA") || str.includes("BRAZIL")) return "br";
            if(str.includes("ARJANTİN") || str.includes("ARGENTINA")) return "ar";
            if(str.includes("AMERİKA") || str.includes("MLS") || str.includes("NBA") || str.includes("WNBA") || str.includes("NCAA")) return "us";
            if(str.includes("RUSYA") || str.includes("VTB")) return "ru";
            if(str.includes("AVRUPA") || str.includes("CHAMPIONS") || str.includes("EUROPA") || str.includes("CONFERENCE") || str.includes("EUROLEAGUE") || str.includes("EUROCUP") || str.includes("BCL")) return "eu";
            return "un";
        }

        function formatTarih(dStr) {
            if(!dStr) return "";
            const parts = dStr.split('-');
            const dTarget = new Date(parts[0], parts[1] - 1, parts[2]);
            const dToday = new Date(); dToday.setHours(0,0,0,0);
            const diffDays = Math.round((dTarget - dToday) / (1000 * 60 * 60 * 24));
            if (diffDays === 0) return "BUGÜN";
            if (diffDays === 1) return "YARIN";
            const aylar = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
            return parseInt(parts[2]) + " " + aylar[parseInt(parts[1]) - 1];
        }

        // --- EKRAN VE MOD YÖNETİMİ ---
        function switchMode(mode, el) {
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            
            // Görünürlük ayarları
            document.getElementById('v-bulletin').style.display = (mode==='futbol'||mode==='basketbol') ? 'block':'none';
            document.getElementById('v-stream').style.display = (mode==='stream') ? 'block':'none';
            document.getElementById('v-finance').classList.toggle('active', mode==='finance');
            
            if(mode==='futbol'||mode==='basketbol') {
                activeSport = mode;
                document.getElementById('page-title').innerText = mode.toUpperCase() + " RADARI";
                buildFilters();
                render();
            }
            if(mode==='finance') {
                document.getElementById('page-title').innerText = "USDT FİNANSAL TERMİNAL";
                updateFinance();
                setTimeout(initChart, 200);
            }
            if(mode==='stream') {
                document.getElementById('page-title').innerText = "CANLI İZLEME MERKEZİ";
                if(!document.getElementById('stream-grid').innerHTML) setLayout(6);
            }
        }

        function setLayout(num) {
            const grid = document.getElementById('stream-grid');
            grid.className = `stream-grid active grid-${num}`;
            grid.innerHTML = "";
            document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`l-${num}`).classList.add('active');
            
            for(let i=1; i<=num; i++) {
                grid.innerHTML += `
                <div class="stream-box">
                    <div class="stream-header">
                        <input id="in-${i}" class="stream-input" placeholder="Yayın linkini yapıştır...">
                        <button class="stream-btn" onclick="document.getElementById('fr-${i}').src=document.getElementById('in-${i}').value">İZLE</button>
                    </div>
                    <iframe id="fr-${i}" style="flex:1; border:none; background:#000;" src="about:blank" allowfullscreen></iframe>
                </div>`;
            }
        }

        // --- VERİ ÇEKME VE LİSTELEME ---
        async function load() {
            try {
                const r = await fetch('v19_rapor.json?t='+Date.now());
                const d = await r.json();
                allData = d.veriler || [];
                ligSayac = d.sayac || {};
                buildFilters();
                render();
            } catch(e) { console.error("Veri yüklenemedi"); }
        }

        function buildFilters() {
            const dSel = document.getElementById('date-sel');
            const dates = [...new Set(allData.filter(m => m.t === activeSport).map(m => m.dt))].sort();
            dSel.innerHTML = '<option value="ALL">TÜM TARİHLER</option>' + dates.map(d => `<option value="${d}">${formatTarih(d)}</option>`).join('');
            
            let ligHtml = `<div class="c-drop-item" onclick="selectLeague('ALL', 'TÜM LİGLER')">TÜM LİGLER</div>`;
            for(let l in ligSayac) {
                // Lig ayrımı (Futbol / Basketbol)
                let isF = ["LİG", "PREMIER", "BUNDESLIGA", "SERIE A", "LIGUE 1", "CHAMPIONS", "EUROPA", "CONFERENCE", "CHAMPIONSHIP", "MLS", "EREDIVISIE"].some(x => l.toUpperCase().includes(x));
                if((activeSport==='futbol' && isF) || (activeSport==='basketbol' && !isF)) {
                    const f = getFlag(l);
                    const ikon = activeSport==='futbol'?'⚽':'🏀';
                    ligHtml += `<div class="c-drop-item" onclick="selectLeague('${l}', this.innerHTML)"><img src="https://flagcdn.com/w40/${f}.png"> ${ikon} ${l} (${ligSayac[l]})</div>`;
                }
            }
            document.getElementById('league-drop-list').innerHTML = ligHtml;
        }

        function render() {
            if(curMode === 'finance' || curMode === 'stream') return;
            const area = document.getElementById('list-area');
            const dVal = document.getElementById('date-sel').value;
            let filtered = allData.filter(m => m.t === activeSport && (dVal === 'ALL' || m.dt === dVal) && (selectedLeague === 'ALL' || m.l === selectedLeague));
            
            let html = "";
            const days = {};
            filtered.forEach(m => { if(!days[m.dt]) days[m.dt]=[]; days[m.dt].push(m); });
            
            Object.keys(days).sort().forEach(day => {
                html += `<div style="color:var(--green); font-size:0.7em; font-weight:900; padding:15px 0 5px 0; border-bottom:1px solid #1f1f23; margin-bottom:10px;">${formatTarih(day)}</div>`;
                const groups = {}; 
                days[day].forEach(m => { if(!groups[m.l]) groups[m.l]=[]; groups[m.l].push(m); });
                
                // Kronolojik lig sıralaması
                let sortedL = Object.keys(groups).sort((a,b) => {
                    let minA = groups[a].reduce((m, x) => x.tm < m ? x.tm : m, "23:59");
                    let minB = groups[b].reduce((m, x) => x.tm < m ? x.tm : m, "23:59");
                    return minA.localeCompare(minB);
                });

                sortedL.forEach(l => {
                    const f = getFlag(l);
                    const uid = `lg_${day}_${l.replace(/[^a-zA-Z]/g, '')}`;
                    html += `
                        <div class="league-head" onclick="toggleL('${uid}', this)">
                            <div class="head-left"><span>${activeSport==='futbol'?'⚽':'🏀'} ${l}</span></div>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </div>
                        <div id="${uid}" class="league-content">`;
                    
                    groups[l].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                        html += `
                        <div class="match-row">
                            <div class="m-time" style="width:50px">${m.tm}</div>
                            <div class="m-teams">${m.m} <img src="https://flagcdn.com/w40/${f}.png" class="flag"></div>
                        </div>`;
                    });
                    html += `</div>`;
                });
            });
            area.innerHTML = html;
        }

        // --- FİNANSAL İŞLEMLER ---
        function updateFinance() {
            document.getElementById('k-wallet').innerText = wallet.toFixed(2);
            document.getElementById('h-wallet').innerText = wallet.toFixed(2) + " USDT";
            const net = ledger.reduce((a,b)=>a+b.pnl, 0);
            document.getElementById('k-pnl').innerText = (net >= 0 ? "+":"") + net.toFixed(2);
            document.getElementById('k-pnl').style.color = net>=0 ? 'var(--green)':'var(--red)';
            
            const wins = ledger.filter(x => x.res==='win').length;
            const total = ledger.filter(x => x.res==='win' || x.res==='loss').length;
            document.getElementById('k-wr').innerText = total > 0 ? "%" + ((wins/total)*100).toFixed(1) : "%0";
            
            renderTable();
        }

        function setTableFilter(f) {
            tableFilter = f;
            document.getElementById('f-pend').classList.toggle('active', f==='pend');
            document.getElementById('f-all').classList.toggle('active', f==='all');
            renderTable();
        }

        function renderTable() {
            const table = document.getElementById('fin-table');
            let h = `<tr><th>Tarih</th><th>İşlem</th><th>Miktar</th><th>Durum</th></tr>`;
            const items = tableFilter === 'pend' ? pending : ledger;
            
            if(items.length === 0) h += `<tr><td colspan="4" style="text-align:center; padding:20px; color:#444">Kayıt yok.</td></tr>`;
            
            items.forEach(i => {
                const date = new Date(i.id).toLocaleDateString();
                let status = `<span style="color:var(--muted)">BEKLİYOR</span>`;
                if(i.res==='win') status = `<b style="color:var(--green)">KAZANÇ</b>`;
                if(i.res==='loss') status = `<b style="color:var(--red)">KAYIP</b>`;

                h += `<tr>
                    <td style="font-family:monospace">${date}</td>
                    <td>${i.name}</td>
                    <td style="font-family:monospace">$${i.amt}</td>
                    <td>${status}`;
                if(tableFilter==='pend') {
                    h += ` <button onclick="resolve(${i.id}, 'win')" style="background:var(--green); border:none; cursor:pointer; margin-left:10px; border-radius:2px; font-weight:bold;">W</button>
                           <button onclick="resolve(${i.id}, 'loss')" style="background:var(--red); border:none; cursor:pointer; border-radius:2px; font-weight:bold; color:#fff;">L</button>`;
                }
                h += `</td></tr>`;
            });
            table.innerHTML = h;
        }

        function addBet() {
            const n = document.getElementById('b-name').value;
            const a = parseFloat(document.getElementById('b-amt').value);
            const o = parseFloat(document.getElementById('b-odds').value);
            if(!n || !a || !o) return;
            pending.push({ id: Date.now(), name: n, amt: a, odds: o });
            save(); updateFinance();
            document.getElementById('b-name').value = "";
        }

        function resolve(id, res) {
            const b = pending.find(x => x.id === id);
            let pnl = res==='win' ? (b.amt*b.odds)-b.amt : -b.amt;
            wallet += pnl; history.push(wallet);
            ledger.unshift({...b, res, pnl});
            pending = pending.filter(x => x.id !== id);
            save(); updateFinance(); initChart();
        }

        function setManual() {
            const v = parseFloat(document.getElementById('m-val').value);
            if(!v) return; wallet = v; history.push(wallet);
            save(); updateFinance(); initChart();
        }

        function save() {
            localStorage.setItem('v19_w', wallet);
            localStorage.setItem('v19_h', JSON.stringify(history));
            localStorage.setItem('v19_p', JSON.stringify(pending));
            localStorage.setItem('v19_ledger', JSON.stringify(ledger));
        }

        // --- GRAFİK ---
        let chart;
        function initChart() {
            if(chart) chart.destroy();
            chart = new ApexCharts(document.querySelector("#chart"), {
                series: [{ name: "KASA", data: history }],
                chart: { type: 'area', height: '100%', toolbar: { show: false }, background: 'transparent', animations: { enabled: true, speed: 600 } },
                theme: { mode: 'dark' },
                colors: [wallet >= history[0] ? '#10b981' : '#ef4444'],
                stroke: { curve: 'straight', width: 2 },
                xaxis: { labels: { show: false } },
                yaxis: { opposite: true, labels: { style: { colors: '#71717a', fontSize: '10px' } } },
                grid: { borderColor: '#222', strokeDashArray: 4 },
                annotations: { yaxis: [
                    { y: 1000, borderColor: '#333', label: { text: '$1K' } },
                    { y: 10000, borderColor: '#fbbf24', label: { text: '$10K' } },
                    { y: 100000, borderColor: '#10b981', label: { text: '$100K' } }
                ]}
            });
            chart.render();
        }

        // --- YARDIMCI ---
        function toggleL(id, el) {
            const c = document.getElementById(id);
            const icon = el.querySelector('.chevron');
            const isH = c.style.display === 'none';
            c.style.display = isH ? 'block' : 'none';
            icon.style.transform = isH ? 'rotate(0deg)' : 'rotate(-90deg)';
        }

        function toggleLeagueDrop(e) { e.stopPropagation(); const l = document.getElementById('league-drop-list'); l.style.display = l.style.display==='block'?'none':'block'; }
        function selectLeague(val, txt) { selectedLeague=val; document.getElementById('league-drop-text').innerHTML=txt; document.getElementById('league-drop-list').style.display='none'; render(); }
        document.addEventListener('click', () => { if(document.getElementById('league-drop-list')) document.getElementById('league-drop-list').style.display='none'; });

        load();
    </script>
</body>
</html>
