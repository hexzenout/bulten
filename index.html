<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | SUPREME TERMINAL OMEGA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <style>
        /* V19 SUPREME STYLING SYSTEM v6.0 
           DETAYLI TASARIM PARAMETRELERİ
        */
        
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');

        :root { 
            --gold: #fbbf24; 
            --gold-glow: rgba(251, 191, 36, 0.25);
            --green: #10b981; 
            --green-dark: #065f46;
            --green-glow: rgba(16, 185, 129, 0.15);
            --red: #ef4444; 
            --red-glow: rgba(239, 68, 68, 0.2);
            --orange: #f97316; 
            --orange-glow: rgba(249, 115, 22, 0.25);
            --bg: #050505; 
            --panel: #0c0c0e; 
            --panel-header: #121214;
            --panel-light: #18181b;
            --border: #1f1f23; 
            --border-bright: #2d2d33;
            --text: #ffffff; 
            --text-dim: #a1a1aa;
            --muted: #52525b;
            --sidebar-w: 280px;
            --transition-fast: all 0.2s ease;
            --transition-slow: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- GLOBAL RESET & SCROLLBARS --- */
        * { 
            box-sizing: border-box; 
            outline: none; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        body { 
            width: 100vw;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR OPERASYONEL MENÜ --- */
        .sidebar { 
            width: var(--sidebar-w); 
            background: #000; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            z-index: 1000;
            position: relative;
        }

        .brand-section { 
            padding: 45px 25px; 
            border-bottom: 1px solid var(--border); 
            text-align: center;
            background: linear-gradient(to bottom, #080808, #000);
            position: relative;
        }

        .brand-text { 
            font-weight: 900; 
            color: var(--green); 
            font-size: 1.5em; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            text-shadow: 0 0 25px var(--green-glow);
        }
        
        .brand-sub {
            font-size: 0.55em;
            color: var(--muted);
            margin-top: 10px;
            letter-spacing: 3px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .nav-container { 
            padding: 25px 0; 
            flex-grow: 1; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-link { 
            padding: 17px 35px; 
            cursor: pointer; 
            color: var(--muted); 
            font-weight: 700; 
            font-size: 0.88em; 
            display: flex; 
            align-items: center; 
            transition: var(--transition-fast);
            border-left: 5px solid transparent;
            margin-bottom: 2px;
            position: relative;
        }

        .nav-link i { 
            margin-right: 20px; 
            font-size: 1.4em; 
            width: 25px; 
            text-align: center; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-link:hover { 
            background: rgba(255,255,255,0.03); 
            color: #fff; 
            padding-left: 45px;
        }
        
        .nav-link:hover i {
            transform: scale(1.2);
            color: #fff;
        }

        /* DİNAMİK MENÜ RENKLERİ */
        .nav-link.active { 
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.12) 0%, transparent 100%); 
            color: #fff; 
            border-left-color: var(--green); 
        }

        .nav-link.basket.active { 
            background: linear-gradient(90deg, rgba(249, 115, 22, 0.12) 0%, transparent 100%);
            border-left-color: var(--orange); 
        }

        .nav-link.stream.active { 
            background: linear-gradient(90deg, rgba(251, 191, 36, 0.12) 0%, transparent 100%);
            border-left-color: var(--gold); 
        }

        .nav-link.favs.active { 
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.12) 0%, transparent 100%);
            border-left-color: var(--red); 
        }

        .nav-link.finance.active { 
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.12) 0%, transparent 100%);
            border-left-color: var(--green); 
        }

        /* --- MAIN VIEWPORT MİMARİSİ --- */
        .main-viewport { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }

        .top-status-bar { 
            padding: 0 45px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000; 
            border-bottom: 1px solid var(--border); 
            height: 90px;
            flex-shrink: 0;
            z-index: 500;
        }

        .console-label {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .console-label h2 { 
            margin: 0; 
            font-size: 1.25em; 
            font-weight: 950; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: #fff; 
        }
        
        .console-label span {
            font-size: 0.6em;
            color: var(--muted);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header-wallet {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 14px 28px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .header-wallet label { 
            font-size: 0.65em; 
            color: var(--muted); 
            font-weight: 950; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }

        .header-wallet b { 
            font-family: 'JetBrains Mono'; 
            color: var(--gold); 
            font-size: 1.3em; 
            font-weight: 900; 
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .main-scroll-box { 
            flex-grow: 1; 
            padding: 40px; 
            overflow-y: auto; 
            background: radial-gradient(circle at 50% 0%, #0c0c0e 0%, #050505 100%); 
            position: relative;
        }

        /* --- RADAR KONTROL PANELİ --- */
        .controls-wrapper { 
            margin-bottom: 35px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .filter-panel { 
            display: flex; 
            gap: 20px; 
            background: var(--panel); 
            padding: 18px; 
            border-radius: 14px; 
            border: 1px solid var(--border); 
            align-items: center; 
        }

        .mode-row { 
            display: flex; 
            gap: 15px; 
        }

        .btn-mode-supreme { 
            background: transparent; 
            border: 2.5px solid var(--orange); 
            color: var(--orange); 
            padding: 12px 35px; 
            border-radius: 10px; 
            font-size: 0.8em; 
            font-weight: 950; 
            cursor: pointer; 
            transition: var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-mode-supreme.active { 
            background: var(--orange); 
            color: #000; 
            box-shadow: 0 0 30px var(--orange-glow);
            transform: translateY(-2px);
        }

        .select-supreme { 
            background: #000; 
            border: 2px solid var(--border); 
            color: #fff; 
            padding: 14px 20px; 
            border-radius: 10px; 
            font-size: 0.9em; 
            font-weight: 800; 
            cursor: pointer; 
            min-width: 240px; 
            transition: all 0.3s;
        }
        
        .select-supreme:hover { border-color: var(--muted); }

        /* --- CUSTOM LEAGUE DROPDOWN PRO --- */
        .league-drop-wrapper { position: relative; min-width: 360px; }

        .league-drop-trigger { 
            background: #000; 
            border: 2px solid var(--border); 
            color: #fff; 
            padding: 14px 25px; 
            border-radius: 10px; 
            font-size: 0.9em; 
            font-weight: 900; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            transition: all 0.3s;
        }

        .league-drop-trigger:hover { border-color: var(--gold); background: #080808; }
        
        .league-drop-menu { 
            display: none; 
            position: absolute; 
            top: 120%; 
            left: 0; 
            right: 0; 
            background: #0a0a0c; 
            border: 1px solid var(--border-bright); 
            z-index: 5000; 
            max-height: 500px; 
            overflow-y: auto; 
            border-radius: 12px; 
            box-shadow: 0 40px 80px rgba(0,0,0,1);
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .league-drop-item { 
            padding: 16px 25px; 
            font-size: 0.9em; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            border-bottom: 1px solid #161618; 
            color: #ddd;
            transition: 0.2s;
            font-weight: 600;
        }

        .league-drop-item:hover { 
            background: #1c1c21; 
            color: var(--gold); 
            padding-left: 35px; 
        }

        .league-drop-item img { 
            width: 24px; 
            height: 16px; 
            margin-right: 18px; 
            border-radius: 3px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- RADAR LİSTE MİMARİSİ --- */
        .league-card-pro { 
            margin-bottom: 30px; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            background: var(--panel); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .league-header-bar { 
            background: linear-gradient(90deg, #1e293b 0%, #161e2b 100%); 
            padding: 18px 30px; 
            font-weight: 950; 
            font-size: 0.8em; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer;
            border-bottom: 2px solid #334155;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .fav-star-icon { 
            font-size: 1.4em; 
            color: var(--muted); 
            margin-right: 20px; 
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            cursor: pointer; 
        }

        .fav-star-icon.active { 
            color: var(--gold); 
            text-shadow: 0 0 15px var(--gold-glow); 
            transform: scale(1.25) rotate(144deg);
        }

        .match-row-item { 
            display: flex; 
            align-items: center; 
            padding: 15px 30px; 
            border-bottom: 1px solid #141416; 
            font-size: 0.9em; 
            background: #0a0a0c;
            transition: all 0.3s;
        }

        .match-row-item:last-child { border-bottom: none; }
        .match-row-item:hover { background: #111118; transform: scale(1.005); z-index: 10; }
        
        /* SAAT SIRALI (KOMPAKT) */
        .compact-row { 
            font-size: 0.78em !important; 
            padding: 10px 30px !important; 
        }

        .match-clock-box { 
            font-family: 'JetBrains Mono'; 
            color: var(--green); 
            width: 70px; 
            font-weight: 800; 
            font-size: 1.1em; 
            letter-spacing: -0.5px;
        }

        .match-icon-marker { 
            margin-right: 15px; 
            font-size: 1em; 
            opacity: 0.6; 
        }

        .match-main-teams { 
            font-weight: 800; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            color: #f4f4f7;
            letter-spacing: 0.2px;
        }

        .match-flag-element { 
            width: 20px; 
            height: 14px; 
            object-fit: cover; 
            border-radius: 2px; 
            margin-left: 15px; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.6);
        }
        
        .league-badge-tag { 
            font-size: 0.7em; 
            color: var(--text-dim); 
            background: #18181b; 
            padding: 4px 14px; 
            border-radius: 6px; 
            margin-left: 30px; 
            font-weight: 900; 
            border: 1px solid #2d2d30; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- MULTI-STREAM INTELLIGENCE HUB --- */
        .stream-controls-bar { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 30px; 
            background: var(--panel); 
            padding: 18px; 
            border-radius: 14px; 
            border: 1px solid var(--border); 
        }

        .btn-stream-layout { 
            background: #1f1f23; 
            color: var(--muted); 
            border: 2px solid #333; 
            padding: 12px 32px; 
            border-radius: 10px; 
            font-size: 0.9em; 
            font-weight: 950; 
            cursor: pointer; 
            transition: var(--transition-fast);
        }

        .btn-stream-layout.active { 
            background: var(--green); 
            color: #000; 
            border-color: var(--green); 
            box-shadow: 0 0 25px var(--green-glow);
        }

        .stream-master-grid { 
            display: none; 
            gap: 20px; 
            height: calc(100vh - 350px); 
            width: 100%; 
        }

        .stream-master-grid.active { display: grid; }
        
        /* Grid Layout Configs */
        .lay-1 { grid-template-columns: 1fr; }
        .lay-2 { grid-template-columns: 1fr 1fr; }
        .lay-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .lay-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }

        .stream-box-unit { 
            background: #000; 
            border: 2px solid #27272a; 
            border-radius: 15px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: border 0.4s;
        }

        .stream-box-unit:hover { border-color: var(--green); }

        .stream-box-nav { 
            padding: 12px; 
            background: #0a0a0c; 
            display: flex; 
            gap: 12px; 
            border-bottom: 1px solid var(--border); 
        }

        .stream-box-input { 
            flex: 1; 
            background: #000; 
            border: 1.5px solid #333; 
            color: #fff; 
            font-size: 11px; 
            padding: 10px 18px; 
            border-radius: 8px; 
        }

        .btn-cell-fire { background: var(--green); color: #000; border: none; padding: 0 22px; border-radius: 8px; font-weight: 950; font-size: 0.8em; cursor: pointer; }
        .btn-cell-fav { background: var(--gold); color: #000; border: none; padding: 0 14px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-cell-kill { background: var(--red); color: #fff; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-cell-kill:hover { background: #ff0000; transform: rotate(90deg); }

        .vault-intelligence { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            padding: 30px; 
            border-radius: 15px; 
            margin-top: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .vault-pill-item { 
            display: inline-flex; 
            align-items: center; 
            background: #111; 
            border: 1px solid #333; 
            color: #eee; 
            padding: 12px 22px; 
            border-radius: 10px; 
            font-size: 0.8em; 
            margin-right: 18px; 
            margin-bottom: 15px; 
            cursor: pointer; 
            transition: all 0.3s;
            font-weight: 700;
        }

        .vault-pill-item:hover { border-color: var(--gold); background: #18181b; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .vault-pill-item i { margin-left: 18px; color: var(--red); opacity: 0.5; font-size: 1.1em; }
        .vault-pill-item i:hover { opacity: 1; transform: scale(1.3); }

        /* --- SUPREME FINANCIAL CONSOLE --- */
        .finance-terminal-root { 
            display: none; 
            grid-template-columns: 1fr 520px; 
            gap: 40px; 
            height: 100%; 
        }

        .finance-terminal-root.active { display: grid; }

        .finance-left-pane { 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 35px; 
            padding-right: 15px; 
        }
        
        .rolling-grand-panel { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 18px; 
        }

        .rolling-card-segment { 
            background: var(--panel); 
            border: 1.5px solid var(--border); 
            padding: 35px 15px; 
            border-radius: 20px; 
            text-align: center; 
            border-top: 6px solid var(--muted); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .rolling-card-segment.active { 
            border-top-color: var(--green); 
            background: linear-gradient(to bottom, rgba(16, 185, 129, 0.04), #0c0c0e); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            transform: translateY(-8px);
        }

        .rolling-card-segment label { 
            font-size: 0.65em; 
            font-weight: 950; 
            color: var(--muted); 
            text-transform: uppercase; 
            margin-bottom: 18px; 
            display: block; 
            letter-spacing: 2px; 
        }

        .rolling-card-segment b { 
            font-family: 'JetBrains Mono'; 
            font-size: 1.6em; 
            font-weight: 950; 
            color: var(--gold); 
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .ledger-supreme-pro { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            flex-grow: 1; 
            min-height: 600px; 
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .ledger-supreme-header { 
            padding: 30px 40px; 
            border-bottom: 2px solid #1f1f23; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--panel-header); 
        }

        .ledger-title-text { 
            font-weight: 950; 
            font-size: 1.2em; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: #fff; 
        }

        .ledger-tabs-container { display: flex; gap: 15px; }

        .btn-tab-pro { 
            background: #000; 
            color: var(--muted); 
            border: 2px solid var(--border-bright); 
            padding: 12px 28px; 
            border-radius: 10px; 
            font-size: 0.8em; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-tab-pro.active { 
            background: var(--gold); 
            color: #000; 
            border-color: var(--gold); 
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .ledger-table-scroller { overflow-y: auto; flex-grow: 1; background: #070709; }

        .supreme-ledger-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.9em; 
        }

        .supreme-ledger-table th { 
            background: #0c0c0e; 
            padding: 24px 20px; 
            text-align: left; 
            color: var(--muted); 
            position: sticky; 
            top: 0; 
            border-bottom: 2px solid #1f1f23; 
            font-weight: 950; 
            z-index: 100;
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
        }

        .supreme-ledger-table td { 
            padding: 20px; 
            border-bottom: 1px solid #121214; 
            color: #e4e4e9; 
            font-weight: 500;
        }

        .supreme-ledger-table tr:hover td { background: #0f0f12; }
        
        .finance-right-pane { display: flex; flex-direction: column; gap: 35px; }

        .supreme-chart-wrapper { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 30px; 
            height: 550px; 
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .global-kpi-hub { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 18px; 
        }

        .kpi-card-supreme { 
            background: #000; 
            border: 1.5px solid var(--border); 
            padding: 30px 15px; 
            border-radius: 15px; 
            text-align: center; 
            position: relative;
        }

        .kpi-card-supreme span { 
            display: block; 
            font-size: 0.7em; 
            color: var(--muted); 
            margin-bottom: 15px; 
            font-weight: 950; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .kpi-card-supreme b { 
            font-family: 'JetBrains Mono'; 
            font-size: 1.8em; 
            color: #fff; 
            letter-spacing: -1px; 
        }

        .op-input-supreme-box { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            padding: 40px; 
            border-radius: 20px; 
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
            border-bottom: 4px solid var(--green);
        }

        .btn-op-fire { 
            background: var(--green); 
            color: #000; 
            border: none; 
            padding: 22px; 
            border-radius: 12px; 
            font-weight: 950; 
            cursor: pointer; 
            font-size: 1.1em; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-op-fire:hover { 
            transform: scale(1.03) translateY(-5px); 
            box-shadow: 0 20px 40px var(--green-glow); 
            background: #14d693;
        }
        
        .hard-reset-link {
            text-align: center;
            color: #222;
            font-size: 11px;
            font-weight: 950;
            cursor: pointer;
            text-decoration: underline;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hard-reset-link:hover { color: var(--red); opacity: 0.8; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-zone">
            <div class="brand-text">V19 CAPITAL</div>
            <div class="brand-sub">SUPREME COMMAND</div>

    <script>
        /**
         * V19 ELITE OMEGA ENGINE v6.0 
         * Hiçbir kısaltma yapılmamıştır. Her satır operasyonel bütünlük için yazılmıştır.
         */

        let _DB = [];
        let _LEAGUES_MAP = {};
        let _SPORT = 'futbol';
        let _TAB = 'bulletin';
        let _FILTER_L = 'ALL';
        let _SORT_MODE = 'league'; 
        let _LEDGER_MODE = 'pend';

        // DATABASE STORAGE
        let _WALLET = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let _HISTORY = JSON.parse(localStorage.getItem('v19_h')) || [100.00];
        let _PENDING = JSON.parse(localStorage.getItem('v19_p')) || [];
        let _LEDGER = JSON.parse(localStorage.getItem('v19_l')) || [];
        let _FAV_LEAGUES = JSON.parse(localStorage.getItem('v19_fav_l')) || [];
        let _FAV_STREAMS = JSON.parse(localStorage.getItem('v19_fav_s')) || [];

        // LİG HİYERARŞİ ALGORİTMASI (PUANLAMA)
        const SCORE_MAP = {
            "TÜRKİYE - SÜPER LİG": 2500, "İNGİLTERE - PREMIER LEAGUE": 2400, "İSPANYA - LA LIGA": 2350,
            "ALMANYA - BUNDESLIGA": 2300, "İTALYA - SERIE A": 2250, "FRANSA - LIGUE 1": 2200,
            "AVRUPA - CHAMPIONS LEAGUE": 2100, "AVRUPA - EUROPA LEAGUE": 2000, "AVRUPA - CONFERENCE LEAGUE": 1900,
            "AVRUPA - EUROLEAGUE": 2450, "AMERİKA - NBA": 2420, "TÜRKİYE - BSL": 2410
        };

        // --- ENGINE: INITIALIZE ---
        async function omega_Initialize() {
            console.log("Omega Core Initializing...");
            try {
                // Veriyi çek (cache kırıcı ile)
                const r = await fetch('v19_rapor.json?nocache=' + Date.now());
                const rawData = await r.json();
                _DB = rawData.veriler || [];
                _LEAGUES_MAP = rawData.sayac || {};
                
                omega_BuildInterface();
                omega_RunEngine();
                omega_UpdateWalletUI();
            } catch (err) {
                console.error("Critical: Data pipeline broken.");
                document.getElementById('omega-render-output').innerHTML = `
                    <div style="padding:100px; text-align:center;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:4em; color:var(--red); margin-bottom:20px;"></i>
                        <h2 style="font-weight:900;">RADAR ÇEVRİMDIŞI</h2>
                        <p style="color:var(--muted); margin-top:10px;">Veri radarı v19_rapor.json dosyasına ulaşamıyor. Lütfen motoru tetikleyin.</p>
                    </div>
                `;
            }
        }

        // --- ENGINE: UTILS ---
        function omega_GetFlag(leagueName) {
            const s = leagueName.toUpperCase();
            if(s.includes("TÜRKİYE") || s.includes("SUPER LİG") || s.includes("SÜPER LİG") || s.includes("BSL")) return "tr";
            if(s.includes("İNGİLTERE") || s.includes("PREMIER") || s.includes("CHAMPIONSHIP")) return "gb-eng";
            if(s.includes("İSPANYA") || s.includes("LA LIGA") || s.includes("ACB")) return "es";
            if(s.includes("ALMANYA") || s.includes("BUNDESLIGA") || s.includes("BBL")) return "de";
            if(s.includes("İTALYA") || s.includes("SERIE A") || s.includes("LEGA A")) return "it";
            if(s.includes("FRANSA") || s.includes("LIGUE 1") || s.includes("LNB PRO A")) return "fr";
            if(s.includes("AMERİKA") || s.includes("NBA") || s.includes("MLS")) return "us";
            if(s.includes("AVRUPA") || s.includes("CHAMPIONS") || s.includes("EURO")) return "eu";
            if(s.includes("PORTEKİZ") || s.includes("PRIMEIRA")) return "pt";
            if(s.includes("HOLLANDA") || s.includes("EREDIVISIE")) return "nl";
            if(s.includes("BREZİLYA") || s.includes("BRAZIL")) return "br";
            if(s.includes("ARJANTİN") || s.includes("ARGENTINA")) return "ar";
            if(s.includes("RUSYA") || s.includes("VTB")) return "ru";
            return "un";
        }

        function omega_SmartDate(ds) {
            if(!ds) return "";
            const p = ds.split('-');
            const target = new Date(p[0], p[1] - 1, p[2]);
            const today = new Date(); today.setHours(0,0,0,0);
            const diff = Math.round((target - today) / (1000 * 60 * 60 * 24));
            
            if (diff === 0) return "BUGÜN";
            if (diff === 1) return "YARIN";
            
            const months = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
            return p[2] + " " + months[parseInt(p[1]) - 1];
        }

        // --- ENGINE: RADAR LOGIC ---
        function omega_BuildInterface() {
            const dateSel = document.getElementById('omega-date-sel');
            const dropMenu = document.getElementById('drop-menu-list');
            
            // Tarih Logic
            let dHtml = '<option value="ALL">TÜM ZAMAN ÇİZELGESİ</option>';
            const dates = [...new Set(_DB.filter(m => m.t === _SPORT).map(m => m.dt))].sort();
            dates.forEach(d => {
                dHtml += `<option value="${d}">${omega_SmartDate(d)}</option>`;
            });
            dateSel.innerHTML = dHtml;

            // League Dropdown Logic
            let lHtml = `<div class="league-drop-item" onclick="omega_HandleLSelection('ALL', 'TÜM LİGLER')">TÜM LİGLER</div>`;
            for(let lName in _LEAGUES_MAP) {
                // Strict Sport Separation
                let isBasket = ["NBA", "EUROLEAGUE", "BSL", "LIGA ACB", "LEGA A", "LNB PRO A", "BBL", "EUROCUP", "BCL", "VTB"].some(x => lName.toUpperCase().includes(x));
                let correctSport = (_SPORT === 'basketbol' && isBasket) || (_SPORT === 'futbol' && !isBasket);
                
                if(correctSport && _LEAGUES_MAP[lName] > 0) {
                    const flag = omega_GetFlag(lName);
                    const icon = _SPORT === 'futbol' ? '⚽' : '🏀';
                    lHtml += `
                        <div class="league-drop-item" onclick="omega_HandleLSelection('${lName}', this.innerHTML)">
                            <img src="https://flagcdn.com/w40/${flag}.png"> 
                            <span>${icon} ${lName} (${_LEAGUES_MAP[lName]})</span>
                        </div>
                    `;
                }
            }
            dropMenu.innerHTML = lHtml;
        }

        function omega_RunEngine() {
            const targetID = (_TAB === 'favs') ? 'favs-render-output' : 'omega-render-output';
            const targetArea = document.getElementById(targetID);
            if(!targetArea) return;
            const dateVal = document.getElementById('omega-date-sel').value;
            
            let filtered = _DB.filter(m => {
                let isBasket = ["NBA", "EUROLEAGUE", "BSL", "LIGA ACB", "LEGA A", "LNB PRO A", "BBL", "EUROCUP", "BCL", "VTB"].some(x => m.l.toUpperCase().includes(x));
                let sportCheck = (_SPORT === 'basketbol' && isBasket) || (_SPORT === 'futbol' && !isBasket);
                let dateCheck = (dateVal === 'ALL' || m.dt === dateVal);
                let leagueCheck = (_FILTER_L === 'ALL' || m.l === _FILTER_L);
                if(_TAB === 'favs') return _FAV_LEAGUES.includes(m.l) && dateCheck;
                return sportCheck && dateCheck && leagueCheck;
            });

            let finalOutput = ""; const dayGroups = {};
            filtered.forEach(m => { if(!dayGroups[m.dt]) dayGroups[m.dt] = []; dayGroups[m.dt].push(m); });

            Object.keys(dayGroups).sort().forEach(day => {
                finalOutput += `<div style="color:var(--green); font-size:0.8em; font-weight:900; padding:15px 0 10px 0; border-bottom:1px solid #1f1f23; margin-bottom:20px; letter-spacing:2px;">${omega_SmartDate(day)}</div>`;
                
                if(_SORT_MODE === 'time') {
                    // --- KRONOLOJİK KOMPAKT AKIŞ ---
                    dayGroups[day].sort((a,b)=>a.tm.localeCompare(b.tm)).forEach(m => {
                        const icon = _SPORT === 'futbol' ? '⚽' : '🏀';
                        finalOutput += `
                            <div class="match-card compact-row">
                                <div class="match-clock-box">${m.tm}</div>
                                <div class="match-main-teams">
                                    <span class="match-icon-marker">${icon}</span>
                                    ${m.m} 
                                    <img src="https://flagcdn.com/w40/${omega_GetFlag(m.l)}.png" class="match-flag-element">
                                    <span class="league-badge-tag">${m.l}</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    // --- LİG BAZLI AKIŞ (HIYERARŞİ DESTEKLİ) ---
                    const groups = {}; dayGroups[day].forEach(m => { if(!groups[m.l]) groups[m.l] = []; groups[m.l].push(m); });
                    let sortedLigs = Object.keys(groups).sort((a,b) => {
                        const fA = _FAV_LEAGUES.includes(a) ? 0 : 1; const fB = _FAV_LEAGUES.includes(b) ? 0 : 1;
                        if(fA !== fB) return fA - fB;
                        const sA = SCORE_MAP[a] || 0; const sB = SCORE_MAP[b] || 0;
                        if(sA !== sB) return sB - sA;
                        let tA = groups[a].reduce((m, x) => x.tm < m ? x.tm : m, "23:59");
                        let tB = groups[b].reduce((m, x) => x.tm < m ? x.tm : m, "23:59");
                        return tA.localeCompare(tB);
                    });

                    sortedLigs.forEach(lig => {
                        const flag = omega_GetFlag(lig);
                        const isFav = _FAV_LEAGUES.includes(lig);
                        const uid = `omega_${day}_${lig.replace(/[^a-zA-Z0-9]/g, '')}`;
                        const icon = _SPORT === 'futbol' ? '⚽' : '🏀';

                        finalOutput += `
                            <div class="league-container">
                                <div class="league-header-bar" onclick="omega_ToggleAcc('${uid}')">
                                    <div style="display:flex; align-items:center;">
                                        <i class="fa-solid fa-star fav-star-icon ${isFav?'active':''}" onclick="omega_ToggleFavLeague(event, '${lig}')"></i>
                                        <span style="color:${_SPORT==='basketbol'?'var(--orange)':'#fff'}; font-size:1.4em; margin-right:15px;">${icon}</span>
                                        <span>${lig}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </div>
                                <div id="${uid}" class="league-content" style="display:block;">
                        `;

                        groups[lig].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                            finalOutput += `
                                <div class="match-row-item">
                                    <div class="match-clock">${m.tm}</div>
                                    <div class="match-main-teams">${m.m} <img src="https://flagcdn.com/w40/${flag}.png" class="match-flag-element"></div>
                                </div>
                            `;
                        });
                        finalOutput += `</div></div>`;
                    });
                }
            });
            targetArea.innerHTML = finalOutput || "<div style='padding:80px; text-align:center; color:var(--muted); font-weight:900;'>TERMİNALDE KAYITLI VERİ BULUNAMADI.</div>";
        }

        // --- ENGINE: STREAMING CONTROLLER ---
        function omega_BuildMatrix(num) {
            const grid = document.getElementById('omega-matrix-grid');
            grid.className = `stream-master-grid active lay-${num}`;
            grid.innerHTML = "";
            document.querySelectorAll('.btn-stream-layout').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('lay-btn-' + num);
            if(activeBtn) activeBtn.classList.add('active');

            for(let i=1; i<=num; i++) {
                grid.innerHTML += `
                    <div class="stream-box-unit">
                        <div class="stream-box-nav">
                            <input id="st-in-${i}" class="stream-box-input" placeholder="İstihbarat Linki...">
                            <button class="btn-cell-fav" onclick="omega_AddSTVault(${i})"><i class="fa-solid fa-star"></i></button>
                            <button class="btn-cell-kill" onclick="omega_KillSTUnit(${i})"><i class="fa-solid fa-xmark"></i></button>
                            <button class="btn-cell-fire" onclick="omega_FireSTUnit(${i})">İZLE</button>
                        </div>
                        <iframe id="st-fr-${i}" style="flex:1; border:none; background:#000;" src="about:blank" allowfullscreen></iframe>
                    </div>
                `;
            }
            omega_RefreshSTVault();
        }
        function omega_FireSTUnit(id) { const u = document.getElementById('st-in-'+id).value; if(u) document.getElementById('st-fr-'+id).src=u; }
        function omega_KillSTUnit(id) { document.getElementById('st-in-'+id).value=""; document.getElementById('st-fr-'+id).src="about:blank"; }
        function omega_AddSTVault(id) { const v = document.getElementById('st-in-'+id).value; if(v && !_FAV_STREAMS.includes(v)) { _FAV_STREAMS.push(v); localStorage.setItem('v19_fav_s', JSON.stringify(_FAV_STREAMS)); omega_RefreshSTVault(); } }
        function omega_RefreshSTVault() { document.getElementById('vault-pills-area').innerHTML = _FAV_STREAMS.map(u => `<div class="vault-pill-item" onclick="omega_LoadFromVault('${u}')">${u.substring(0,35)}... <i class="fa-solid fa-trash" onclick="event.stopPropagation(); omega_RemSTVault('${u}')"></i></div>`).join(''); }
        function omega_RemSTVault(u) { _FAV_STREAMS = _FAV_STREAMS.filter(x => x !== u); localStorage.setItem('v19_fav_s', JSON.stringify(_FAV_STREAMS)); omega_RefreshSTVault(); }
        function omega_LoadFromVault(u) { const ins = document.querySelectorAll('.stream-box-input'); for(let i=0; i<ins.length; i++) { if(!ins[i].value) { ins[i].value=u; omega_FireSTUnit(i+1); break; } } }

        // --- ENGINE: FINANCE MODULE ---
        function omega_RefreshFinDash() {
            omega_UpdateWalletUI();
            const net = _LEDGER.reduce((s,i) => s + (i.pnl || 0), 0);
            document.getElementById('kpi-p-val').innerText = (net >= 0 ? "+" : "") + net.toFixed(2);
            document.getElementById('kpi-p-val').style.color = net >= 0 ? 'var(--green)' : 'var(--red)';
            const total = _LEDGER.filter(x => x.res === 'win' || x.res === 'loss').length;
            const wins = _LEDGER.filter(x => x.res === 'win').length;
            const wr = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
            document.getElementById('kpi-wr-val').innerText = "%" + wr;
            omega_RenderLedgerTable();
        }
        function omega_RenderLedgerTable() {
            const t = document.getElementById('omega-data-table');
            let h = `<tr><th>TARİH</th><th>OPERASYON</th><th>MİKTAR</th><th>ORAN</th><th>DURUM</th><th>P/L</th></tr>`;
            const list = _LEDGER_MODE === 'pend' ? _PENDING : _LEDGER;
            let rows = "";
            list.forEach(i => {
                let s = i.res==='win' ? '<b style="color:var(--green)">WIN</b>' : (i.res==='loss'?'<b style="color:var(--red)">LOSS</b>':'BEKLEYEN');
                rows += `<tr><td>${new Date(i.id).toLocaleDateString()}</td><td style="font-weight:900;">${i.name}</td><td>$${i.amt}</td><td>@${i.odds}</td><td>${s}</td><td>${i.pnl ? (i.pnl>0?'+':'')+i.pnl.toFixed(2) : '-'}</td>`;
                if(_LEDGER_MODE==='pend') rows += `<td><button onclick="omega_SettleOp(${i.id},'win')" style="color:var(--green); border:none; background:none; font-weight:950; font-size:1.4em; cursor:pointer; margin-right:15px;">W</button><button onclick="omega_SettleOp(${i.id},'loss')" style="color:var(--red); border:none; background:none; font-weight:950; font-size:1.4em; cursor:pointer;">L</button></td>`;
                rows += `</tr>`;
            });
            t.innerHTML = h + (rows || "<tr><td colspan='6' style='text-align:center; padding:50px; color:var(--muted);'>TERMİNALDE KAYIT YOK.</td></tr>");
        }
        function omega_CommitOp() {
            const n = document.getElementById('op-in-name').value, a = parseFloat(document.getElementById('op-in-amt').value), o = parseFloat(document.getElementById('op-in-odds').value);
            if(!n || isNaN(a) || isNaN(o)) return;
            _PENDING.push({id:Date.now(), name:n, amt:a, odds:o});
            omega_DB_Save(); omega_RefreshFinDash();
            document.getElementById('op-in-name').value=""; document.getElementById('op-in-amt').value=""; document.getElementById('op-in-odds').value="";
        }
        function omega_SettleOp(id, res) {
            const i = _PENDING.find(x=>x.id===id);
            let pnl = res === 'win' ? (i.amt * i.odds) - i.amt : -i.amt;
            _WALLET += pnl; _HISTORY.push(_WALLET); _LEDGER.unshift({...i, res, pnl, bal:_WALLET});
            _PENDING = _PENDING.filter(x => x.id !== id);
            omega_DB_Save(); omega_RefreshFinDash(); omega_RenderApexChart();
        }
        function omega_UpdateWalletUI() { document.getElementById('global-wallet-val').innerText = _WALLET.toFixed(2); document.getElementById('kpi-w-val').innerText = _WALLET.toFixed(2); }
        function omega_DB_Save() { localStorage.setItem('v19_w', _WALLET); localStorage.setItem('v19_h', JSON.stringify(_HISTORY)); localStorage.setItem('v19_p', JSON.stringify(_PENDING)); localStorage.setItem('v19_l', JSON.stringify(_LEDGER)); }

        // --- CHART ENGINE ---
        let _OMEGA_CHART;
        function omega_RenderApexChart() {
            if(_OMEGA_CHART) _OMEGA_CHART.destroy();
            _OMEGA_CHART = new ApexCharts(document.querySelector("#omega-apex-chart-main"), {
                series: [{ name: "USDT", data: _HISTORY }],
                chart: { type: 'area', height: '100%', toolbar: { show: false }, background: 'transparent', animations: { enabled: true, speed: 800 } },
                theme: { mode: 'dark' }, colors: ['#10b981'], stroke: { curve: 'straight', width: 4 },
                xaxis: { labels: { show: false }, axisBorder: { show: false } },
                yaxis: { opposite: true, labels: { style: { colors: '#71717a', fontSize: '11px', fontFamily: 'JetBrains Mono' } } },
                grid: { borderColor: '#1f1f23', strokeDashArray: 5 },
                annotations: { yaxis: [{y:1000, label:{text:'$1K'}}, {y:10000, label:{text:'$10K'}}, {y:100000, label:{text:'$100K'}}] }
            });
            _OMEGA_CHART.render();
        }

        // --- NAVIGATION & INTERFACE HELPERS ---
        function omega_SwitchTab(target, el) {
            document.querySelectorAll('.nav-link').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('omega-radar-block').style.display = (target==='futbol'||target==='basketbol')?'block':'none';
            document.getElementById('omega-favs-block').style.display = (target==='favs')?'block':'none';
            document.getElementById('omega-stream-block').style.display = (target==='stream')?'block':'none';
            document.getElementById('omega-finance-block').classList.toggle('active', target==='finance');

            if(target==='futbol'||target==='basketbol'){ _SPORT=target; _TAB='bulletin'; document.getElementById('main-op-title').innerText=target.toUpperCase(); omega_BuildInterface(); omega_RunEngine(); }
            if(target==='favs'){ _TAB='favs'; document.getElementById('main-op-title').innerText="FAVORİLERİM"; omega_RunEngine(); }
            if(target==='finance'){ document.getElementById('main-op-title').innerText="USDT FİNANS"; omega_RefreshFinDash(); setTimeout(omega_RenderApexChart, 200); }
            if(target==='stream'){ document.getElementById('main-op-title').innerText="CANLI YAYIN"; if(!document.getElementById('omega-matrix-grid').innerHTML) omega_BuildMatrix(6); }
        }

        function omega_ToggleFavLeague(e, l) { e.stopPropagation(); if(_FAV_LEAGUES.includes(l)) _FAV_LEAGUES=_FAV_LEAGUES.filter(x=>x!==l); else _FAV_LEAGUES.push(l); localStorage.setItem('v19_fav_l', JSON.stringify(_FAV_LEAGUES)); omega_RunEngine(); }
        function omega_ToggleAcc(id) { const c = document.getElementById(id); c.style.display = (c.style.display==='none'?'block':'none'); }
        function omega_ToggleDrop(e) { e.stopPropagation(); const l = document.getElementById('drop-menu-list'); l.style.display = (l.style.display==='block'?'none':'block'); }
        function omega_HandleLSelection(v, h) { _FILTER_L=v; document.getElementById('drop-text-label').innerHTML=h; document.getElementById('drop-menu-list').style.display='none'; omega_RunEngine(); }
        function omega_SetSort(m) { _SORT_MODE=m; document.querySelectorAll('.btn-mode-supreme').forEach(b=>b.classList.remove('active')); document.getElementById('btn-sort-'+(m==='league'?'lg':'tm')).classList.add('active'); omega_RunEngine(); }
        function omega_SetLedger(m) { _LEDGER_MODE=m; document.getElementById('l-tab-p').classList.toggle('active', m==='pend'); document.getElementById('l-tab-a').classList.toggle('active', m==='all'); omega_RenderLedgerTable(); }
        function omega_HardReset() { if(confirm("DİKKAT: TÜM VERİLER SIFIRLANACAK! EMİN MİSİNİZ?")){ localStorage.clear(); location.reload(); } }
        document.addEventListener('click', () => { if(document.getElementById('drop-menu-list')) document.getElementById('drop-menu-list').style.display='none'; });

        // ENGINE: BOOT
        omega_Initialize();
    </script>
</body>
</html>
