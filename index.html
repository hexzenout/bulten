<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | COMMAND CENTER PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <style>
        /* V19 ELITE SUPREME TERMINAL - MASTER CSS 
           Satır sayısı ve detay seviyesi maksimuma çekildi.
           Hiçbir stil bloğu birleştirilmedi, hepsi açık yazıldı.
        */
        
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root { 
            --gold: #fbbf24; 
            --gold-glow: rgba(251, 191, 36, 0.3);
            --green: #10b981; 
            --green-glow: rgba(16, 185, 129, 0.2);
            --red: #ef4444; 
            --red-glow: rgba(239, 68, 68, 0.2);
            --orange: #f97316; 
            --orange-glow: rgba(249, 115, 22, 0.3);
            --bg: #050505; 
            --panel: #0c0c0e; 
            --panel-light: #161618;
            --border: #1f1f23; 
            --border-bright: #2d2d33;
            --text: #ffffff; 
            --text-dim: #a1a1aa;
            --muted: #71717a;
            --sidebar-w: 280px;
        }

        /* RESET & BASE */
        * { box-sizing: border-box; outline: none; }
        
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- SIDEBAR DESIGN --- */
        .sidebar { 
            width: var(--sidebar-w); 
            background: #000; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            height: 100%;
            z-index: 500;
        }

        .brand-container { 
            padding: 35px 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-text { 
            font-weight: 900; 
            color: var(--green); 
            font-size: 1.3em; 
            letter-spacing: 3px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--green-glow);
        }

        .nav-wrapper { 
            padding: 25px 0; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-item { 
            padding: 15px 30px; 
            cursor: pointer; 
            color: var(--muted); 
            font-weight: 700; 
            font-size: 0.85em; 
            display: flex; 
            align-items: center; 
            transition: all 0.25s ease;
            border-left: 4px solid transparent;
        }

        .nav-item i { 
            margin-right: 18px; 
            font-size: 1.25em; 
            width: 24px; 
            text-align: center; 
        }

        .nav-item:hover { 
            background: rgba(255,255,255,0.02); 
            color: #fff; 
        }

        .nav-item.active { 
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%);
            color: #fff; 
            border-left: 4px solid var(--green); 
        }

        .nav-item.basket.active { 
            background: linear-gradient(90deg, rgba(249, 115, 22, 0.1) 0%, transparent 100%);
            border-left-color: var(--orange); 
        }

        .nav-item.stream-nav.active {
            background: linear-gradient(90deg, rgba(251, 191, 36, 0.1) 0%, transparent 100%);
            border-left-color: var(--gold);
        }

        /* --- MAIN VIEWPORT --- */
        .viewport { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            background: radial-gradient(circle at 50% 0%, #0a0a0c 0%, #050505 100%);
        }

        .top-bar { 
            padding: 0 35px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000; 
            border-bottom: 1px solid var(--border); 
            min-height: 80px;
        }

        .page-info h2 {
            margin: 0; 
            font-size: 1.1em; 
            font-weight: 900; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .stat-badge {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-badge label { font-size: 0.65em; color: var(--muted); font-weight: 800; }
        .stat-badge span { font-family: 'JetBrains Mono'; color: var(--gold); font-size: 1.15em; font-weight: 800; }

        .main-content { 
            flex-grow: 1; 
            padding: 30px; 
            overflow-y: auto; 
        }

        /* --- RADAR CONTROLS --- */
        .control-panel { margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px; }

        .filter-row { 
            display: flex; 
            gap: 15px; 
            background: var(--panel); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            align-items: center; 
        }

        .view-switcher { display: flex; gap: 10px; }

        .btn-view { 
            background: transparent; 
            border: 1px solid var(--orange); 
            color: var(--orange); 
            padding: 8px 20px; 
            border-radius: 5px; 
            font-size: 0.75em; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
        }

        .btn-view.active { 
            background: var(--orange); 
            color: #000; 
            box-shadow: 0 0 15px var(--orange-glow);
        }

        .supreme-select { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 10px; 
            border-radius: 5px; 
            font-size: 0.8em; 
            font-weight: 700; 
            cursor: pointer;
        }

        /* --- CUSTOM LEAGUE DROPDOWN --- */
        .league-drop { position: relative; min-width: 300px; }
        .league-drop-trigger { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 5px; 
            font-size: 0.8em; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .league-drop-menu { 
            display: none; 
            position: absolute; 
            top: 110%; 
            left: 0; 
            right: 0; 
            background: #0a0a0c; 
            border: 1px solid var(--border-bright); 
            z-index: 2000; 
            max-height: 400px; 
            overflow-y: auto; 
            border-radius: 6px; 
        }
        .league-drop-item { 
            padding: 12px 15px; 
            font-size: 0.8em; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            border-bottom: 1px solid #161618; 
        }
        .league-drop-item:hover { background: #1f1f23; }
        .league-drop-item img { width: 18px; height: 12px; margin-right: 12px; }

        /* --- LIST RENDER STYLES --- */
        .league-card { margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .league-header { 
            background: #1e293b; 
            padding: 12px 20px; 
            font-weight: 900; 
            font-size: 0.7em; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer;
        }
        .fav-star { color: var(--muted); margin-right: 12px; font-size: 1.2em; transition: 0.2s; }
        .fav-star.active { color: var(--gold); text-shadow: 0 0 8px var(--gold-glow); }

        .match-row-item { 
            display: flex; 
            align-items: center; 
            padding: 10px 20px; 
            border-bottom: 1px solid #161618; 
            font-size: 0.78em; 
            background: #0a0a0c;
        }
        .match-row-item:hover { background: #111114; }
        .m-time { font-family: 'JetBrains Mono'; color: var(--green); width: 55px; font-weight: 800; }
        .m-icon { margin-right: 10px; font-size: 0.9em; opacity: 0.7; }
        .m-main { font-weight: 700; flex-grow: 1; display: flex; align-items: center; }
        .m-flag { width: 16px; height: 11px; margin-left: 10px; border-radius: 1px; }
        .m-tag { font-size: 0.75em; color: var(--muted); background: #1c1c21; padding: 2px 8px; border-radius: 4px; margin-left: 15px; text-transform: uppercase; font-weight: 800; border: 1px solid #222; }

        /* --- STREAM HUB --- */
        .layout-bar { display: flex; gap: 10px; margin-bottom: 20px; background: var(--panel); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .btn-lay { background: #1f1f23; color: var(--muted); border: 1px solid #333; padding: 8px 18px; border-radius: 5px; font-size: 0.75em; font-weight: 900; cursor: pointer; }
        .btn-lay.active { background: var(--green); color: #000; border-color: var(--green); }

        .grid-master { display: none; gap: 12px; height: calc(100vh - 280px); width: 100%; }
        .grid-master.active { display: grid; }
        .layout-1 { grid-template-columns: 1fr; }
        .layout-2 { grid-template-columns: 1fr 1fr; }
        .layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .layout-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }

        .stream-cell { background: #000; border: 1px solid #222; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .cell-nav { padding: 6px; background: #0a0a0c; display: flex; gap: 6px; border-bottom: 1px solid var(--border); }
        .cell-input { flex: 1; background: #000; border: 1px solid #333; color: #fff; font-size: 10px; padding: 5px 10px; border-radius: 4px; }
        .btn-go { background: var(--green); color: #000; border: none; padding: 0 12px; border-radius: 4px; font-weight: 900; font-size: 10px; cursor: pointer; }
        .btn-fav { background: var(--gold); color: #000; border: none; padding: 0 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-kill { background: var(--red); color: #fff; border: none; padding: 0 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .fav-stream-box { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .stream-pill { display: inline-flex; align-items: center; background: #111; border: 1px solid #333; color: #ddd; padding: 6px 12px; border-radius: 6px; font-size: 0.7em; margin-right: 10px; margin-bottom: 10px; cursor: pointer; }
        .stream-pill i { margin-left: 10px; color: var(--red); opacity: 0.5; }

        /* --- FINANCIAL TERMINAL --- */
        .fin-full-layout { display: none; grid-template-columns: 1fr 440px; gap: 25px; height: 100%; }
        .fin-full-layout.active { display: grid; }
        .fin-left { overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .rolling-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .roll-card { background: var(--panel); border: 1px solid var(--border); padding: 20px 10px; border-radius: 10px; text-align: center; border-top: 4px solid var(--muted); }
        .roll-card.active { border-top-color: var(--green); }
        .roll-lbl { font-size: 0.55em; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .roll-val { font-family: 'JetBrains Mono'; font-size: 1.2em; font-weight: 900; color: var(--gold); }

        .ledger-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; flex-grow: 1; min-height: 480px; }
        .ledger-head { padding: 20px; border-bottom: 1px solid #1f1f23; display: flex; justify-content: space-between; align-items: center; }
        .ledger-tab-group { display: flex; gap: 8px; }
        .btn-tab { background: #161618; color: var(--muted); border: 1px solid #333; padding: 6px 15px; border-radius: 5px; font-size: 0.7em; font-weight: 800; cursor: pointer; }
        .btn-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .sup-table { width: 100%; border-collapse: collapse; font-size: 0.75em; }
        .sup-table th { background: #111; padding: 15px; text-align: left; color: var(--muted); position: sticky; top: 0; border-bottom: 1px solid #222; }
        .sup-table td { padding: 15px; border-bottom: 1px solid #161618; color: #e4e4e7; }
        
        .fin-right { display: flex; flex-direction: column; gap: 20px; }
        .chart-supreme { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; height: 440px; }
        .kpi-master { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .kpi-unit { background: #000; border: 1px solid var(--border); padding: 15px 10px; border-radius: 8px; text-align: center; }
        .kpi-unit span { display: block; font-size: 0.6em; color: var(--muted); margin-bottom: 6px; font-weight: 900; }
        .kpi-unit b { font-family: 'JetBrains Mono'; font-size: 1.2em; color: #fff; }

        .entry-box { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 10px; }
        .btn-supreme { background: var(--green); color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: 900; cursor: pointer; width: 100%; font-size: 0.9em; letter-spacing: 1px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-container"><div class="brand-text">V19 ELITE</div></div>
        <div class="nav-wrapper">
            <div class="nav-item active" id="nav-f" onclick="switchMainTab('futbol', this)"><i class="fa-solid fa-futbol"></i> FUTBOL RADARI</div>
            <div class="nav-item" id="nav-b" onclick="switchMainTab('basketbol', this)"><i class="fa-solid fa-basketball" style="color:var(--orange)"></i> BASKET RADARI</div>
            <div class="nav-item stream-nav" onclick="switchMainTab('stream', this)" style="color:var(--gold); border-top:1px solid #111; margin-top:20px;"><i class="fa-solid fa-tv"></i> CANLI YAYIN</div>
            <div class="nav-item" onclick="switchMainTab('finance', this)" style="color:var(--green);"><i class="fa-solid fa-chart-line"></i> FİNANS TERMİNALİ</div>
        </div>
    </div>

    <div class="viewport">
        <div class="top-bar">
            <div class="page-info"><h2 id="supreme-title">FUTBOL RADARI</h2></div>
            <div class="stat-badge"><label>AKTİF KASA:</label><span id="top-val">100.00 USDT</span></div>
        </div>

        <div class="main-content">
            
            <div id="view-radar">
                <div class="control-panel">
                    <div class="filter-row">
                        <select id="sel-date" class="supreme-select" onchange="runFilterEngine()"><option value="ALL">TÜM TARİHLER</option></select>
                        <div class="league-drop">
                            <div class="league-drop-trigger" onclick="toggleLeagueMenu(event)"><div id="drop-label">TÜM LİGLER</div><i class="fa-solid fa-chevron-down"></i></div>
                            <div class="league-drop-menu" id="drop-menu"></div>
                        </div>
                    </div>
                    <div class="view-switcher">
                        <button class="btn-view active" id="btn-v-league" onclick="setSortMode('league')">LİG SIRALI</button>
                        <button class="btn-view" id="btn-v-time" onclick="setSortMode('time')">SAAT SIRALI</button>
                    </div>
                </div>
                <div id="render-target"></div>
            </div>

            <div id="view-stream" style="display:none;">
                <div class="layout-bar">
                    <button class="btn-lay" onclick="buildLayout(1)">1</button>
                    <button class="btn-lay" onclick="buildLayout(2)">2</button>
                    <button class="btn-lay" onclick="buildLayout(4)">4</button>
                    <button class="btn-lay active" id="lay-6" onclick="buildLayout(6)">6</button>
                </div>
                <div id="stream-grid" class="grid-master grid-6 active"></div>
                <div class="fav-stream-box">
                    <span class="roll-lbl">KAYITLI YAYINLAR</span>
                    <div id="fav-streams" style="margin-top:15px;"></div>
                </div>
            </div>

            <div class="fin-full-layout" id="view-finance">
                <div class="fin-left">
                    <div class="rolling-board">
                        <div class="roll-card active"><span class="roll-lbl">1 HAFTA</span><div class="roll-val">$1.000</div></div>
                        <div class="roll-card"><span class="roll-lbl">15 GÜN</span><div class="roll-val">$5.000</div></div>
                        <div class="roll-card"><span class="roll-lbl">30 GÜN</span><div class="roll-val">$15.000</div></div>
                        <div class="roll-card"><span class="roll-lbl">60 GÜN</span><div class="roll-val">$40.000</div></div>
                        <div class="roll-card"><span class="roll-lbl">90 GÜN</span><div class="roll-val">$100.000</div></div>
                    </div>
                    <div class="ledger-box">
                        <div class="ledger-head">
                            <span style="font-weight:900; font-size:1em; letter-spacing:1px;">LEDGER</span>
                            <div class="ledger-tab-group">
                                <button class="btn-tab active" id="tab-p" onclick="filterLedger('pend')">BEKLEYEN</button>
                                <button class="btn-tab" id="tab-a" onclick="filterLedger('all')">TÜMÜ</button>
                            </div>
                        </div>
                        <div class="table-scroll"><table class="sup-table" id="ledger-table"></table></div>
                    </div>
                </div>
                <div class="fin-right">
                    <div class="chart-supreme"><div id="apex-chart-main"></div></div>
                    <div class="kpi-master">
                        <div class="kpi-unit"><span>KASA</span><b id="k-val-w">100.00</b></div>
                        <div class="kpi-unit"><span>NET</span><b id="k-val-p">0.00</b></div>
                        <div class="kpi-unit"><span>WIN %</span><b id="k-val-wr">%0</b></div>
                    </div>
                    <div class="entry-box">
                        <input type="text" id="op-name" class="supreme-select" style="width:100%; margin-bottom:10px;" placeholder="OPERASYON ADI">
                        <div style="display:flex; gap:10px; margin-bottom:10px;">
                            <input type="number" id="op-amt" class="supreme-select" style="flex:1" placeholder="USDT">
                            <input type="number" id="op-odds" class="supreme-select" style="flex:1" placeholder="ORAN">
                        </div>
                        <button onclick="commitOp()" class="btn-supreme">OPERASYONU BAŞLAT</button>
                        <button onclick="hardReset()" style="background:transparent; border:none; color:#222; font-size:10px; width:100%; margin-top:10px; cursor:pointer; font-weight:bold;">MANUEL SIFIRLA</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let _DATA = [], _L_COUNTS = {}, _SPORT = 'futbol', _TAB = 'bulletin', _L_FILTER = 'ALL', _SORT = 'league', _LEDGER_MODE = 'pend';
        
        let wallet = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let history = JSON.parse(localStorage.getItem('v19_h')) || [100];
        let pending = JSON.parse(localStorage.getItem('v19_p')) || [];
        let completed = JSON.parse(localStorage.getItem('v19_l')) || [];
        let favLeagues = JSON.parse(localStorage.getItem('v19_fav_l')) || [];
        let favStreams = JSON.parse(localStorage.getItem('v19_fav_s')) || [];

        function getFlag(lig) {
            const s = lig.toUpperCase();
            if(s.includes("TÜRKİYE") || s.includes("SUPER LIG") || s.includes("BSL")) return "tr";
            if(s.includes("İNGİLTERE") || s.includes("PREMIER") || s.includes("CHAMPIONSHIP")) return "gb-eng";
            if(s.includes("İSPANYA") || s.includes("LA LIGA") || s.includes("ACB")) return "es";
            if(s.includes("ALMANYA") || s.includes("BUNDESLIGA") || s.includes("BBL")) return "de";
            if(s.includes("İTALYA") || s.includes("SERIE A") || s.includes("LEGA A")) return "it";
            if(s.includes("FRANSA") || s.includes("LIGUE 1") || s.includes("LNB PRO A")) return "fr";
            if(s.includes("AMERİKA") || s.includes("NBA") || s.includes("MLS") || s.includes("WNBA")) return "us";
            if(s.includes("AVRUPA") || s.includes("CHAMPIONS") || s.includes("EURO") || s.includes("EUROLEAGUE")) return "eu";
            return "un";
        }

        function smartDate(ds) {
            if(!ds) return "";
            const p = ds.split('-');
            const target = new Date(p[0], p[1]-1, p[2]);
            const today = new Date(); today.setHours(0,0,0,0);
            const diff = Math.round((target - today) / 86400000);
            if(diff === 0) return "BUGÜN"; if(diff === 1) return "YARIN";
            const mnts = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
            return p[2] + " " + mnts[parseInt(p[1]) - 1];
        }

        async function boot() {
            try {
                const r = await fetch('v19_rapor.json?v=' + Date.now());
                const j = await r.json();
                _DATA = j.veriler || []; _L_COUNTS = j.sayac || {};
                buildMenus(); runFilter();
            } catch(e) { document.getElementById('render-target').innerHTML = "<div style='padding:50px; text-align:center; color:var(--muted)'>VERİ BEKLENİYOR...</div>"; }
        }

        function buildMenus() {
            const dSel = document.getElementById('sel-date');
            const dates = [...new Set(_DATA.filter(m => m.t === _SPORT).map(m => m.dt))].sort();
            dSel.innerHTML = '<option value="ALL">TÜM TARİHLER</option>' + dates.map(d => `<option value="${d}">${smartDate(d)}</option>`).join('');

            let lHtml = `<div class="league-drop-item" onclick="selLig('ALL', 'TÜM LİGLER')">TÜM LİGLER</div>`;
            for(let l in _L_COUNTS) {
                let isF = ["LİG", "PREMIER", "BUNDES", "SERIE", "LIGUE", "CHAMP", "EURO", "MLS", "EREDIVISIE"].some(x => l.toUpperCase().includes(x));
                if((_SPORT==='futbol' && isF) || (_SPORT==='basketbol' && !isF)) {
                    if(_L_COUNTS[l] > 0) {
                        lHtml += `<div class="league-drop-item" onclick="selLig('${l}', this.innerHTML)"><img src="https://flagcdn.com/w40/${getFlag(l)}.png"> ${_SPORT==='futbol'?'⚽':'🏀'} ${l} (${_L_COUNTS[l]})</div>`;
                    }
                }
            }
            document.getElementById('drop-menu').innerHTML = lHtml;
        }

        function runFilter() {
            if(_TAB !== 'bulletin') return;
            const area = document.getElementById('render-target');
            const dVal = document.getElementById('sel-date').value;
            let filtered = _DATA.filter(m => m.t === _SPORT && (dVal==='ALL'||m.dt===dVal) && (_L_FILTER==='ALL'||m.l===_L_FILTER));
            
            let h = ""; const days = {};
            filtered.forEach(m => { if(!days[m.dt]) days[m.dt] = []; days[m.dt].push(m); });

            Object.keys(days).sort().forEach(day => {
                h += `<div style="color:var(--green); font-size:0.75em; font-weight:900; padding:15px 0 5px 0; border-bottom:1px solid #1f1f23; margin-bottom:15px; letter-spacing:1px;">${smartDate(day)}</div>`;
                
                if(_SORT === 'time') {
                    days[day].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                        h += `<div class="match-row-item">
                            <div class="m-time">${m.tm}</div>
                            <div class="m-main"><span>${_SPORT==='futbol'?'⚽':'🏀'}</span>${m.m} <img src="https://flagcdn.com/w40/${getFlag(m.l)}.png" class="m-flag"> <span class="m-tag">${m.l}</span></div>
                        </div>`;
                    });
                } else {
                    const groups = {}; days[day].forEach(m => { if(!groups[m.l]) groups[m.l] = []; groups[m.l].push(m); });
                    let sortedL = Object.keys(groups).sort((a,b) => {
                        const fA = favLeagues.includes(a) ? 0 : 1; const fB = favLeagues.includes(b) ? 0 : 1;
                        if(fA !== fB) return fA - fB;
                        let tA = groups[a].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        let tB = groups[b].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        return tA.localeCompare(tB);
                    });

                    sortedL.forEach(lig => {
                        const isFav = favLeagues.includes(lig);
                        const uid = `id_${day}_${lig.replace(/[^a-zA-Z0-9]/g, '')}`;
                        h += `<div class="league-card">
                            <div class="league-header" onclick="toggleAcc('${uid}', this)">
                                <div><i class="fa-solid fa-star fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${lig}')"></i><span>${_SPORT==='futbol'?'⚽':'🏀'}</span> ${lig}</div>
                                <i class="fa-solid fa-chevron-down chevron"></i>
                            </div>
                            <div id="${uid}" class="league-content">`;
                        groups[lig].sort((a,b)=>a.tm.localeCompare(b.tm)).forEach(m => {
                            h += `<div class="match-row-item"><div class="m-time">${m.tm}</div><div class="m-main">${m.m} <img src="https://flagcdn.com/w40/${getFlag(lig)}.png" class="m-flag"></div></div>`;
                        });
                        h += `</div></div>`;
                    });
                }
            });
            area.innerHTML = h;
        }

        // STREAM LOGIC
        function buildLayout(n) {
            const grid = document.getElementById('stream-grid');
            grid.className = `grid-master active layout-${n}`;
            grid.innerHTML = "";
            document.querySelectorAll('.btn-lay').forEach(b => b.classList.remove('active'));
            for(let i=1; i<=n; i++) {
                grid.innerHTML += `<div class="stream-cell">
                    <div class="cell-nav">
                        <input id="url-${i}" class="cell-input" placeholder="Link...">
                        <button class="btn-go" onclick="startStream(${i})">İZLE</button>
                        <button class="btn-fav" onclick="addStreamFav(${i})"><i class="fa-solid fa-star"></i></button>
                        <button class="btn-kill" onclick="killStream(${i})"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <iframe id="frame-${i}" style="flex:1; border:none; background:#000;" src="about:blank" allowfullscreen></iframe>
                </div>`;
            }
            renderStreamFavs();
        }
        function startStream(id) { const u = document.getElementById('url-'+id).value; if(u) document.getElementById('frame-'+id).src=u; }
        function killStream(id) { document.getElementById('url-'+id).value=""; document.getElementById('frame-'+id).src="about:blank"; }
        function addStreamFav(id) { const v = document.getElementById('url-'+id).value; if(v && !favStreams.includes(v)) { favStreams.push(v); localStorage.setItem('v19_fav_s', JSON.stringify(favStreams)); renderStreamFavs(); } }
        function removeStreamFav(u) { favStreams = favStreams.filter(x => x !== u); localStorage.setItem('v19_fav_s', JSON.stringify(favStreams)); renderStreamFavs(); }
        function renderStreamFavs() { document.getElementById('fav-streams').innerHTML = favStreams.map(u => `<div class="stream-pill" onclick="quickLoad('${u}')">${u.substring(0,25)}... <i class="fa-solid fa-trash" onclick="event.stopPropagation(); removeStreamFav('${u}')"></i></div>`).join(''); }
        function quickLoad(u) { const ins = document.querySelectorAll('.cell-input'); for(let i=0; i<ins.length; i++) { if(!ins[i].value) { ins[i].value=u; startStream(i+1); break; } } }

        // FINANCE LOGIC
        function refreshFinDash() {
            document.getElementById('top-val').innerText = wallet.toFixed(2) + " USDT";
            document.getElementById('k-val-w').innerText = wallet.toFixed(2);
            const net = completed.reduce((s,i) => s + (i.pnl || 0), 0);
            document.getElementById('k-val-p').innerText = (net >= 0 ? "+" : "") + net.toFixed(2);
            document.getElementById('k-val-p').style.color = net >= 0 ? 'var(--green)' : 'var(--red)';
            const t = completed.filter(x => x.res==='win'||x.res==='loss').length;
            const w = completed.filter(x => x.res==='win').length;
            document.getElementById('k-val-wr').innerText = "%" + (t>0?((w/t)*100).toFixed(1):0);
            renderLedger();
        }
        function renderLedger() {
            const table = document.getElementById('ledger-table');
            let h = `<tr><th>TARİH</th><th>OPERASYON</th><th>RİSK</th><th>ORAN</th><th>DURUM</th><th>P/L</th></tr>`;
            const list = _LEDGER_MODE === 'pend' ? pending : completed;
            let r = "";
            list.forEach(i => {
                let s = i.res === 'win' ? '<b style="color:var(--green)">WIN</b>' : (i.res === 'loss' ? '<b style="color:var(--red)">LOSS</b>' : 'PENDING');
                r += `<tr><td>${new Date(i.id).toLocaleDateString()}</td><td>${i.name}</td><td>$${i.amt}</td><td>@${i.odds}</td><td>${s}</td><td>${i.pnl || '-'}</td>`;
                if(_LEDGER_MODE==='pend') r += `<td><button onclick="resOp(${i.id},'win')" style="color:var(--green); border:none; background:none; cursor:pointer; font-weight:900;">W</button><button onclick="resOp(${i.id},'loss')" style="color:var(--red); border:none; background:none; cursor:pointer; font-weight:900;">L</button></td>`;
                r += `</tr>`;
            });
            table.innerHTML = h + (r || "<tr><td colspan='6' style='text-align:center; padding:30px;'>Kayıt yok.</td></tr>");
        }
        function addOp() {
            const n = document.getElementById('op-name').value, a = parseFloat(document.getElementById('op-amt').value), o = parseFloat(document.getElementById('op-odds').value);
            if(!n || isNaN(a)) return;
            pending.push({id:Date.now(), name:n, amt:a, odds:o});
            save(); refreshFinDash();
            document.getElementById('op-name').value=""; document.getElementById('op-amt').value=""; document.getElementById('op-odds').value="";
        }
        function commitOp() { addOp(); }
        function resOp(id, r) {
            const i = pending.find(x => x.id === id);
            let pnl = r === 'win' ? (i.amt * i.odds) - i.amt : -i.amt;
            wallet += pnl; history.push(wallet);
            completed.unshift({...i, res: r, pnl: pnl, bal: wallet});
            pending = pending.filter(x => x.id !== id);
            save(); refreshFinDash(); renderChart();
        }
        function save() { localStorage.setItem('v19_w', wallet); localStorage.setItem('v19_h', JSON.stringify(history)); localStorage.setItem('v19_p', JSON.stringify(pending)); localStorage.setItem('v19_l', JSON.stringify(completed)); }

        // CHART
        let apex;
        function renderChart() {
            if(apex) apex.destroy();
            apex = new ApexCharts(document.querySelector("#apex-chart-main"), {
                series: [{ name: "USDT", data: history }],
                chart: { type: 'area', height: '100%', toolbar: { show: false }, background: 'transparent' },
                theme: { mode: 'dark' }, colors: ['#10b981'], stroke: { curve: 'straight', width: 2 },
                xaxis: { labels: { show: false } }, yaxis: { opposite: true, labels: { style: { colors: '#71717a' } } },
                grid: { borderColor: '#1f1f23' },
                annotations: { yaxis: [{y:1000, label:{text:'$1K'}}, {y:10000, label:{text:'$10K'}}, {y:100000, label:{text:'$100K'}}] }
            });
            apex.render();
        }

        // HELPERS
        function switchMainTab(m, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('view-radar').style.display = (m==='futbol'||m==='basketbol') ? 'block':'none';
            document.getElementById('view-stream').style.display = (m==='stream') ? 'block':'none';
            document.getElementById('view-finance').classList.toggle('active', m==='finance');
            if(m==='futbol'||m==='basketbol') { _SPORT=m; document.getElementById('supreme-title').innerText=m.toUpperCase()+" RADARI"; buildMenus(); runFilter(); }
            if(m==='finance') { document.getElementById('supreme-title').innerText="FINANS TERMINALI"; refreshFinDash(); setTimeout(renderChart, 200); }
            if(m==='stream') { document.getElementById('supreme-title').innerText="MULTI-STREAM"; if(!document.getElementById('stream-grid').innerHTML) buildLayout(6); }
        }
        function toggleAcc(id, el) { const c = document.getElementById(id); const i = el.querySelector('.chevron'); const h = c.style.display==='none'; c.style.display=h?'block':'none'; i.style.transform=h?'rotate(0deg)':'rotate(-90deg)'; }
        function toggleLeagueMenu(e) { e.stopPropagation(); const m = document.getElementById('drop-menu'); m.style.display = m.style.display==='block'?'none':'block'; }
        function selLig(v, h) { _L_FILTER=v; document.getElementById('drop-label').innerHTML=h; document.getElementById('drop-menu').style.display='none'; runFilter(); }
        function setSortMode(m) { _SORT=m; document.querySelectorAll('.btn-view').forEach(b=>b.classList.remove('active')); document.getElementById('btn-v-'+m).classList.add('active'); runFilter(); }
        function filterLedger(m) { _LEDGER_MODE=m; document.querySelectorAll('.btn-tab').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+(m==='pend'?'p':'a')).classList.add('active'); renderLedger(); }
        function toggleFav(e, l) { e.stopPropagation(); if(favLeagues.includes(l)) favLeagues = favLeagues.filter(x=>x!==l); else favLeagues.push(l); localStorage.setItem('v19_fav_l', JSON.stringify(favLeagues)); runFilter(); }
        function hardReset() { const v = parseFloat(prompt("Kasa Değeri:")); if(!isNaN(v)) { wallet=v; history.push(wallet); save(); refreshFinDash(); renderChart(); } }
        document.addEventListener('click', () => { if(document.getElementById('drop-menu')) document.getElementById('drop-menu').style.display='none'; });

        boot();
    </script>
</body>
</html>
