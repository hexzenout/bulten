<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | COMMAND CENTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;700;900&display=swap');

        :root { 
            --gold: #fbbf24; --green: #10b981; --red: #ef4444; --orange: #f97316; 
            --bg: #050505; --panel: #0c0c0e; --border: #1f1f23; --text: #fff; --muted: #71717a; 
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 25px 20px; font-weight: 900; color: var(--green); border-bottom: 1px solid var(--border); text-align: center; font-size: 1.1em; letter-spacing: 1px; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: var(--muted); font-weight: 700; font-size: 0.85em; display: flex; align-items: center; border-bottom: 1px solid #0a0a0a; transition: 0.2s; }
        .nav-item i { margin-right: 12px; font-size: 1.2em; width: 20px; text-align: center; }
        .nav-item:hover { background: #0a0a0a; color: #fff; }
        .nav-item.active { background: rgba(16,185,129,0.05); color: #fff; border-left: 3px solid var(--green); }

        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid var(--border); }
        .content { flex-grow: 1; padding: 20px; overflow-y: auto; }

        /* BÜLTEN TASARIMI */
        .filter-row { display: flex; gap: 10px; margin-bottom: 15px; background: var(--panel); padding: 10px; border-radius: 6px; border: 1px solid var(--border); align-items: center; }
        .c-select { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; outline: none; cursor: pointer; }

        .c-dropdown { position: relative; min-width: 280px; }
        .c-drop-btn { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 0.75em; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .c-drop-list { display: none; position: absolute; top: 105%; left: 0; right: 0; background: #0a0a0c; border: 1px solid var(--border); z-index: 1000; max-height: 350px; overflow-y: auto; border-radius: 4px; }
        .c-drop-item { padding: 10px 12px; font-size: 0.75em; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid #161618; }
        .c-drop-item:hover { background: #1f1f23; }
        .c-drop-item img { width: 18px; height: 13px; margin-right: 10px; }

        .league-head { background: #1e293b; padding: 10px 15px; font-weight: 900; font-size: 0.75em; border: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .league-content { border: 1px solid var(--border); border-top: none; margin-bottom: 15px; background: #0a0a0c; }
        .match-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #161618; font-size: 0.8em; }
        .m-time { font-family: 'JetBrains Mono'; color: var(--green); width: 55px; font-weight: bold; }
        .m-teams { font-weight: 700; flex-grow: 1; display: flex; align-items: center; }
        .flag { width: 18px; height: 13px; object-fit: cover; border-radius: 2px; margin-left: 10px; }

        /* STREAM CONTROLS */
        .stream-layout-header { display: flex; gap: 10px; margin-bottom: 15px; background: var(--panel); padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
        .layout-btn { background: #1f1f23; color: var(--muted); border: 1px solid #333; padding: 6px 15px; border-radius: 4px; font-size: 0.7em; font-weight: 900; cursor: pointer; }
        .layout-btn.active { background: var(--green); color: #000; border-color: var(--green); }
        .stream-grid { display: none; gap: 10px; height: calc(100vh - 200px); width: 100%; }
        .stream-grid.active { display: grid; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }

        .stream-box { background: #000; border: 1px solid #222; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
        .stream-header { padding: 5px; background: #0a0a0c; display: flex; gap: 5px; border-bottom: 1px solid #1f1f23; }
        .stream-input { flex: 1; background: #000; border: 1px solid #333; color: #fff; font-size: 10px; padding: 4px; border-radius: 3px; }
        .btn-close { background: var(--red); color: #fff; border: none; padding: 0 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }

        /* FINANS */
        .fin-master-wrapper { display: none; grid-template-columns: 1fr 420px; gap: 20px; height: 100%; }
        .fin-master-wrapper.active { display: grid; }
        .fin-left { overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .rolling-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .roll-card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; border-top: 3px solid var(--muted); }
        .roll-card.active { border-top-color: var(--green); }
        .roll-title { font-size: 0.55em; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .roll-goal { font-family: 'JetBrains Mono'; font-size: 1.2em; font-weight: 900; color: var(--gold); }
        .excel-mini { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; flex-grow: 1; }
        .table-scroll { overflow-y: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72em; }
        th { background: #111; padding: 12px; text-align: left; color: var(--muted); border-bottom: 1px solid #222; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #161618; color: #eee; }
        .fin-right { display: flex; flex-direction: column; gap: 20px; }
        .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; flex-grow: 1; min-height: 400px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">V19 CAPITAL</div>
        <div class="nav-item active" id="btn-f" onclick="switchMode('futbol', this)"><i class="fa-solid fa-futbol"></i> FUTBOL</div>
        <div class="nav-item" id="btn-b" onclick="switchMode('basketbol', this)"><i class="fa-solid fa-basketball" style="color:var(--orange)"></i> BASKET</div>
        <div class="nav-item" onclick="switchMode('stream', this)" style="color:var(--green); border-top:1px solid #111; margin-top:10px;"><i class="fa-solid fa-tv"></i> CANLI YAYIN</div>
        <div class="nav-item" onclick="switchMode('finance', this)" style="color:var(--gold);"><i class="fa-solid fa-chart-line"></i> USDT FİNANS</div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="page-title" style="margin:0; font-size:1em; font-weight:900;">BÜLTEN RADARI</h2>
            <div id="h-wallet" style="font-family:'JetBrains Mono'; font-weight:900; color:var(--gold)">100.00 USDT</div>
        </div>

        <div class="content">
            
            <div id="v-bulletin">
                <div class="filter-row">
                    <select id="date-sel" class="c-select" onchange="render()"><option value="ALL">TÜM TARİHLER</option></select>
                    <div class="c-dropdown" id="league-dropdown">
                        <div class="c-drop-btn" onclick="toggleLeagueDrop(event)"><div id="league-drop-text">TÜM LİGLER (SAAT SIRALI)</div><i class="fa-solid fa-chevron-down"></i></div>
                        <div class="c-drop-list" id="league-drop-list"></div>
                    </div>
                </div>
                <div id="list-area"></div>
            </div>

            <div id="v-stream" style="display:none;">
                <div class="stream-layout-header">
                    <button class="layout-btn" id="l-1" onclick="setLayout(1)">TEK EKRAN</button>
                    <button class="layout-btn" id="l-2" onclick="setLayout(2)">2 EKRAN</button>
                    <button class="layout-btn" id="l-4" onclick="setLayout(4)">4 EKRAN</button>
                    <button class="layout-btn active" id="l-6" onclick="setLayout(6)">6 EKRAN</button>
                </div>
                <div id="stream-grid" class="stream-grid grid-6 active"></div>
            </div>

            <div class="fin-master-wrapper" id="v-finance">
                <div class="fin-left">
                    <div class="rolling-grid">
                        <div class="roll-card active"><span class="roll-title">1 HAFTA</span><div class="roll-goal">$1.000</div></div>
                        <div class="roll-card"><span class="roll-title">15 GÜN</span><div class="roll-goal">$5.000</div></div>
                        <div class="roll-card"><span class="roll-title">30 GÜN</span><div class="roll-goal">$15.000</div></div>
                        <div class="roll-card"><span class="roll-title">60 GÜN</span><div class="roll-goal">$40.000</div></div>
                        <div class="roll-card"><span class="roll-title">90 GÜN</span><div class="roll-goal">$100.000</div></div>
                    </div>
                    <div class="excel-mini">
                        <div style="padding:15px; border-bottom:1px solid #1f1f23; font-weight:900; font-size:0.8em; display:flex; justify-content:space-between;">
                            <span>İŞLEM DEFTERİ</span>
                            <div style="display:flex; gap:5px;">
                                <button class="layout-btn active" id="f-pend" onclick="setTableFilter('pend')">BEKLEYEN</button>
                                <button class="layout-btn" id="f-all" onclick="setTableFilter('all')">HEPSİ</button>
                            </div>
                        </div>
                        <div class="table-scroll"><table id="fin-table"></table></div>
                    </div>
                </div>
                <div class="fin-right">
                    <div class="chart-card"><div id="chart"></div></div>
                    <div class="kpi-mini" style="background:var(--panel);"><span style="color:var(--muted); font-size:0.6em;">İŞLEM GİRİŞİ</span>
                        <input type="text" id="b-name" class="c-select" style="width:100%; margin-top:10px;" placeholder="Operasyon Adı">
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <input type="number" id="b-amt" class="c-select" style="flex:1" placeholder="USDT">
                            <input type="number" id="b-odds" class="c-select" style="flex:1" placeholder="Oran">
                        </div>
                        <button onclick="addBet()" style="width:100%; background:var(--green); border:none; padding:10px; margin-top:5px; font-weight:900; border-radius:4px; cursor:pointer;">KAYDET</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = [], ligSayac = {}, activeSport = 'futbol', curMode = 'bulletin', selectedLeague = 'ALL', tableFilter = 'pend';
        let wallet = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let history = JSON.parse(localStorage.getItem('v19_h')) || [100];
        let pending = JSON.parse(localStorage.getItem('v19_p')) || [];
        let ledger = JSON.parse(localStorage.getItem('v19_ledger')) || [];

        function getFlag(ligAdi) {
            const str = ligAdi.toUpperCase();
            if(str.includes("TÜRKİYE") || str.includes("SUPER LIG") || str.includes("BSL")) return "tr";
            if(str.includes("İNGİLTERE") || str.includes("PREMIER")) return "gb-eng";
            if(str.includes("İSPANYA") || str.includes("LA LIGA") || str.includes("ACB")) return "es";
            if(str.includes("ALMANYA") || str.includes("BUNDESLIGA")) return "de";
            if(str.includes("İTALYA") || str.includes("SERIE A")) return "it";
            if(str.includes("FRANSA") || str.includes("LIGUE 1")) return "fr";
            if(str.includes("AMERİKA") || str.includes("NBA") || str.includes("MLS")) return "us";
            if(str.includes("AVRUPA") || str.includes("CHAMPIONS") || str.includes("EURO")) return "eu";
            return "un";
        }

        function switchMode(mode, el) {
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('v-bulletin').style.display = (mode==='futbol'||mode==='basketbol') ? 'block':'none';
            document.getElementById('v-stream').style.display = (mode==='stream') ? 'block':'none';
            document.getElementById('v-finance').classList.toggle('active', mode==='finance');
            if(mode==='futbol'||mode==='basketbol') { activeSport=mode; buildFilters(); render(); }
            if(mode==='finance') { updateFinance(); setTimeout(initChart, 200); }
            if(mode==='stream') { if(!document.getElementById('stream-grid').innerHTML) setLayout(6); }
        }

        function setLayout(num) {
            const grid = document.getElementById('stream-grid');
            grid.className = `stream-grid active grid-${num}`;
            grid.innerHTML = "";
            document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`l-${num}`).classList.add('active');
            for(let i=1; i<=num; i++) {
                grid.innerHTML += `
                <div class="stream-box">
                    <div class="stream-header">
                        <input id="in-${i}" class="stream-input" placeholder="Link...">
                        <button class="layout-btn" style="background:var(--green); color:#000;" onclick="document.getElementById('fr-${i}').src=document.getElementById('in-${i}').value">İZLE</button>
                        <button class="btn-close" onclick="document.getElementById('in-${i}').value=''; document.getElementById('fr-${i}').src='about:blank'"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <iframe id="fr-${i}" style="flex:1; border:none; background:#000;" src="about:blank" allowfullscreen></iframe>
                </div>`;
            }
        }

        async function load() {
            const r = await fetch('v19_rapor.json?t='+Date.now());
            const d = await r.json(); allData = d.veriler || []; ligSayac = d.sayac || {};
            buildFilters(); render();
        }

        function buildFilters() {
            const dSel = document.getElementById('date-sel');
            const dates = [...new Set(allData.filter(m => m.t === activeSport).map(m => m.dt))].sort();
            dSel.innerHTML = '<option value="ALL">TÜM TARİHLER</option>' + dates.map(d => `<option value="${d}">${d}</option>`).join('');
            let ligHtml = `<div class="c-drop-item" onclick="selectLeague('ALL', 'TÜM LİGLER (SAAT SIRALI)')">TÜM LİGLER (SAAT SIRALI)</div>`;
            for(let l in ligSayac) {
                if(ligSayac[l] > 0) {
                    const isF = ["LİG", "PREMIER", "BUNDES", "SERIE", "LIGUE", "CHAMP", "EURO", "MLS"].some(x => l.toUpperCase().includes(x));
                    if((activeSport==='futbol' && isF) || (activeSport==='basketbol' && !isF)) {
                        ligHtml += `<div class="c-drop-item" onclick="selectLeague('${l}', this.innerHTML)"><img src="https://flagcdn.com/w40/${getFlag(l)}.png"> ${l}</div>`;
                    }
                }
            }
            document.getElementById('league-drop-list').innerHTML = ligHtml;
        }

        function render() {
            const area = document.getElementById('list-area');
            const dVal = document.getElementById('date-sel').value;
            let filtered = allData.filter(m => m.t === activeSport && (dVal === 'ALL' || m.dt === dVal) && (selectedLeague === 'ALL' || m.l === selectedLeague));
            let html = "";
            const days = {};
            filtered.forEach(m => { if(!days[m.dt]) days[m.dt]=[]; days[m.dt].push(m); });
            
            Object.keys(days).sort().forEach(day => {
                html += `<div style="color:var(--green); font-size:0.7em; font-weight:900; padding:10px 0; border-bottom:1px solid #1f1f23;">${day}</div>`;
                
                if(selectedLeague === 'ALL') {
                    // SADECE SAATE GÖRE SIRALAMA AKTİF
                    days[day].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                        html += `<div class="match-row"><div class="m-time">${m.tm}</div><div class="m-teams">${m.m} <img src="https://flagcdn.com/w40/${getFlag(m.l)}.png" class="flag"></div><div style="font-size:0.7em; color:var(--muted)">${m.l}</div></div>`;
                    });
                } else {
                    // LİG GRUPLAMA AKTİF
                    const groups = {}; days[day].forEach(m => { if(!groups[m.l]) groups[m.l]=[]; groups[m.l].push(m); });
                    for(let l in groups) {
                        html += `<div class="league-head"><span>${l}</span></div><div class="league-content">`;
                        groups[l].sort((a,b)=>a.tm.localeCompare(b.tm)).forEach(m => {
                            html += `<div class="match-row"><div class="m-time">${m.tm}</div><div class="m-teams">${m.m} <img src="https://flagcdn.com/w40/${getFlag(l)}.png" class="flag"></div></div>`;
                        });
                        html += `</div>`;
                    }
                }
            });
            area.innerHTML = html;
        }

        function updateFinance() {
            document.getElementById('k-wallet').innerText = wallet.toFixed(2);
            document.getElementById('h-wallet').innerText = wallet.toFixed(2) + " USDT";
            renderTable();
        }

        function renderTable() {
            const table = document.getElementById('fin-table');
            let h = `<tr><th>Tarih</th><th>İşlem</th><th>Tutar</th><th>Durum</th></tr>`;
            const items = tableFilter === 'pend' ? pending : ledger;
            items.forEach(i => {
                h += `<tr><td>${new Date(i.id).toLocaleDateString()}</td><td>${i.name}</td><td>$${i.amt}</td><td>${i.res||'...'}`;
                if(tableFilter==='pend') h += ` <button onclick="resolve(${i.id}, 'win')" style="color:var(--green); background:none; border:none; cursor:pointer;">W</button><button onclick="resolve(${i.id}, 'loss')" style="color:var(--red); background:none; border:none; cursor:pointer;">L</button>`;
                h += `</td></tr>`;
            });
            table.innerHTML = h;
        }

        function addBet() {
            const n = document.getElementById('b-name').value, a = parseFloat(document.getElementById('b-amt').value), o = parseFloat(document.getElementById('b-odds').value);
            if(!n || !a) return;
            pending.push({ id: Date.now(), name: n, amt: a, odds: o });
            localStorage.setItem('v19_p', JSON.stringify(pending)); updateFinance();
        }

        function resolve(id, res) {
            const b = pending.find(x => x.id === id);
            let pnl = res==='win' ? (b.amt*b.odds)-b.amt : -b.amt;
            wallet += pnl; history.push(wallet);
            ledger.unshift({...b, res, pnl});
            pending = pending.filter(x => x.id !== id);
            localStorage.setItem('v19_w', wallet); localStorage.setItem('v19_h', JSON.stringify(history));
            localStorage.setItem('v19_p', JSON.stringify(pending)); localStorage.setItem('v19_ledger', JSON.stringify(ledger));
            updateFinance(); initChart();
        }

        function initChart() {
            new ApexCharts(document.querySelector("#chart"), {
                series: [{ name: "USDT", data: history }],
                chart: { type: 'area', height: '100%', toolbar: { show: false }, background: 'transparent' },
                theme: { mode: 'dark' }, colors: ['#10b981'], stroke: { curve: 'straight', width: 2 },
                xaxis: { labels: { show: false } }, yaxis: { opposite: true, labels: { style: { colors: '#71717a' } } }
            }).render();
        }

        function toggleLeagueDrop(e) { e.stopPropagation(); const l = document.getElementById('league-drop-list'); l.style.display = l.style.display==='block'?'none':'block'; }
        function selectLeague(val, txt) { selectedLeague=val; document.getElementById('league-drop-text').innerHTML=txt; document.getElementById('league-drop-list').style.display='none'; render(); }
        document.addEventListener('click', () => { if(document.getElementById('league-drop-list')) document.getElementById('league-drop-list').style.display='none'; });

        load();
    </script>
</body>
</html>
