<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | COMMAND CENTER PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        /* V19 ELITE TERMINAL - MASTER CSS 
           Satır sayısı ve detay seviyesi maksimuma çekildi.
        */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;600;700;900&display=swap');

        :root { 
            --gold: #fbbf24; 
            --green: #10b981; 
            --red: #ef4444; 
            --orange: #f97316; 
            --bg: #050505; 
            --panel: #0c0c0e; 
            --border: #1f1f23; 
            --text: #ffffff; 
            --muted: #71717a;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; outline: none; }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: var(--sidebar-width); 
            background: #000; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 100;
        }

        .brand { 
            padding: 30px 20px; 
            font-weight: 900; 
            color: var(--green); 
            border-bottom: 1px solid var(--border); 
            text-align: center; 
            font-size: 1.2em; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-group { padding: 20px 0; flex-grow: 1; }

        .nav-item { 
            padding: 16px 25px; 
            cursor: pointer; 
            color: var(--muted); 
            font-weight: 700; 
            font-size: 0.85em; 
            display: flex; 
            align-items: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 3px solid transparent;
            margin-bottom: 4px;
        }

        .nav-item i { 
            margin-right: 15px; 
            font-size: 1.2em; 
            width: 20px; 
            text-align: center; 
        }

        .nav-item:hover { 
            background: #0a0a0a; 
            color: #fff; 
        }

        .nav-item.active { 
            background: rgba(16,185,129,0.08); 
            color: #fff; 
            border-left: 3px solid var(--green); 
        }

        .nav-item.basket.active { border-left-color: var(--orange); }

        /* --- MAIN AREA --- */
        .main { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }

        .header { 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000; 
            border-bottom: 1px solid var(--border); 
            min-height: 70px;
        }

        .header-title-box h2 {
            margin: 0; 
            font-size: 1em; 
            font-weight: 900; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .wallet-box {
            background: #0a0a0a;
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wallet-box span { font-size: 0.7em; color: var(--muted); font-weight: bold; }
        .wallet-box b { font-family: 'JetBrains Mono'; color: var(--gold); font-size: 1.1em; }

        .content { 
            flex-grow: 1; 
            padding: 25px; 
            overflow-y: auto; 
            background: radial-gradient(circle at top right, #0a0a0a, #050505);
        }

        /* --- BÜLTEN VE FİLTRE PANELİ --- */
        .filter-container {
            margin-bottom: 25px;
        }

        .filter-row { 
            display: flex; 
            gap: 12px; 
            background: var(--panel); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            align-items: center; 
            margin-bottom: 12px;
        }

        .view-options { 
            display: flex; 
            gap: 10px; 
            padding-left: 5px; 
        }

        .btn-mode { 
            background: transparent; 
            border: 1px solid var(--orange); 
            color: var(--orange); 
            padding: 8px 18px; 
            border-radius: 5px; 
            font-size: 0.75em; 
            font-weight: 900; 
            cursor: pointer; 
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-mode.active { 
            background: var(--orange); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .c-select { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 10px; 
            border-radius: 5px; 
            font-size: 0.8em; 
            font-weight: 700; 
            outline: none; 
            cursor: pointer; 
        }

        /* --- CUSTOM DROPDOWN --- */
        .custom-drop { position: relative; min-width: 300px; }
        .drop-trigger { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 5px; 
            font-size: 0.8em; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .drop-menu { 
            display: none; 
            position: absolute; 
            top: 110%; 
            left: 0; 
            right: 0; 
            background: #0a0a0c; 
            border: 1px solid var(--border); 
            z-index: 1000; 
            max-height: 400px; 
            overflow-y: auto; 
            border-radius: 6px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }
        .drop-item { 
            padding: 12px 15px; 
            font-size: 0.8em; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            border-bottom: 1px solid #161618; 
            transition: 0.2s;
        }
        .drop-item:hover { background: #1f1f23; }
        .drop-item img { width: 20px; height: 14px; margin-right: 12px; border-radius: 2px; }

        /* --- MAÇ LİSTESİ --- */
        .league-card { margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        
        .league-header { 
            background: #1e293b; 
            padding: 12px 20px; 
            font-weight: 900; 
            font-size: 0.75em; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer;
            border-bottom: 1px solid #334155;
        }

        .league-header:hover { background: #2d3748; }

        .match-item { 
            display: flex; 
            align-items: center; 
            padding: 14px 20px; 
            border-bottom: 1px solid #161618; 
            font-size: 0.85em; 
            background: #0a0a0c;
            transition: 0.2s;
        }
        .match-item:last-child { border-bottom: none; }
        .match-item:hover { background: #111114; }

        .m-time { font-family: 'JetBrains Mono'; color: var(--green); width: 65px; font-weight: 800; font-size: 0.95em; }
        .m-content { font-weight: 700; flex-grow: 1; display: flex; align-items: center; color: #f4f4f5; }
        .m-flag { width: 18px; height: 13px; object-fit: cover; border-radius: 2px; margin-left: 12px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .m-tag { font-size: 0.7em; color: var(--muted); background: #1f1f23; padding: 3px 8px; border-radius: 4px; margin-left: 15px; text-transform: uppercase; font-weight: 800; }

        /* --- CANLI YAYIN MODÜLÜ --- */
        .stream-layout-bar { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 20px; 
            background: var(--panel); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
        }
        .btn-layout { 
            background: #1f1f23; 
            color: var(--muted); 
            border: 1px solid #333; 
            padding: 8px 20px; 
            border-radius: 6px; 
            font-size: 0.75em; 
            font-weight: 900; 
            cursor: pointer; 
        }
        .btn-layout.active { background: var(--green); color: #000; border-color: var(--green); }

        .stream-container { display: none; gap: 12px; height: calc(100vh - 220px); width: 100%; }
        .stream-container.active { display: grid; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }

        .stream-unit { background: #000; border: 1px solid #222; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .stream-nav { padding: 6px; background: #0a0a0c; display: flex; gap: 6px; border-bottom: 1px solid #1f1f23; }
        .stream-url { flex: 1; background: #000; border: 1px solid #333; color: #fff; font-size: 11px; padding: 5px 10px; border-radius: 4px; }
        .btn-stream-go { background: var(--green); color: #000; border: none; padding: 0 12px; border-radius: 4px; font-weight: 900; font-size: 0.7em; cursor: pointer; }
        .btn-stream-stop { background: var(--red); color: #fff; border: none; padding: 0 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* --- FİNANSAL TERMİNAL --- */
        .fin-wrapper { display: none; grid-template-columns: 1fr 440px; gap: 25px; height: 100%; }
        .fin-wrapper.active { display: grid; }

        .fin-main-panel { overflow-y: auto; display: flex; flex-direction: column; gap: 25px; padding-right: 10px; }
        
        .rolling-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .rolling-item { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            padding: 20px 10px; 
            border-radius: 10px; 
            text-align: center; 
            border-top: 4px solid var(--muted); 
            transition: 0.3s;
        }
        .rolling-item.active { border-top-color: var(--green); background: rgba(16, 185, 129, 0.02); }
        .roll-lbl { font-size: 0.6em; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .roll-val { font-family: 'JetBrains Mono'; font-size: 1.3em; font-weight: 900; color: var(--gold); }

        .ledger-box { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            flex-grow: 1; 
            min-height: 450px; 
        }

        .ledger-header { 
            padding: 20px; 
            border-bottom: 1px solid #1f1f23; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .ledger-filters { display: flex; gap: 8px; }
        .btn-tab { 
            background: #1f1f23; 
            color: var(--muted); 
            border: 1px solid #333; 
            padding: 6px 14px; 
            border-radius: 5px; 
            font-size: 0.7em; 
            font-weight: 800; 
            cursor: pointer; 
        }
        .btn-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .ledger-table-area { overflow-y: auto; flex-grow: 1; }
        .v19-table { width: 100%; border-collapse: collapse; font-size: 0.75em; }
        .v19-table th { background: #111; padding: 15px; text-align: left; color: var(--muted); position: sticky; top: 0; border-bottom: 1px solid #222; font-weight: 900; }
        .v19-table td { padding: 15px; border-bottom: 1px solid #161618; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        
        .fin-side-panel { display: flex; flex-direction: column; gap: 20px; }
        .chart-container { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; height: 450px; position: relative; }
        
        .entry-card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 10px; }
        .kpi-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .kpi-item { background: #000; border: 1px solid var(--border); padding: 15px 10px; border-radius: 8px; text-align: center; }
        .kpi-item span { display: block; font-size: 0.6em; color: var(--muted); margin-bottom: 6px; font-weight: 800; }
        .kpi-item b { font-family: 'JetBrains Mono'; font-size: 1.2em; color: #fff; }

        .input-stack { display: flex; flex-direction: column; gap: 12px; }
        .btn-action { background: var(--green); color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 0.9em; letter-spacing: 1px; }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body>

        <div class="nav-group">

    <script>
        /**
         * V19 ELITE CORE JAVASCRIPT
         * Satır kısıtlaması olmadan, tüm fonksiyonlar detaylandırıldı.
         */

        let masterData = [];
        let leagueCounters = {};
        let currentSport = 'futbol';
        let currentMode = 'bulletin';
        let activeLeagueFilter = 'ALL';
        let currentSortType = 'league'; // 'league' or 'time'
        let ledgerFilterMode = 'pend';

        // STORAGE DATA
        let walletBalance = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let balanceHistory = JSON.parse(localStorage.getItem('v19_h')) || [100];
        let pendingOps = JSON.parse(localStorage.getItem('v19_p')) || [];
        let completedLedger = JSON.parse(localStorage.getItem('v19_ledger')) || [];

        // --- SİSTEM BAŞLATMA ---
        async function initializeTerminal() {
            console.log("V19 Terminal Başlatılıyor...");
            try {
                const response = await fetch('v19_rapor.json?nocache=' + Date.now());
                const json = await response.json();
                masterData = json.veriler || [];
                leagueCounters = json.sayac || {};
                
                buildFiltersAndMenus();
                applyFilters();
            } catch (err) {
                console.error("Veri senkronizasyon hatası:", err);
                document.getElementById('bulletin-render-area').innerHTML = `
                    <div style="padding:100px; text-align:center; color:var(--muted);">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:3em; margin-bottom:20px; color:var(--orange)"></i>
                        <p style="font-weight:900;">VERİ DOSYASI BULUNAMADI</p>
                        <small>Lütfen GitHub Actions üzerinden radarı tetikleyin.</small>
                    </div>
                `;
            }
        }

        // --- TARİH VE BAYRAK FONKSİYONLARI ---
        function detectCountryFlag(name) {
            const n = name.toUpperCase();
            if(n.includes("TÜRKİYE") || n.includes("SUPER LIG") || n.includes("BSL")) return "tr";
            if(n.includes("İNGİLTERE") || n.includes("PREMIER") || n.includes("CHAMPIONSHIP")) return "gb-eng";
            if(n.includes("İSPANYA") || n.includes("LA LIGA") || n.includes("ACB")) return "es";
            if(n.includes("ALMANYA") || n.includes("BUNDESLIGA") || n.includes("BBL")) return "de";
            if(n.includes("İTALYA") || n.includes("SERIE A") || n.includes("LEGA A")) return "it";
            if(n.includes("FRANSA") || n.includes("LIGUE 1") || n.includes("LNB PRO A")) return "fr";
            if(n.includes("AMERİKA") || n.includes("NBA") || n.includes("MLS") || n.includes("WNBA")) return "us";
            if(n.includes("AVRUPA") || n.includes("CHAMPIONS") || n.includes("EURO") || n.includes("EUROLEAGUE")) return "eu";
            if(n.includes("HOLLANDA") || n.includes("EREDIVISIE")) return "nl";
            if(n.includes("PORTEKİZ") || n.includes("PRIMEIRA")) return "pt";
            if(n.includes("BREZİLYA") || n.includes("BRAZIL")) return "br";
            if(n.includes("ARJANTİN") || n.includes("ARGENTINA")) return "ar";
            if(n.includes("RUSYA") || n.includes("VTB")) return "ru";
            return "un";
        }

        function humanReadableDate(dateString) {
            if(!dateString) return "";
            const parts = dateString.split('-');
            const target = new Date(parts[0], parts[1] - 1, parts[2]);
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const diffDays = Math.round((target - today) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return "BUGÜN";
            if (diffDays === 1) return "YARIN";
            
            const months = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
            return parts[2] + " " + months[parseInt(parts[1]) - 1];
        }

        // --- MENÜ VE FİLTRE YÖNETİMİ ---
        function switchMainTab(mode, element) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            const bArea = document.getElementById('section-bulletin');
            const sArea = document.getElementById('section-stream');
            const fArea = document.getElementById('section-finance');

            bArea.style.display = 'none';
            sArea.style.display = 'none';
            fArea.classList.remove('active');

            if(mode === 'futbol' || mode === 'basketbol') {
                currentSport = mode;
                currentMode = 'bulletin';
                bArea.style.display = 'block';
                document.getElementById('current-page-title').innerText = mode.toUpperCase() + " RADARI";
                buildFiltersAndMenus();
                applyFilters();
            } else if(mode === 'stream') {
                currentMode = 'stream';
                sArea.style.display = 'block';
                document.getElementById('current-page-title').innerText = "CANLI İZLEME MERKEZİ";
                if(!document.getElementById('stream-master-grid').innerHTML) initStreamLayout(6);
            } else if(mode === 'finance') {
                currentMode = 'finance';
                fArea.classList.add('active');
                document.getElementById('current-page-title').innerText = "USDT FİNANSAL TERMİNAL";
                refreshFinanceDashboard();
                setTimeout(renderApexChart, 200);
            }
        }

        function buildFiltersAndMenus() {
            const dateSel = document.getElementById('date-selector');
            const menuArea = document.getElementById('drop-options-list');
            
            // Tarihleri Doldur
            let dHtml = '<option value="ALL">TÜM TARİHLER</option>';
            const dates = [...new Set(masterData.filter(m => m.t === currentSport).map(m => m.dt))].sort();
            dates.forEach(d => {
                dHtml += `<option value="${d}">${humanReadableDate(d)}</option>`;
            });
            dateSel.innerHTML = dHtml;

            // Lig Dropdown Doldur
            let lHtml = `<div class="drop-item" onclick="handleLeagueSelection('ALL', 'TÜM LİGLER')">TÜM LİGLER</div>`;
            for(let ligName in leagueCounters) {
                // Lig spor ayrımı
                let isF = ["LİG", "PREMIER", "BUNDES", "SERIE", "LIGUE", "CHAMP", "EURO", "MLS", "EREDIVISIE", "PRIMEIRA", "BRAZIL", "ARGENTINA"].some(x => ligName.toUpperCase().includes(x));
                
                if((currentSport === 'futbol' && isF) || (currentSport === 'basketbol' && !isF)) {
                    if(leagueCounters[ligName] > 0) {
                        const flag = detectCountryFlag(ligName);
                        const ikon = currentSport === 'futbol' ? '⚽' : '🏀';
                        lHtml += `
                            <div class="drop-item" onclick="handleLeagueSelection('${ligName}', this.innerHTML)">
                                <img src="https://flagcdn.com/w40/${flag}.png"> 
                                <span>${ikon} ${ligName} (${leagueCounters[ligName]})</span>
                            </div>
                        `;
                    }
                }
            }
            menuArea.innerHTML = lHtml;
        }

        function toggleCustomDrop(e) {
            e.stopPropagation();
            const m = document.getElementById('drop-options-list');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function handleLeagueSelection(val, html) {
            activeLeagueFilter = val;
            document.getElementById('drop-selected-text').innerHTML = html;
            document.getElementById('drop-options-list').style.display = 'none';
            applyFilters();
        }

        function setSortMode(mode) {
            currentSortType = mode;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            applyFilters();
        }

        // --- RENDER (BÜLTEN ÇİZİMİ) ---
        function applyFilters() {
            if(currentMode !== 'bulletin') return;
            const area = document.getElementById('bulletin-render-area');
            const dVal = document.getElementById('date-selector').value;
            
            let filtered = masterData.filter(m => 
                m.t === currentSport && 
                (dVal === 'ALL' || m.dt === dVal) && 
                (activeLeagueFilter === 'ALL' || m.l === activeLeagueFilter)
            );
            
            let htmlBuffer = "";
            const dayGroups = {};
            
            filtered.forEach(m => {
                if(!dayGroups[m.dt]) dayGroups[m.dt] = [];
                dayGroups[m.dt].push(m);
            });

            Object.keys(dayGroups).sort().forEach(day => {
                htmlBuffer += `<div style="color:var(--green); font-size:0.75em; font-weight:900; padding:15px 0 5px 0; border-bottom:1px solid #1f1f23; margin-bottom:15px; letter-spacing:1px;">${humanReadableDate(day)}</div>`;
                
                if(currentSortType === 'time') {
                    // --- SAAT SIRALI MOD ---
                    dayGroups[day].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                        const f = detectCountryFlag(m.l);
                        htmlBuffer += `
                            <div class="match-row">
                                <div class="m-time">${m.tm}</div>
                                <div class="m-teams">
                                    ${m.m} 
                                    <img src="https://flagcdn.com/w40/${f}.png" class="flag">
                                    <span class="m-league-tag">${m.l}</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    // --- LİG SIRALI MOD ---
                    const groups = {};
                    dayGroups[day].forEach(m => {
                        if(!groups[m.l]) groups[m.l] = [];
                        groups[m.l].push(m);
                    });

                    // Ligleri o günkü ilk maç saatine göre sırala
                    let sortedLeagues = Object.keys(groups).sort((a,b) => {
                        let tA = groups[a].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        let tB = groups[b].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        return tA.localeCompare(tB);
                    });

                    sortedLeagues.forEach(lig => {
                        const f = detectCountryFlag(lig);
                        const uid = `id_${day}_${lig.replace(/[^a-zA-Z0-9]/g, '')}`;
                        const icon = currentSport === 'futbol' ? '⚽' : '🏀';
                        const clr = currentSport === 'futbol' ? '#fff' : 'var(--orange)';

                        htmlBuffer += `
                            <div class="league-card">
                                <div class="league-header" onclick="toggleLeagueAccordion('${uid}', this)">
                                    <div style="display:flex; align-items:center; gap:10px;">
                                        <span style="color:${clr}; font-size:1.2em;">${icon}</span>
                                        <span>${lig}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down chevron"></i>
                                </div>
                                <div id="${uid}" class="league-content">
                        `;

                        groups[lig].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                            htmlBuffer += `
                                <div class="match-item">
                                    <div class="m-time">${m.tm}</div>
                                    <div class="m-content">${m.m} <img src="https://flagcdn.com/w40/${f}.png" class="m-flag"></div>
                                </div>
                            `;
                        });

                        htmlBuffer += `</div></div>`;
                    });
                }
            });
            area.innerHTML = htmlBuffer;
        }

        // --- YAYIN SİSTEMİ ---
        function initStreamLayout(num) {
            const grid = document.getElementById('stream-master-grid');
            grid.className = `stream-container active grid-${num}`;
            grid.innerHTML = "";
            
            document.querySelectorAll('.btn-layout').forEach(b => b.classList.remove('active'));
            document.getElementById('lay-' + num).classList.add('active');

            for(let i=1; i<=num; i++) {
                grid.innerHTML += `
                    <div class="stream-unit">
                        <div class="stream-nav">
                            <input id="url-${i}" class="stream-url" placeholder="Yayın linkini yapıştırın...">
                            <button class="btn-stream-go" onclick="launchStream(${i})">İZLE</button>
                            <button class="btn-stream-stop" onclick="killStream(${i})"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <iframe id="frame-${i}" style="flex:1; border:none; background:#000;" src="about:blank" allowfullscreen></iframe>
                    </div>
                `;
            }
        }

        function launchStream(id) {
            const url = document.getElementById('url-' + id).value;
            if(url) document.getElementById('frame-' + id).src = url;
        }

        function killStream(id) {
            document.getElementById('url-' + id).value = "";
            document.getElementById('frame-' + id).src = "about:blank";
        }

        // --- FİNANSAL ZEKÂ ---
        function refreshFinanceDashboard() {
            document.getElementById('top-wallet').innerText = walletBalance.toFixed(2) + " USDT";
            document.getElementById('kpi-wallet').innerText = walletBalance.toFixed(2);

            const netProfit = completedLedger.reduce((sum, item) => sum + (item.pnl || 0), 0);
            document.getElementById('kpi-pnl').innerText = (netProfit >= 0 ? "+" : "") + netProfit.toFixed(2);
            document.getElementById('kpi-pnl').style.color = netProfit >= 0 ? 'var(--green)' : 'var(--red)';

            const totalBets = completedLedger.filter(x => x.res === 'win' || x.res === 'loss').length;
            const winCount = completedLedger.filter(x => x.res === 'win').length;
            const winRate = totalBets > 0 ? ((winCount / totalBets) * 100).toFixed(1) : 0;
            document.getElementById('kpi-winrate').innerText = "%" + winRate;

            renderLedgerTable();
        }

        function updateLedgerView(mode) {
            ledgerFilterMode = mode;
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + mode).classList.add('active');
            renderLedgerTable();
        }

        function renderLedgerTable() {
            const table = document.getElementById('ledger-data-table');
            let head = `<tr><th>TARİH</th><th>OPERASYON</th><th>RİSK</th><th>ORAN</th><th>DURUM</th><th>P/L</th></tr>`;
            let rows = "";
            
            const targetList = ledgerFilterMode === 'pend' ? pendingOps : completedLedger;

            if(targetList.length === 0) {
                rows = `<tr><td colspan="6" style="text-align:center; padding:40px; color:#444;">Kayıtlı veri bulunamadı.</td></tr>`;
            } else {
                targetList.forEach(item => {
                    const date = new Date(item.id).toLocaleDateString('tr-TR');
                    let statusHtml = `<span style="color:var(--muted); font-weight:800;">BEKLEMEDE</span>`;
                    let pnlVal = "-";

                    if(item.res === 'win') {
                        statusHtml = `<b style="color:var(--green)">KAZANÇ</b>`;
                        pnlVal = `<span style="color:var(--green)">+${item.pnl.toFixed(2)}</span>`;
                    } else if(item.res === 'loss') {
                        statusHtml = `<b style="color:var(--red)">KAYIP</b>`;
                        pnlVal = `<span style="color:var(--red)">${item.pnl.toFixed(2)}</span>`;
                    }

                    rows += `
                        <tr>
                            <td style="font-family:'JetBrains Mono';">${date}</td>
                            <td>${item.name}</td>
                            <td>$${item.amt.toFixed(2)}</td>
                            <td>@${item.odds.toFixed(2)}</td>
                            <td>${statusHtml}</td>
                            <td style="font-family:'JetBrains Mono';">${pnlVal}</td>
                            ${ledgerFilterMode === 'pend' ? `
                                <td style="text-align:right;">
                                    <button onclick="settleOperation(${item.id}, 'win')" style="color:var(--green); background:none; border:none; cursor:pointer; font-weight:900; margin-right:10px;">W</button>
                                    <button onclick="settleOperation(${item.id}, 'loss')" style="color:var(--red); background:none; border:none; cursor:pointer; font-weight:900;">L</button>
                                </td>
                            ` : ""}
                        </tr>
                    `;
                });
            }
            table.innerHTML = head + rows;
        }

        function executeNewOperation() {
            const name = document.getElementById('op-name').value;
            const amt = parseFloat(document.getElementById('op-amount').value);
            const odds = parseFloat(document.getElementById('op-odds').value);

            if(!name || isNaN(amt) || isNaN(odds)) {
                alert("Hata: Tüm alanları eksiksiz doldurun.");
                return;
            }

            const newOp = { id: Date.now(), name, amt, odds };
            pendingOps.push(newOp);
            
            saveAllData();
            refreshFinanceDashboard();
            
            document.getElementById('op-name').value = "";
            document.getElementById('op-amount').value = "";
            document.getElementById('op-odds').value = "";
        }

        function settleOperation(id, result) {
            const op = pendingOps.find(x => x.id === id);
            let pnl = 0;

            if(result === 'win') {
                pnl = (op.amt * op.odds) - op.amt;
                walletBalance += pnl;
            } else {
                pnl = -op.amt;
                walletBalance += pnl;
            }

            balanceHistory.push(walletBalance);
            completedLedger.unshift({...op, res: result, pnl: pnl, bal: walletBalance});
            pendingOps = pendingOps.filter(x => x.id !== id);

            saveAllData();
            refreshFinanceDashboard();
            renderApexChart();
        }

        function manualWalletReset() {
            const newVal = parseFloat(prompt("Yeni Kasa Değerini Girin:", walletBalance));
            if(!isNaN(newVal)) {
                walletBalance = newVal;
                balanceHistory.push(walletBalance);
                saveAllData();
                refreshFinanceDashboard();
                renderApexChart();
            }
        }

        function saveAllData() {
            localStorage.setItem('v19_w', walletBalance);
            localStorage.setItem('v19_h', JSON.stringify(balanceHistory));
            localStorage.setItem('v19_p', JSON.stringify(pendingOps));
            localStorage.setItem('v19_ledger', JSON.stringify(completedLedger));
        }

        // --- GRAFİK MOTORU ---
        let apexChartInstance;
        function renderApexChart() {
            if(apexChartInstance) apexChartInstance.destroy();
            
            const options = {
                series: [{ name: "USDT", data: balanceHistory }],
                chart: { 
                    type: 'area', 
                    height: '100%', 
                    toolbar: { show: false }, 
                    background: 'transparent',
                    animations: { enabled: true, speed: 600 }
                },
                theme: { mode: 'dark' },
                colors: [walletBalance >= balanceHistory[0] ? '#10b981' : '#ef4444'],
                stroke: { curve: 'straight', width: 3 },
                fill: {
                    type: 'gradient',
                    gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.05, stops: [0, 90, 100] }
                },
                xaxis: { labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
                yaxis: { 
                    opposite: true, 
                    labels: { style: { colors: '#71717a', fontSize: '10px', fontFamily: 'JetBrains Mono' } } 
                },
                grid: { borderColor: '#1f1f23', strokeDashArray: 4 },
                annotations: {
                    yaxis: [
                        { y: 1000, borderColor: '#333', label: { text: '$1K', style: { color: '#fff', background: '#333' } } },
                        { y: 10000, borderColor: '#fbbf24', label: { text: '$10K', style: { color: '#000', background: '#fbbf24' } } },
                        { y: 100000, borderColor: '#10b981', label: { text: '$100K', style: { color: '#000', background: '#10b981' } } }
                    ]
                }
            };

            apexChartInstance = new ApexCharts(document.querySelector("#main-finance-chart"), options);
            apexChartInstance.render();
        }

        // --- YARDIMCI GÖRSEL FONKSİYONLAR ---
        function toggleLeagueAccordion(id, el) {
            const content = document.getElementById(id);
            const icon = el.querySelector('.chevron');
            const isHidden = content.style.display === 'none';
            
            content.style.display = isHidden ? 'block' : 'none';
            icon.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
        }

        document.addEventListener('click', () => {
            const drop = document.getElementById('drop-options-list');
            if(drop) drop.style.display = 'none';
        });

        // BAŞLAT
        initializeTerminal();
    </script>
</body>
</html>
