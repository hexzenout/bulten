<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 COMMAND CENTER v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap');
        
        :root { 
            --gold: #f59e0b; --silver: #9ca3af; --bronze: #b45309; 
            --bg: #09090b; --panel: #121214; --green: #10b981; 
            --border: #27272a; --text: #f4f4f5; --muted: #71717a;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #0c0c0e; border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; }
        .brand { padding: 30px; font-weight: 900; font-size: 1.4em; color: var(--green); letter-spacing: -1px; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 20px 30px; cursor: pointer; color: var(--muted); font-weight: 700; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: #18181b; color: #fff; }
        .nav-item.active { background: rgba(16, 185, 129, 0.1); color: var(--green); border-right: 4px solid var(--green); }
        
        /* Main Area */
        .main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); }
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .content { flex-grow: 1; padding: 30px 40px; overflow-y: auto; scroll-behavior: smooth; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { 
            padding: 10px 24px; background: var(--panel); border: 1px solid var(--border); 
            cursor: pointer; border-radius: 8px; color: var(--muted); font-weight: 700; font-size: 0.85em; transition: 0.2s;
        }
        .tab.active.gold { border-color: var(--gold); color: var(--gold); background: rgba(245,158,11,0.1); }
        .tab.active.silver { border-color: var(--silver); color: var(--silver); background: rgba(156,163,175,0.1); }
        .tab.active.bronze { border-color: var(--bronze); color: var(--bronze); background: rgba(180,83,9,0.1); }

        /* Accordion (Lig Grupları) */
        .league-acc { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--panel); }
        .acc-header { 
            padding: 18px 25px; background: #18181b; cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.95em;
        }
        .acc-header:hover { background: #202023; }
        .acc-content { display: none; padding: 20px; background: var(--bg); border-top: 1px solid var(--border); }
        .acc-content.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; }

        /* Match Card */
        .card { background: var(--panel); border: 1px solid var(--border); padding: 18px; border-radius: 8px; position: relative; }
        .match-time { font-family: 'JetBrains Mono', monospace; font-size: 0.75em; color: var(--green); margin-bottom: 8px; display: block; }
        .match-teams { font-weight: 800; font-size: 1.05em; margin-bottom: 12px; }
        .alert-box { font-size: 0.8em; color: var(--muted); border-top: 1px solid var(--border); pt: 10px; margin-top: 10px; }

        .clock { font-family: 'JetBrains Mono'; color: var(--green); font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">V19 COMMAND</div>
        <div class="nav-item active" onclick="setSport('futbol', this)"><span>⚽</span> FUTBOL RADARI</div>
        <div class="nav-item" onclick="setSport('basketbol', this)"><span>🏀</span> BASKETBOL RADARI</div>
    </div>
    
    <div class="main">
        <div class="header">
            <h2 id="title" style="margin:0; font-weight:900;">⚽ FUTBOL</h2>
            <div class="clock" id="clock">BAĞLANTI KURULUYOR...</div>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab active gold" onclick="setCategory('ALTIN', this)">🏆 ALTIN</button>
                <button class="tab" onclick="setCategory('GÜMÜŞ', this)">🥈 GÜMÜŞ</button>
                <button class="tab" onclick="setCategory('BRONZ', this)">🥉 BRONZ</button>
            </div>
            <div id="content-area"></div>
        </div>
    </div>

    <script>
        let currentSport = 'futbol', currentCategory = 'ALTIN', allData = [];

        const countryMap = {
            "SUPER LIG": { f: "🇹🇷", c: "Türkiye" }, "BSL": { f: "🇹🇷", c: "Türkiye" },
            "PREMIER LEAGUE": { f: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", c: "İngiltere" }, "LA LIGA": { f: "🇪🇸", c: "İspanya" },
            "LIGA ACB": { f: "🇪🇸", c: "İspanya" }, "BUNDESLIGA": { f: "🇩🇪", c: "Almanya" },
            "BBL": { f: "🇩🇪", c: "Almanya" }, "SERIE A": { f: "🇮🇹", c: "İtalya" },
            "LEGA A": { f: "🇮🇹", c: "İtalya" }, "LIGUE 1": { f: "🇫🇷", c: "Fransa" },
            "LNB PRO A": { f: "🇫🇷", c: "Fransa" }, "EREDIVISIE": { f: "🇳🇱", c: "Hollanda" },
            "PRIMEIRA LIGA": { f: "🇵🇹", c: "Portekiz" }, "NBA": { f: "🇺🇸", c: "ABD" },
            "NCAA": { f: "🇺🇸", c: "ABD" }, "WNBA": { f: "🇺🇸", c: "ABD" }, "MLS": { f: "🇺🇸", c: "ABD" },
            "CHAMPIONS LEAGUE": { f: "🇪🇺", c: "Avrupa" }, "EUROPA LEAGUE": { f: "🇪🇺", c: "Avrupa" },
            "CONFERENCE LEAGUE": { f: "🇪🇺", c: "Avrupa" }, "EUROLEAGUE": { f: "🇪🇺", c: "Avrupa" },
            "EUROCUP": { f: "🇪🇺", c: "Avrupa" }, "BCL": { f: "🇪🇺", c: "Avrupa" },
            "HEBA A1": { f: "🇬🇷", c: "Yunanistan" }, "VTB": { f: "🇷🇺", c: "Rusya" },
            "SERIE A (BRAZIL)": { f: "🇧🇷", c: "Brezilya" }, "PRIMERA DIVISION (ARGENTINA)": { f: "🇦🇷", c: "Arjantin" }
        };

        const basketLigleri = ["NBA", "EUROLEAGUE", "ACB", "LEGA A", "LNB", "BBL", "NCAA", "WNBA", "EUROCUP", "BSL", "HEBA", "VTB", "BCL"];

        async function update() {
            try {
                const res = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const data = await res.json();
                document.getElementById('clock').innerText = "LAST_SCAN: " + data.son_guncelleme;
                allData = data.veriler || [];
                render();
            } catch(e) { console.log("Fetch error"); }
        }

        function render() {
            const area = document.getElementById('content-area'); area.innerHTML = "";
            const now = new Date();
            const nextWeek = new Date(); nextWeek.setDate(now.getDate() + 7);

            // Filtrele: Spor + Kategori + Tarih (7 Gün Sınırı)
            const filtered = allData.filter(m => {
                const isBasket = basketLigleri.some(b => m.lig.toUpperCase().includes(b));
                const matchSport = isBasket ? 'basketbol' : 'futbol';
                
                // Tarih Kontrolü
                let matchDate = new Date(); // Varsayılan bugün
                const timeStr = m.uyari.match(/\d{2}:\d{2}/);
                // Not: The Odds API tarihini tam parse etmek için Python'dan tam ISO tarihini yollamalıyız, 
                // ancak şimdilik "Dünya Kupası" gibi uzak ligleri isimden engelliyoruz.
                const isTooFar = m.lig.toUpperCase().includes("WORLD CUP");

                return matchSport === currentSport && m.kategori.toUpperCase() === currentCategory && !isTooFar;
            });

            const grouped = {};
            filtered.forEach(m => { if (!grouped[m.lig]) grouped[m.lig] = []; grouped[m.lig].push(m); });

            for (let lig in grouped) {
                let info = { f: "🏳️", c: "INT" };
                for (let k in countryMap) { if (lig.toUpperCase().includes(k)) { info = countryMap[k]; break; } }
                
                // Maçları Saate Göre Sırala
                grouped[lig].sort((a, b) => a.uyari.localeCompare(b.uyari));

                let acc = document.createElement('div');
                acc.className = 'league-acc';
                acc.innerHTML = `
                    <div class="acc-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span>${info.f} ${info.c.toUpperCase()} - ${lig}</span>
                        <span style="color:var(--muted)">${grouped[lig].length} MAÇ ▾</span>
                    </div>
                    <div class="acc-content"></div>
                `;

                const content = acc.querySelector('.acc-content');
                grouped[lig].forEach(m => {
                    let cleanMsg = m.uyari.replace(" (UTC)", "");
                    let tMatch = cleanMsg.match(/\d{2}:\d{2}/);
                    if(tMatch) {
                        let [h, min] = tMatch[0].split(':');
                        let trH = (parseInt(h) + 3) % 24;
                        cleanMsg = cleanMsg.replace(tMatch[0], trH.toString().padStart(2, '0') + ":" + min + " (TSİ)");
                    }
                    content.innerHTML += `
                        <div class="card">
                            <span class="match-time">⏱ ${cleanMsg.match(/\d{2}:\d{2} \(TSİ\)/) || ""}</span>
                            <div class="match-teams">${m.mac}</div>
                            <div class="alert-box">${cleanMsg.split('|').pop()}</div>
                        </div>
                    `;
                });
                area.appendChild(acc);
            }
        }

        function setSport(s, el) { 
            currentSport = s; 
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('title').innerText = s === 'futbol' ? '⚽ FUTBOL' : '🏀 BASKETBOL';
            render(); 
        }
        function setCategory(c, el) { 
            currentCategory = c; 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active', 'gold', 'silver', 'bronze'));
            el.classList.add('active', c.toLowerCase() === 'altın' ? 'gold' : c.toLowerCase() === 'gümüş' ? 'silver' : 'bronze');
            render(); 
        }
        setInterval(update, 15000); update();
    </script>
</body>
</html>
