<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | SUPREME COMMAND CENTER OMEGA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <style>
        /* ==========================================================================
           V19 SUPREME STYLING SYSTEM v23.0 (CENTERED LAYOUT & OVERLAY MENU)
           ========================================================================== */
        
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');

        :root { 
            --gold: #fbbf24; 
            --gold-glow: rgba(251, 191, 36, 0.3);
            --green: #10b981; 
            --green-dark: #065f46;
            --red: #ef4444; 
            --orange: #f97316; 
            --blue-accent: #3b82f6;
            
            --bg: #0f0f0f; 
            --panel: #161616; 
            --border: #272727; 
            --border-bright: #3f3f3f;
            
            --text: #f1f1f1; 
            --muted: #aaaaaa;
            
            --transition-fast: all 0.2s ease;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        html, body { 
            width: 100vw; height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column; 
        }

        /* ==========================================================================
           HEADER & TOP STATUS BAR
           ========================================================================== */
        .top-status-bar { 
            width: 100%; padding: 0 25px; display: flex; align-items: center; 
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-bright); 
            height: 60px; flex-shrink: 0; z-index: 8000; position: relative;
        }

        .header-controls { display: flex; align-items: center; gap: 15px; }

        /* KÜÇÜLTÜLMÜŞ, YOUTUBE TARZI HAMBURGER BUTONU */
        .small-menu-btn {
            background: transparent; border: none; color: var(--text);
            font-size: 1.2em; padding: 8px 12px; border-radius: 50%; cursor: pointer; transition: var(--transition-fast);
        }
        .small-menu-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* ZARİF BAŞLIK YAPISI */
        .header-title-box { display: flex; align-items: center; font-size: 0.95em; font-weight: 700; letter-spacing: 0.5px; }
        .home-link { color: var(--text); text-decoration: none; margin-right: 8px; transition: var(--transition-fast); display: flex; align-items: center; gap: 8px;}
        .home-link i { font-size: 1.1em; color: var(--gold); }
        .home-link:hover { color: var(--gold); }
        .module-name { color: var(--muted); margin-left: 5px; font-weight: 500;}

        /* ==========================================================================
           AŞAĞI AÇILAN ZARİF MENÜ (OVERLAY PENCERE)
           ========================================================================== */
        .accordion-menu {
            position: absolute;
            top: 65px;
            left: 20px;
            width: 250px;
            background: #161616;
            border: 1px solid var(--border-bright);
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .accordion-menu.active-menu {
            max-height: 500px;
            opacity: 1;
            padding: 10px;
        }

        .nav-container { display: flex; flex-direction: column; gap: 4px; width: 100%; }

        .nav-link { 
            padding: 10px 15px; cursor: pointer; color: var(--text); font-weight: 500; font-size: 0.85em; 
            display: flex; align-items: center; transition: var(--transition-fast);
            border-radius: 8px;
        }
        .nav-link i { margin-right: 15px; font-size: 1.2em; width: 25px; text-align: center; color: var(--muted); transition: 0.2s;}
        .nav-link:hover { background: rgba(255, 255, 255, 0.1); }
        
        .nav-link.active { background: rgba(255, 255, 255, 0.15); font-weight: 700; }
        .nav-link.active i { color: var(--text); }
        .nav-link.basket.active i { color: var(--orange); }
        .nav-link.stream.active i { color: var(--gold); }
        .nav-link.favs.active i { color: var(--red); }
        .nav-link.finance.active i { color: var(--green); }

        /* ==========================================================================
           ANA EKRAN & ORTALANMIŞ BÜLTEN (CENTERED WRAPPER)
           ========================================================================== */
        .main-viewport { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .main-scroll-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            background: #0f0f0f;
            display: flex;
            justify-content: center; /* İÇERİĞİ EKRANIN ORTASINA HİZALAR */
        }

        /* İŞTE BÜLTENİ ORTALAYAN VE DARALTAN ANA KUTU */
        .center-wrapper {
            width: 100%;
            max-width: 950px; /* BÜLTENİN GENİŞLİĞİ BURADAN KONTROL EDİLİR */
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        /* DEV EKRAN MODU (CANLI YAYIN İÇİN) */
        body.dev-mode .center-wrapper { max-width: 100%; padding: 15px; }
        body.dev-mode .stream-master-grid { height: calc(100vh - 120px); }

        /* ==========================================================================
           RADAR KONTROL PANELİ
           ========================================================================== */
        .controls-wrapper { margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px; }
        .filter-panel { display: flex; gap: 15px; align-items: center; background: #161616; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); }

        .select-supreme { background: #272727; border: 1px solid #3f3f3f; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 0.85em; font-weight: 600; cursor: pointer; min-width: 200px; }
        
        .league-drop-wrapper { position: relative; min-width: 300px; }
        .league-drop-trigger { background: #272727; border: 1px solid #3f3f3f; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 0.85em; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .league-drop-menu { display: none; position: absolute; top: 115%; left: 0; right: 0; background: #282828; border: 1px solid #3f3f3f; z-index: 5000; max-height: 400px; overflow-y: auto; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .league-drop-item { padding: 12px 16px; font-size: 0.85em; display: flex; align-items: center; cursor: pointer; color: #fff; border-bottom: 1px solid #333; }
        .league-drop-item:last-child { border-bottom: none; }
        .league-drop-item:hover { background: #3f3f3f; color: var(--gold); }
        .league-drop-item img { width: 20px; height: 13px; margin-right: 12px; border-radius: 2px; }

        .mode-row { display: flex; gap: 10px; }
        .btn-mode-supreme { background: #272727; border: 1px solid transparent; color: var(--muted); padding: 10px 25px; border-radius: 8px; font-size: 0.8em; font-weight: 700; cursor: pointer; transition: 0.2s; letter-spacing: 1px; text-transform: uppercase; }
        .btn-mode-supreme.active { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* ==========================================================================
           MATCH RENDER ENGINE (RESİMDEKİ GİBİ LİG BAŞLIKLI TASARIM)
           ========================================================================== */
        .league-container-pro { margin-bottom: 15px; border-radius: 10px; overflow: hidden; background: #161616; border: 1px solid var(--border); }
        
        .league-header-bar { 
            background: #212121; padding: 12px 20px; font-weight: 800; font-size: 0.75em; color: #fff; 
            display: flex; align-items: center; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2a2a;
        }
        
        .match-row-pro { display: flex; align-items: center; padding: 12px 20px; font-size: 0.85em; transition: 0.2s; }
        .match-row-pro:hover { background: #222; }
        
        .match-clock-sup { font-family: 'JetBrains Mono'; color: var(--green); width: 60px; font-weight: 800; font-size: 1.05em; }
        .match-teams-main { font-weight: 600; flex-grow: 1; display: flex; align-items: center; gap: 12px; color: #eee; }
        .match-flag-sup { width: 18px; border-radius: 2px; }
        .fav-star-box { font-size: 1.2em; color: #333; cursor: pointer; margin-right: 15px; transition: 0.2s; }
        .fav-star-box.active { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }

        /* ==========================================================================
           CANLI YAYIN MERKEZİ
           ========================================================================== */
        .stream-controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #161616; padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border); }
        .layout-btn-group { display: flex; gap: 10px; }
        .btn-stream-layout { background: #272727; color: var(--muted); border: 1px solid #333; padding: 8px 25px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.8em; }
        .btn-stream-layout.active { background: var(--green); color: #000; border-color: var(--green); box-shadow: 0 0 15px var(--green-glow); }
        .btn-channel-mgr { background: #272727; color: #fff; border: 1px solid #3f3f3f; padding: 8px 15px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.8em; }
        .btn-dev-ekran { background: rgba(251, 191, 36, 0.1); color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.8em; }

        .stream-master-grid { display: none; gap: 15px; height: calc(100vh - 250px); width: 100%; }
        .stream-master-grid.active { display: grid; }
        .m-lay-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .m-lay-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        .m-lay-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .m-lay-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }

        .matrix-unit { background: #000; border: 1px solid #272727; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .matrix-nav { padding: 8px; background: #1a1a1a; display: flex; gap: 8px; border-bottom: 1px solid #272727; align-items: center; }

        /* ==========================================================================
           FINANCE & EXCEL MODÜLLERİ
           ========================================================================== */
        .fin-terminal-wrapper { display: none; grid-template-columns: 1fr 400px; gap: 30px; height: 100%; }
        .fin-terminal-wrapper.active { display: grid; }
        .fin-scroller-pane { overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-right:10px; }
        
        .rolling-grand-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .rolling-box-btn { background: #161616; border: 1px solid #272727; padding: 15px 10px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; border-top: 3px solid var(--muted); }
        .rolling-box-btn:hover { border-top-color: var(--gold); background: #222; transform: translateY(-2px); }
        .rolling-box-btn label { font-size: 0.65em; font-weight: 700; color: var(--muted); display: block; margin-bottom: 5px; }
        .rolling-box-btn b { color: var(--gold); font-size: 1.1em; font-family: 'JetBrains Mono'; font-weight: 800;}

        .custom-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; backdrop-filter: blur(10px); }
        .modal-header { padding: 20px 30px; background: #0f0f0f; border-bottom: 1px solid var(--border-bright); display: flex; justify-content: space-between; align-items: center; }
        .btn-modal-back { background: #272727; color: #fff; border: 1px solid #3f3f3f; padding: 8px 20px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 0.8em; }
        .btn-modal-back:hover { background: var(--red); border-color: var(--red); }

        .excel-table-wrapper { flex-grow: 1; overflow: auto; padding: 20px; }
        .excel-table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        .excel-table th, .excel-table td { border: 1px solid #272727; padding: 6px; text-align: center; vertical-align: top; }
        .excel-table th { background: #1a1a1a; color: var(--muted); font-size: 0.7em; letter-spacing: 1px; padding: 10px; text-transform: uppercase; }
        .excel-table td.day-col { vertical-align: middle; font-weight: 800; color: var(--gold); background: #000; width: 70px; font-size: 0.85em; }
        .excel-table td.bal-col { vertical-align: middle; font-weight: 800; color: #fff; background: #000; width: 110px; font-family: 'JetBrains Mono'; font-size: 1em; }

        .op-slot { background: #050505; border: 1px solid #222; padding: 6px; border-radius: 6px; display: flex; flex-direction: column; gap: 4px; min-width: 90px; }
        .op-slot-inputs { display: flex; gap: 4px; }
        .op-slot-inputs input { width: 50%; background: #161616; border: 1px solid #333; color: #fff; font-size: 0.8em; padding: 4px; text-align: center; border-radius: 4px; font-weight: bold; }
        .op-actions { display: flex; gap: 4px; }
        .btn-slot-w { background: var(--green-dark); color: #fff; border: none; flex: 1; padding: 4px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 0.7em; }
        .btn-slot-l { background: #7f1d1d; color: #fff; border: none; flex: 1; padding: 4px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 0.7em; }

        .slot-resolved { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 50px; border-radius: 6px; position: relative; font-family: 'JetBrains Mono'; }
        .slot-resolved.win { background: rgba(16, 185, 129, 0.15); border: 1px solid var(--green); color: var(--green); }
        .slot-resolved.loss { background: rgba(239, 68, 68, 0.15); border: 1px solid var(--red); color: var(--red); }
        .btn-undo { position: absolute; top: 2px; right: 2px; background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.8em; }

        /* KPI & CHART */
        .global-kpi-hub { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;}
        .kpi-card-supreme { background: #161616; border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: center; }
        .kpi-card-supreme span { font-size: 0.6em; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: 700; }
        .kpi-card-supreme b { font-size: 1.4em; color: #fff; font-family: 'JetBrains Mono'; }
        
        .op-input-box { background: #161616; border: 1px solid var(--border); padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; border-bottom: 3px solid var(--green); }
        .btn-op-fire { background: var(--green); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 0.85em; letter-spacing: 1px; transition: 0.2s; }
        
        .supreme-data-table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        .supreme-data-table th { background: #161616; padding: 12px; text-align: left; color: var(--muted); border-bottom: 1px solid #333; font-weight: 700; }
        .supreme-data-table td { padding: 10px 12px; border-bottom: 1px solid #222; color: #e4e4e9; font-family: 'JetBrains Mono'; }
        
        .modal-config-bar { padding: 15px 30px; background: #111; border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        .config-item { display: flex; align-items: center; gap: 8px; background: #000; padding: 8px 12px; border-radius: 6px; border: 1px solid #222; }
        .config-item label { color: var(--muted); font-weight: 700; font-size: 0.7em; }
        .config-item input { background: transparent; border: none; border-bottom: 1px solid var(--border-bright); color: var(--green); font-family: 'JetBrains Mono'; font-size: 1em; font-weight: 800; padding: 2px; width: 60px; text-align: center; }
        .config-item .display-val { font-family: 'JetBrains Mono'; font-size: 1.1em; font-weight: 800; color: #fff; }
    </style>
</head>
<body>

    <header class="top-status-bar">
        <div class="header-controls">
            <button class="small-menu-btn" id="menu-trigger-btn" onclick="omega_ToggleSidebar()" title="Menüyü Aç">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="header-title-box">
                <a href="https://hexzenout.github.io/bulten/" class="home-link">
                    <i class="fa-solid fa-house"></i> ANA SAYFA
                </a>
                <span class="module-name" id="active-module-name">/ FUTBOL</span>
            </div>
        </div>
    </header>

    <nav class="accordion-menu" id="main-dropdown-nav">
        <div class="nav-container">
            <div class="nav-link active" id="nav-futbol" onclick="omega_SwitchMainTab('futbol', this)">
                <i class="fa-solid fa-futbol"></i> FUTBOL
            </div>
            <div class="nav-link basket" id="nav-basketbol" onclick="omega_SwitchMainTab('basketbol', this)">
                <i class="fa-solid fa-basketball"></i> BASKETBOL
            </div>
            <div class="nav-link stream" id="nav-stream" onclick="omega_SwitchMainTab('stream', this)">
                <i class="fa-solid fa-satellite-dish"></i> CANLI YAYIN
            </div>
            <div class="nav-link favs" id="nav-favs" onclick="omega_SwitchMainTab('favs', this)">
                <i class="fa-solid fa-star"></i> FAVORİLERİM
            </div>
            <div class="nav-link finance" id="nav-finance" onclick="omega_SwitchMainTab('finance', this)">
                <i class="fa-solid fa-wallet"></i> KASA YÖNETİMİ
            </div>
        </div>
    </nav>

    <main class="main-viewport">
        <section class="main-scroll-box">
            
            <div class="center-wrapper">
                
                <div id="omega-radar-block">
                    <div class="controls-wrapper">
                        <div class="filter-panel">
                            <select id="v19-date-select" class="select-supreme" onchange="omega_ExecuteRadarFilter()">
                                <option value="ALL">TÜM TARİHLER</option>
                            </select>
                            <div class="league-drop-wrapper">
                                <div class="league-drop-trigger" id="drop-trigger" onclick="omega_ToggleLeagueDrop(event)">
                                    <div id="drop-text-label">TÜM LİGLER</div>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </div>
                                <div class="league-drop-menu" id="drop-menu-list"></div>
                            </div>
                        </div>
                        <div class="mode-row">
                            <button class="btn-mode-supreme active" id="btn-sort-league" onclick="omega_SetSortMode('league')">LİG SIRALI AKIŞ</button>
                            <button class="btn-mode-supreme" id="btn-sort-time" onclick="omega_SetSortMode('time')">SAAT SIRALI AKIŞ</button>
                        </div>
                    </div>
                    <div id="radar-render-output"></div>
                </div>

                <div id="omega-favs-block" style="display:none;"><div id="favs-render-output"></div></div>

                <div id="omega-stream-block" style="display:none;">
                    <div class="stream-controls-bar">
                        <div class="layout-btn-group">
                            <button class="btn-stream-layout" id="lay-btn-1" onclick="omega_BuildStreamMatrix(1)">1</button>
                            <button class="btn-stream-layout" id="lay-btn-2" onclick="omega_BuildStreamMatrix(2)">2</button>
                            <button class="btn-stream-layout" id="lay-btn-4" onclick="omega_BuildStreamMatrix(4)">4</button>
                            <button class="btn-stream-layout active" id="lay-btn-6" onclick="omega_BuildStreamMatrix(6)">6</button>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-channel-mgr" onclick="omega_OpenChannelManager()">KANAL LİSTESİ</button>
                            <button class="btn-dev-ekran" id="btn-theater-mode" onclick="omega_ToggleDevEkran()">DEV EKRAN</button>
                        </div>
                    </div>
                    <div id="omega-matrix-grid" class="stream-master-grid m-lay-6 active"></div>
                </div>

                <div class="fin-terminal-wrapper" id="v19-finance-block">
                    <div class="fin-scroller-pane">
                        <div class="rolling-grand-grid">
                            <div class="rolling-box-btn" onclick="omega_OpenRollingExcel(7)"><label>7 GÜN</label><b>ROLLING</b></div>
                            <div class="rolling-box-btn" onclick="omega_OpenRollingExcel(15)"><label>15 GÜN</label><b>ROLLING</b></div>
                            <div class="rolling-box-btn" onclick="omega_OpenRollingExcel(30)"><label>30 GÜN</label><b>ROLLING</b></div>
                            <div class="rolling-box-btn" onclick="omega_OpenRollingExcel(60)"><label>60 GÜN</label><b>ROLLING</b></div>
                            <div class="rolling-box-btn" onclick="omega_OpenRollingExcel(90)"><label>90 GÜN</label><b>ROLLING</b></div>
                        </div>
                        <div class="ledger-supreme-pro" style="background:#161616;">
                            <div style="padding:15px 20px; font-weight:800; color:var(--gold); border-bottom:1px solid #272727; font-size:0.85em;">OPERASYON GEÇMİŞİ</div>
                            <div style="overflow-y:auto; max-height:350px;">
                                <table class="supreme-data-table" id="omega-data-table"></table>
                            </div>
                        </div>
                    </div>
                    <div class="finance-right-pane">
                        <div class="global-kpi-hub">
                            <div class="kpi-card-supreme"><span>KASA</span><b id="kpi-val-w">100.00</b></div>
                            <div class="kpi-card-supreme"><span>NET P/L</span><b id="kpi-val-p">0.00</b></div>
                            <div class="kpi-card-supreme"><span>SUCCESS</span><b id="kpi-val-wr">%0</b></div>
                        </div>
                        <div id="omega-apex-chart-main" style="height:250px; background:#161616; border-radius:10px; border:1px solid #272727; padding:10px;"></div>
                        
                        <div class="op-input-box">
                            <input type="text" id="op-in-name" class="select-supreme" style="width:100%" placeholder="İŞLEM KODU / ADI">
                            <div style="display:flex; gap:10px;">
                                <input type="number" id="op-in-amt" class="select-supreme" style="flex:1" placeholder="USDT">
                                <input type="number" id="op-in-odds" class="select-supreme" style="flex:1" placeholder="ORAN">
                            </div>
                            <button class="btn-op-fire" onclick="omega_CommitNewOperation()">İŞLEMİ BAŞLAT</button>
                        </div>
                    </div>
                </div>

            </div> </section>
    </main>

    <div id="rolling-excel-overlay" class="custom-modal-overlay">

            <h2 id="excel-modal-title">ROLLING EXCEL</h2>
            <button class="btn-modal-back" onclick="omega_CloseRollingExcel()">KAPAT</button>

            <div class="config-item"><label>HEDEF:</label><span class="display-val" id="excel-target-bal">$1000</span></div>
            <div class="config-item"><label>GÜNCEL:</label><span class="display-val" id="excel-current-bal">$100</span></div>
            <div class="config-item" style="margin-left:auto;"><label>P/L:</label><span id="excel-pnl" class="display-val">$0.00</span></div>
        </div>

            <table class="excel-table">
                <thead><tr><th>GÜN</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>GÜN SONU</th></tr></thead>

            </table>

    <div id="channel-manager-overlay" class="custom-modal-overlay">
        <div class="modal-header"><h2>KANAL LİSTESİ YÖNETİMİ</h2><button class="btn-modal-back" onclick="omega_CloseChannelManager()">KAPAT</button></div>
        <div class="modal-body-wrapper">
            <div style="display:flex; gap:10px; margin-bottom:20px; background:#161616; padding:15px; border-radius:10px; border:1px solid #272727;">
                <input type="text" id="new-ch-name" class="select-supreme" placeholder="Kanal Adı">
                <input type="text" id="new-ch-url" class="select-supreme" style="flex:1" placeholder="Yayın URL (M3U8 / EMBED)">
                <button class="btn-op-fire" onclick="omega_AddCustomChannel()" style="padding:0 25px; margin:0;">EKLE</button>
            </div>
            <table class="supreme-data-table" style="width:100%; border-collapse:collapse;"><tbody id="channel-table-body"></tbody></table>
        </div>
    </div>
    <script>
        // --- 1. KÜRESEL SİSTEM DEĞİŞKENLERİ ---
        let _MASTER_DB = [];
        let _LEAGUE_STATS_DB = {};
        
        let _ACTIVE_SPORT = 'futbol';
        let _ACTIVE_TAB = 'bulletin';
        let _ACTIVE_LEAGUE_FILTER = 'ALL';
        let _ACTIVE_SORT_MODE = 'league'; 
        let _ACTIVE_LEDGER_TAB = 'pend';
        
        let _ACTIVE_EXCEL_DAYS = 7;
        let _IS_DEV_EKRAN = false;

        // --- 2. LOCALSTORAGE (KALICI HAFIZA) VERİTABANI BAĞLANTILARI ---
        let _WALLET_BALANCE = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let _BALANCE_HISTORY = JSON.parse(localStorage.getItem('v19_h')) || [100.00];
        let _PENDING_OPS = JSON.parse(localStorage.getItem('v19_p')) || [];
        let _COMPLETED_LEDGER = JSON.parse(localStorage.getItem('v19_l')) || [];
        let _FAV_MATCHES = JSON.parse(localStorage.getItem('v19_fav_m')) || [];
        
        let _ROLLING_DB = JSON.parse(localStorage.getItem('v19_rolling')) || {};
        let _CHANNELS_DB = JSON.parse(localStorage.getItem('v19_channels')) || []; 

        // --- 3. HİYERARŞİ VE KURAL SETLERİ ---
        const HIERARCHY_SCORES = {
            "TÜRKİYE - SÜPER LİG": 4000, "İNGİLTERE - PREMIER LEAGUE": 3900, "İSPANYA - LA LIGA": 3800,
            "ALMANYA - BUNDESLIGA": 3700, "İTALYA - SERIE A": 3600, "FRANSA - LIGUE 1": 3500,
            "AVRUPA - CHAMPIONS LEAGUE": 3400, "AVRUPA - EUROPA LEAGUE": 3300, "AVRUPA - CONFERENCE LEAGUE": 3200,
            "AVRUPA - EUROLEAGUE": 4900, "AMERİKA - NBA": 4800, "TÜRKİYE - BSL": 4700,
            "İSPANYA - LIGA ACB": 4600, "İTALYA - LEGA A": 4500, "FRANSA - LNB PRO A": 4400,
            "ALMANYA - BBL": 4300, "AVRUPA - EUROCUP": 4200, "AVRUPA - BCL": 4100,
            "AMERİKA - NCAA": 4000, "RUSYA - VTB": 3900, "AMERİKA - WNBA": 3800
        };

        const GOLD_BASKET_LIST = [
            "AMERİKA - NBA", "AVRUPA - EUROLEAGUE", "TÜRKİYE - BSL", "İSPANYA - LIGA ACB",
            "İTALYA - LEGA A", "FRANSA - LNB PRO A", "ALMANYA - BBL", "AVRUPA - EUROCUP",
            "AVRUPA - BCL", "AMERİKA - NCAA", "RUSYA - VTB", "AMERİKA - WNBA"
        ];

        const ROLLING_TARGETS = {
            7: 1000, 15: 5000, 30: 15000, 60: 40000, 90: 100000
        };

        // --- 4. URL YÖNLENDİRME MOTORU (HASH ROUTING) ---
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.replace('#', '') || 'futbol';
            const validTabs = ['futbol', 'basketbol', 'stream', 'favs', 'finance'];
            
            if (validTabs.includes(hash)) {
                const targetElement = document.getElementById('nav-' + hash);
                omega_SwitchMainTab(hash, targetElement, false);
            } else {
                omega_SwitchMainTab('futbol', document.getElementById('nav-futbol'), false);
            }
            omega_InitializeEngine();
        });

        window.addEventListener('popstate', (e) => {
            if(e.state && e.state.tab) {
                const targetElement = document.getElementById('nav-' + e.state.tab);
                if(targetElement) {
                    omega_SwitchMainTab(e.state.tab, targetElement, false);
                }
            }
        });

        // --- 5. ANA MOTOR BAŞLATICI (BOOTSTRAP) ---
        async function omega_InitializeEngine() {
            console.log("V23 Supreme Engine Booting...");
            try {
                // nocache parametresi ile her zaman en taze veriyi alır
                const response = await fetch('v19_rapor.json?nocache=' + Date.now());
                const data = await response.json();
                
                _MASTER_DB = data.veriler || []; 
                _LEAGUE_STATS_DB = data.sayac || {};
                
                omega_BuildUIComponents(); 
                omega_ExecuteRadarFilter(); 
                omega_RefreshFinanceDashboard(); 
                
            } catch (err) {
                console.error("Critical: Data Sync Failure.", err);
                document.getElementById('radar-render-output').innerHTML = `
                    <div style="padding:150px 0; text-align:center;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:4em; color:var(--red); margin-bottom:20px;"></i>
                        <h2 style="font-weight:900; letter-spacing:2px; color:#fff;">RADAR ÇEVRİMDIŞI</h2>
                        <p style="color:var(--muted); margin-top:10px; font-size:0.9em;">v19_rapor.json dosyasına ulaşılamıyor.</p>
                    </div>
                `;
            }
        }

        // --- 6. GENEL ARAÇLAR (UTILITIES) ---
        function omega_IsBasketballLeague(leagueName) {
            const up = leagueName.toUpperCase();
            return ["NBA", "EUROLEAGUE", "BSL", "ACB", "LEGA A", "LNB", "BBL", "EUROCUP", "BCL", "VTB", "NCAA", "WNBA"].some(x => up.includes(x));
        }

        function omega_GetFlagCode(leagueName) {
            const s = leagueName.toUpperCase();
            if(s.includes("TÜRKİYE") || s.includes("SÜPER") || s.includes("BSL")) return "tr";
            if(s.includes("İNGİLTERE") || s.includes("PREMIER") || s.includes("CHAMPIONSHIP")) return "gb-eng";
            if(s.includes("İSPANYA") || s.includes("LA LIGA") || s.includes("ACB")) return "es";
            if(s.includes("ALMANYA") || s.includes("BUNDES") || s.includes("BBL")) return "de";
            if(s.includes("İTALYA") || s.includes("SERIE") || s.includes("LEGA A")) return "it";
            if(s.includes("FRANSA") || s.includes("LIGUE") || s.includes("LNB")) return "fr";
            if(s.includes("AMERİKA") || s.includes("NBA") || s.includes("MLS") || s.includes("NCAA") || s.includes("WNBA")) return "us";
            if(s.includes("AVRUPA") || s.includes("CHAMPIONS") || s.includes("EURO")) return "eu";
            if(s.includes("PORTEKİZ") || s.includes("PRIMEIRA")) return "pt";
            if(s.includes("HOLLANDA") || s.includes("EREDIVISIE")) return "nl";
            if(s.includes("BREZİLYA") || s.includes("BRAZIL")) return "br";
            if(s.includes("ARJANTİN") || s.includes("ARGENTINA")) return "ar";
            if(s.includes("RUSYA") || s.includes("VTB")) return "ru";
            return "un";
        }

        function omega_FormatHumanDate(ds) {
            if(!ds) return "";
            const p = ds.split('-');
            const dObj = new Date(p[0], p[1] - 1, p[2]);
            const today = new Date(); today.setHours(0,0,0,0);
            
            const diffDays = Math.round((dObj - today) / 86400000);
            if (diffDays === 0) return "BUGÜN";
            if (diffDays === 1) return "YARIN";
            
            const months = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
            return p[2] + " " + months[parseInt(p[1]) - 1];
        }

        function omega_GenerateMatchID(matchObj) {
            if(!matchObj || !matchObj.m || !matchObj.tm) return "err_id_" + Math.random();
            return `${matchObj.dt}_${matchObj.tm}_${matchObj.m.replace(/[^a-zA-Z0-9]/g, '')}`;
        }

        // --- 7. MENÜ VE SEKME KONTROLCÜLERİ ---
        function omega_ToggleSidebar() {
            const menu = document.getElementById('main-dropdown-nav');
            if(menu) menu.classList.toggle('active-menu');
        }

        function omega_ToggleLeagueDrop(e) {
            e.stopPropagation();
            const menu = document.getElementById('drop-menu-list');
            if(menu) menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        // Boşluğa tıklayınca dropdown menüleri kapatan global event listener
        document.addEventListener('click', (event) => {
            const dropMenu = document.getElementById('drop-menu-list');
            const dropTrigger = document.getElementById('drop-trigger');
            
            if (dropMenu && dropMenu.style.display === 'block') {
                if (dropTrigger && !dropTrigger.contains(event.target) && !dropMenu.contains(event.target)) {
                    dropMenu.style.display = 'none';
                }
            }
        });

        function omega_SwitchMainTab(targetModule, clickedElement, updateHistory = true) {
            omega_CloseRollingExcel();
            omega_CloseChannelManager();
            
            // Eğer dropdown menü açıksa sekme seçince geri kapat
            const topMenu = document.getElementById('main-dropdown-nav');
            if(topMenu) topMenu.classList.remove('active-menu');

            if (updateHistory) {
                history.pushState({ tab: targetModule }, '', '#' + targetModule);
            }

            document.querySelectorAll('.nav-link').forEach(i => i.classList.remove('active'));
            if(clickedElement) clickedElement.classList.add('active');

            // Tüm blokları gizle
            document.getElementById('omega-radar-block').style.display = 'none';
            document.getElementById('omega-favs-block').style.display = 'none';
            document.getElementById('omega-stream-block').style.display = 'none';
            document.getElementById('v19-finance-block').classList.remove('active');

            const titleElem = document.getElementById('active-module-name');
            
            // Seçilen bloğu göster ve başlığı güncelle
            if(targetModule === 'futbol' || targetModule === 'basketbol') {
                _ACTIVE_SPORT = targetModule;
                _ACTIVE_TAB = 'bulletin';
                
                document.getElementById('omega-radar-block').style.display = 'block';
                titleElem.innerText = targetModule === 'futbol' ? "/ FUTBOL ⚽" : "/ BASKETBOL 🏀";
                
                omega_BuildUIComponents();
                omega_ExecuteRadarFilter();
                
            } else if(targetModule === 'favs') {
                _ACTIVE_TAB = 'favs';
                document.getElementById('omega-favs-block').style.display = 'block';
                titleElem.innerText = "/ FAVORİ ANALİZLERİM ⭐";
                omega_ExecuteRadarFilter();
                
            } else if(targetModule === 'stream') {
                _ACTIVE_TAB = 'stream';
                document.getElementById('omega-stream-block').style.display = 'block';
                titleElem.innerText = "/ CANLI YAYIN MERKEZİ 📺";
                
                if(!document.getElementById('omega-matrix-grid').innerHTML) {
                    omega_BuildStreamMatrix(6);
                }
                
            } else if(targetModule === 'finance') {
                _ACTIVE_TAB = 'finance';
                document.getElementById('v19-finance-block').classList.add('active');
                titleElem.innerText = "/ KASA YÖNETİMİ 💼";
                
                omega_RefreshFinanceDashboard();
                setTimeout(omega_RenderApexSupremeChart, 250);
            }
        }

        // --- 8. RADAR VE LİSTELEME MODÜLÜ ---
        function omega_BuildUIComponents() {
            const dateSelectElement = document.getElementById('v19-date-select');
            const dropdownMenuArea = document.getElementById('drop-menu-list');
            
            let dateHtml = '<option value="ALL">TÜM TARİHLER</option>';
            const uniqueDates = [...new Set(_MASTER_DB.filter(m => {
                const isBasket = omega_IsBasketballLeague(m.l);
                return (_ACTIVE_SPORT === 'basketbol' && isBasket) || (_ACTIVE_SPORT === 'futbol' && !isBasket);
            }).map(m => m.dt))].sort();
            
            uniqueDates.forEach(d => {
                dateHtml += `<option value="${d}">${omega_FormatHumanDate(d)}</option>`;
            });
            dateSelectElement.innerHTML = dateHtml;

            let leagueHtml = `<div class="league-drop-item" onclick="omega_HandleLeagueSelection('ALL', 'TÜM LİGLER')">TÜM LİGLER</div>`;
            
            const statsArray = _ACTIVE_SPORT === 'basketbol' ? GOLD_BASKET_LIST : Object.keys(_LEAGUE_STATS_DB).filter(l => !omega_IsBasketballLeague(l));
            
            statsArray.forEach(ligName => {
                const matchCount = _LEAGUE_STATS_DB[ligName] || 0;
                const icon = _ACTIVE_SPORT === 'basketbol' ? '🏀' : '⚽';
                leagueHtml += `
                    <div class="league-drop-item" onclick="omega_HandleLeagueSelection('${ligName}', this.innerHTML)">
                        <img src="https://flagcdn.com/w40/${omega_GetFlagCode(ligName)}.png"> 
                        <span>${icon} ${ligName} (${matchCount})</span>
                    </div>
                `;
            });
            
            dropdownMenuArea.innerHTML = leagueHtml;
        }

        function omega_HandleLeagueSelection(val, htmlContent) {
            _ACTIVE_LEAGUE_FILTER = val;
            document.getElementById('drop-text-label').innerHTML = htmlContent;
            document.getElementById('drop-menu-list').style.display = 'none';
            omega_ExecuteRadarFilter();
        }

        function omega_SetSortMode(mode) {
            _ACTIVE_SORT_MODE = mode;
            document.querySelectorAll('.btn-mode-supreme').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-sort-' + mode).classList.add('active');
            omega_ExecuteRadarFilter();
        }

        function omega_ExecuteRadarFilter() {
            const targetID = (_ACTIVE_TAB === 'favs') ? 'favs-render-output' : 'radar-render-output';
            const renderArea = document.getElementById(targetID);
            
            if(!renderArea) return;
            
            const selectedDate = document.getElementById('v19-date-select').value;
            
            let filteredData = _MASTER_DB.filter(m => {
                const isBasket = omega_IsBasketballLeague(m.l);
                const sportMatch = (_ACTIVE_SPORT === 'basketbol' && isBasket) || (_ACTIVE_SPORT === 'futbol' && !isBasket);
                const dateMatch = (selectedDate === 'ALL' || m.dt === selectedDate);
                const leagueMatch = (_ACTIVE_LEAGUE_FILTER === 'ALL' || m.l === _ACTIVE_LEAGUE_FILTER);
                
                if(_ACTIVE_TAB === 'favs') {
                    const mID = omega_GenerateMatchID(m);
                    return _FAV_MATCHES.includes(mID) && dateMatch;
                }
                
                return sportMatch && dateMatch && leagueMatch;
            });

            let finalHtmlBuffer = ""; 
            const groupedByDay = {};
            
            filteredData.forEach(m => { 
                if(!groupedByDay[m.dt]) groupedByDay[m.dt] = []; 
                groupedByDay[m.dt].push(m); 
            });

            Object.keys(groupedByDay).sort().forEach(day => {
                finalHtmlBuffer += `<div style="color:var(--gold); font-size:0.85em; font-weight:900; margin:25px 0 15px 0; letter-spacing:1px; text-transform:uppercase;">${omega_FormatHumanDate(day)}</div>`;
                
                if(_ACTIVE_SORT_MODE === 'time') {
                    // SAAT SIRALI AKIŞ - RESİMDEKİ GİBİ LİG BAŞLIKLI
                    let dayGroupsSorted = groupedByDay[day].sort((a,b) => a.tm.localeCompare(b.tm));
                    
                    dayGroupsSorted.forEach(m => {
                        const mID = omega_GenerateMatchID(m);
                        const isFav = _FAV_MATCHES.includes(mID);
                        const flagCode = omega_GetFlagCode(m.l);
                        
                        finalHtmlBuffer += `
                            <div class="league-container-pro" style="margin-bottom: 12px; border-radius: 8px;">
                                <div class="league-header-bar" style="padding: 10px 20px; font-size: 0.7em; background: #1f1f1f; border-bottom: 1px solid #2a2a2a; color: var(--muted);">
                                    <div style="display:flex; align-items:center;">
                                        <img src="https://flagcdn.com/w40/${flagCode}.png" style="width:16px; border-radius:2px; margin-right:12px;">
                                        <span>${m.l}</span>
                                    </div>
                                </div>
                                <div class="match-row-pro" style="padding: 12px 20px;">
                                    <i class="fa-solid fa-star fav-star-box ${isFav?'active':''}" onclick="omega_ToggleFavoriteMatch(event, '${mID}')"></i>
                                    <div class="match-clock-sup" style="width: 60px;">${m.tm}</div>
                                    <div class="match-teams-main">${m.m}</div>
                                </div>
                            </div>`;
                    });
                    
                } else {
                    // LİG SIRALI AKIŞ
                    const leagueGroups = {}; 
                    groupedByDay[day].forEach(m => { 
                        if(!leagueGroups[m.l]) leagueGroups[m.l] = []; 
                        leagueGroups[m.l].push(m); 
                    });
                    
                    let sortedLeagues = Object.keys(leagueGroups).sort((a,b) => {
                        const scoreA = HIERARCHY_SCORES[a] || 0; 
                        const scoreB = HIERARCHY_SCORES[b] || 0;
                        if(scoreA !== scoreB) return scoreB - scoreA;
                        
                        let timeA = leagueGroups[a].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        let timeB = leagueGroups[b].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        return timeA.localeCompare(timeB);
                    });

                    sortedLeagues.forEach(ligName => {
                        const flagCode = omega_GetFlagCode(ligName);
                        
                        finalHtmlBuffer += `
                            <div class="league-container-pro">
                                <div class="league-header-bar">
                                    <div>
                                        <img src="https://flagcdn.com/w40/${flagCode}.png" style="width:20px; border-radius:2px; margin-right:12px; vertical-align:middle;">
                                        <span>${ligName}</span>
                                    </div>
                                </div>
                                <div class="league-content">
                        `;

                        leagueGroups[ligName].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                            const mID = omega_GenerateMatchID(m);
                            const isFav = _FAV_MATCHES.includes(mID);
                            
                            finalHtmlBuffer += `
                                <div class="match-row-pro">
                                    <i class="fa-solid fa-star fav-star-box ${isFav?'active':''}" onclick="omega_ToggleFavoriteMatch(event, '${mID}')"></i>
                                    <div class="match-clock-sup">${m.tm}</div>
                                    <div class="match-teams-main">${m.m}</div>
                                </div>`;
                        });
                        finalHtmlBuffer += `</div></div>`;
                    });
                }
            });
            
            renderArea.innerHTML = finalHtmlBuffer || `
                <div style="padding:100px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:20px;">
                    <i class="fa-solid fa-radar" style="font-size:4em; color:var(--border-bright);"></i>
                    <span style="color:var(--muted); font-weight:900; letter-spacing:2px; font-size:1.1em;">TERMİNALDE KAYITLI OPERASYON BULUNAMADI.</span>
                </div>
            `;
        }

        function omega_ToggleFavoriteMatch(event, matchID) {
            event.stopPropagation();
            if(_FAV_MATCHES.includes(matchID)) {
                _FAV_MATCHES = _FAV_MATCHES.filter(id => id !== matchID);
            } else {
                _FAV_MATCHES.push(matchID);
            }
            localStorage.setItem('v19_fav_m', JSON.stringify(_FAV_MATCHES));
            omega_ExecuteRadarFilter();
        }

        // --- 9. KANAL YÖNETİM MERKEZİ MODÜLÜ ---
        function omega_OpenChannelManager() {
            document.getElementById('channel-manager-overlay').style.display = 'flex';
            omega_RenderChannelTable();
        }

        function omega_CloseChannelManager() {
            document.getElementById('channel-manager-overlay').style.display = 'none';
        }

        function omega_AddCustomChannel() {
            const chName = document.getElementById('new-ch-name').value;
            const chUrl = document.getElementById('new-ch-url').value;

            if(!chName || !chUrl) {
                alert("HATA: Lütfen kanal adı ve yayın linkini eksiksiz girin.");
                return;
            }

            _CHANNELS_DB.push({ id: Date.now(), name: chName, url: chUrl });
            localStorage.setItem('v19_channels', JSON.stringify(_CHANNELS_DB));
            
            document.getElementById('new-ch-name').value = "";
            document.getElementById('new-ch-url').value = "";
            
            omega_RenderChannelTable();
            omega_UpdateMatrixDropdowns();
        }

        function omega_DeleteCustomChannel(index) {
            _CHANNELS_DB.splice(index, 1);
            localStorage.setItem('v19_channels', JSON.stringify(_CHANNELS_DB));
            omega_RenderChannelTable();
            omega_UpdateMatrixDropdowns();
        }

        function omega_RenderChannelTable() {
            const tbody = document.getElementById('channel-table-body');
            let rowsHtml = "";

            if(_CHANNELS_DB.length === 0) {
                rowsHtml = `<tr><td colspan="3" style="text-align:center; padding:40px; color:var(--muted); font-weight:700;">Sistemde kayıtlı kanal bulunamadı.</td></tr>`;
            } else {
                _CHANNELS_DB.forEach((ch, index) => {
                    rowsHtml += `
                        <tr>
                            <td style="font-weight:900; color:var(--gold); padding:15px;">${ch.name}</td>
                            <td style="font-family:'JetBrains Mono'; font-size:0.85em; color:var(--muted); word-break:break-all; padding:15px;">${ch.url}</td>
                            <td style="text-align:right; padding:15px;">
                                <button onclick="omega_DeleteCustomChannel(${index})" style="background:var(--red); border:none; padding:8px 20px; border-radius:6px; color:#fff; cursor:pointer; font-weight:bold; transition:0.2s;">SİL</button>
                            </td>
                        </tr>
                    `;
                });
            }
            tbody.innerHTML = rowsHtml;
        }

        function omega_UpdateMatrixDropdowns() {
            let optionsHtml = `<option value="">KANAL SEÇ...</option>`;
            _CHANNELS_DB.forEach(ch => {
                optionsHtml += `<option value="${ch.url}">${ch.name}</option>`;
            });

            document.querySelectorAll('.matrix-channel-select').forEach(selectElem => {
                const prevVal = selectElem.value;
                selectElem.innerHTML = optionsHtml;
                selectElem.value = prevVal; 
            });
        }

        // --- 10. MULTI-STREAM YAYIN MATRİSİ KONTROLCÜSÜ ---
        function omega_ToggleDevEkran() {
            _IS_DEV_EKRAN = !_IS_DEV_EKRAN;
            const btn = document.getElementById('btn-theater-mode');
            if(_IS_DEV_EKRAN) {
                document.body.classList.add('dev-mode');
                btn.innerHTML = 'KÜÇÜLT';
                
                const topMenu = document.getElementById('main-dropdown-nav');
                if(topMenu) topMenu.classList.remove('active-menu');
            } else {
                document.body.classList.remove('dev-mode');
                btn.innerHTML = 'DEV EKRAN';
            }
        }

        function omega_FullscreenIframe(id) {
            const iframe = document.getElementById('s-fr-' + id);
            if (!iframe) return;
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            }
        }

        function omega_BuildStreamMatrix(numScreens) {
            const gridContainer = document.getElementById('omega-matrix-grid');
            gridContainer.className = `stream-master-grid active m-lay-${numScreens}`; 
            gridContainer.innerHTML = "";
            
            document.querySelectorAll('.btn-stream-layout').forEach(b => b.classList.remove('active'));
            const clickedBtn = document.getElementById('lay-btn-' + numScreens);
            if(clickedBtn) clickedBtn.classList.add('active');

            let optionsHtml = `<option value="">KANAL SEÇ...</option>`;
            _CHANNELS_DB.forEach(ch => {
                optionsHtml += `<option value="${ch.url}">${ch.name}</option>`;
            });

            for(let i=1; i<=numScreens; i++) {
                gridContainer.innerHTML += `
                    <div class="matrix-unit">
                        <div class="matrix-nav">
                            <select id="s-sel-${i}" class="matrix-channel-select" onchange="omega_LoadChannelToInput(${i})">
                                ${optionsHtml}
                            </select>
                            <input id="s-in-${i}" class="matrix-input" placeholder="HLS/M3U8 veya Web URL...">
                            <button class="btn-matrix-go" onclick="omega_LaunchStreamUnit(${i})" title="Yayını Başlat">İZLE</button>
                            <button class="btn-matrix-pip" onclick="omega_FullscreenIframe(${i})" title="Tam Ekran"><i class="fa-solid fa-expand"></i></button>
                            <button class="btn-matrix-kill" onclick="omega_TerminateStreamUnit(${i})" title="Kapat"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <iframe id="s-fr-${i}" style="flex:1; border:none; background:#000000;" src="about:blank" allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write;" allowfullscreen></iframe>
                    </div>`;
            }
        }
        
        function omega_LoadChannelToInput(id) {
            const selectElem = document.getElementById('s-sel-' + id);
            const inputElem = document.getElementById('s-in-' + id);
            if(selectElem.value) {
                inputElem.value = selectElem.value;
                omega_LaunchStreamUnit(id); 
            }
        }

        function omega_LaunchStreamUnit(id) { 
            const url = document.getElementById('s-in-' + id).value; 
            if(url) document.getElementById('s-fr-' + id).src = url; 
        }
        
        function omega_TerminateStreamUnit(id) { 
            document.getElementById('s-sel-' + id).value = ""; 
            document.getElementById('s-in-' + id).value = ""; 
            document.getElementById('s-fr-' + id).src = "about:blank"; 
        }

        // --- 11. ROLLING EXCEL MİMARİSİ (10 İŞLEM / GÜN) ---
        function omega_OpenRollingExcel(days) {
            _ACTIVE_EXCEL_DAYS = days;
            
            if(!_ROLLING_DB[days]) {
                _ROLLING_DB[days] = { startBal: 100, ops: {} };
            }
            
            document.getElementById('excel-modal-title').innerHTML = `${days} GÜNLÜK ROLLING EXCEL`;
            document.getElementById('excel-start-bal').value = _ROLLING_DB[days].startBal;
            document.getElementById('excel-target-bal').innerText = "$" + ROLLING_TARGETS[days].toLocaleString();
            
            document.getElementById('rolling-excel-overlay').style.display = 'flex';
            omega_RenderExcelTable();
        }

        function omega_CloseRollingExcel() {
            document.getElementById('rolling-excel-overlay').style.display = 'none';
        }

        function omega_UpdateExcelConfig() {
            const newBal = parseFloat(document.getElementById('excel-start-bal').value);
            if(!isNaN(newBal)) {
                _ROLLING_DB[_ACTIVE_EXCEL_DAYS].startBal = newBal;
                omega_SaveRollingDB();
                omega_RenderExcelTable();
            }
        }

        function omega_SaveRollingDB() {
            localStorage.setItem('v19_rolling', JSON.stringify(_ROLLING_DB));
        }

        function omega_RenderExcelTable() {
            const tbody = document.getElementById('excel-table-body');
            tbody.innerHTML = '';
            
            const currentPlan = _ROLLING_DB[_ACTIVE_EXCEL_DAYS];
            let runningBalance = currentPlan.startBal;
            let totalProfit = 0;
            let winCount = 0;
            let lossCount = 0;
            let totalOps = 0;

            for (let day = 1; day <= _ACTIVE_EXCEL_DAYS; day++) {
                const dayOps = currentPlan.ops[day] || [];
                let tr = document.createElement('tr');
                
                let tdDay = document.createElement('td');
                tdDay.className = 'day-col';
                tdDay.innerText = `GÜN ${day}`;
                tr.appendChild(tdDay);

                for (let slot = 0; slot < 10; slot++) {
                    let tdOp = document.createElement('td');
                    let slotHTML = "";

                    if (dayOps[slot]) {
                        const op = dayOps[slot];
                        const statusClass = op.res === 'win' ? 'win' : 'loss';
                        const sign = op.res === 'win' ? '+' : '-';
                        const pnl = op.res === 'win' ? (op.amt * op.odds) - op.amt : op.amt;
                        
                        if (op.res === 'win') {
                            runningBalance += pnl;
                            totalProfit += pnl;
                            winCount++;
                        } else {
                            runningBalance -= pnl;
                            totalProfit -= pnl;
                            lossCount++;
                        }
                        totalOps++;

                        slotHTML = `
                            <div class="slot-resolved ${statusClass}">
                                <button class="btn-undo" onclick="omega_UndoExcelOp(${day}, ${slot})" title="İptal Et"><i class="fa-solid fa-xmark"></i></button>
                                <span style="font-weight:900; color:#fff;">$${op.amt} x ${op.odds}</span>
                                <span style="font-size:0.85em; font-weight:800; margin-top:3px;">${sign}$${pnl.toFixed(2)}</span>
                            </div>
                        `;
                    } else {
                        slotHTML = `
                            <div class="op-slot">
                                <div class="op-slot-inputs">
                                    <input type="number" id="e-a-${day}-${slot}" placeholder="$">
                                    <input type="number" id="e-o-${day}-${slot}" placeholder="Oran">
                                </div>
                                <div class="op-actions">
                                    <button class="btn-slot-w" onclick="omega_ResolveExcelOp(${day}, ${slot}, 'win')">W</button>
                                    <button class="btn-slot-l" onclick="omega_ResolveExcelOp(${day}, ${slot}, 'loss')">L</button>
                                </div>
                            </div>
                        `;
                    }
                    tdOp.innerHTML = slotHTML;
                    tr.appendChild(tdOp);
                }

                let tdBal = document.createElement('td');
                tdBal.className = 'bal-col';
                tdBal.innerText = `$${runningBalance.toFixed(2)}`;
                tr.appendChild(tdBal);

                tbody.appendChild(tr);
            }

            document.getElementById('excel-current-bal').innerText = `$${runningBalance.toFixed(2)}`;
            
            const pnlElement = document.getElementById('excel-pnl');
            pnlElement.innerText = (totalProfit >= 0 ? "+" : "") + "$" + totalProfit.toFixed(2);
            pnlElement.style.color = totalProfit >= 0 ? 'var(--green)' : 'var(--red)';
            
            omega_SaveRollingDB();
        }

        function omega_ResolveExcelOp(day, slot, result) {
            const amtInput = document.getElementById(`e-a-${day}-${slot}`).value;
            const oddsInput = document.getElementById(`e-o-${day}-${slot}`).value;
            
            const amt = parseFloat(amtInput);
            const odds = parseFloat(oddsInput);

            if (isNaN(amt) || isNaN(odds)) return;

            const currentPlan = _ROLLING_DB[_ACTIVE_EXCEL_DAYS];
            if (!currentPlan.ops[day]) currentPlan.ops[day] = [];
            
            currentPlan.ops[day][slot] = { amt: amt, odds: odds, res: result };
            
            omega_SaveRollingDB();
            omega_RenderExcelTable();
        }

        function omega_UndoExcelOp(day, slot) {
            const currentPlan = _ROLLING_DB[_ACTIVE_EXCEL_DAYS];
            if (currentPlan.ops[day] && currentPlan.ops[day][slot]) {
                currentPlan.ops[day].splice(slot, 1);
                omega_SaveRollingDB();
                omega_RenderExcelTable();
            }
        }

        // --- 12. SUPREME FINANCE KONTROLCÜSÜ (KASA YÖNETİMİ) ---
        function omega_RefreshFinanceDashboard() {
            const kpiValW = document.getElementById('kpi-val-w');
            if (kpiValW) kpiValW.innerText = _WALLET_BALANCE.toFixed(2);
            
            const netProfit = _COMPLETED_LEDGER.reduce((sum, item) => sum + (item.pnl || 0), 0);
            const kpiPnl = document.getElementById('kpi-val-p');
            if (kpiPnl) {
                kpiPnl.innerText = (netProfit >= 0 ? "+" : "") + netProfit.toFixed(2);
                kpiPnl.style.color = netProfit >= 0 ? 'var(--green)' : 'var(--red)';
            }
            
            const totalResolved = _COMPLETED_LEDGER.filter(x => x.res === 'win' || x.res === 'loss').length;
            const winsOnly = _COMPLETED_LEDGER.filter(x => x.res === 'win').length;
            const winRate = totalResolved > 0 ? ((winsOnly / totalResolved) * 100).toFixed(1) : 0;
            const kpiWr = document.getElementById('kpi-val-wr');
            if (kpiWr) kpiWr.innerText = "%" + winRate;
            
            omega_RenderSupremeLedgerTable();
        }

        function omega_SetLedgerView(mode) {
            _ACTIVE_LEDGER_TAB = mode;
            document.getElementById('ltab-pend').classList.toggle('active', mode === 'pend');
            document.getElementById('ltab-all').classList.toggle('active', mode === 'all');
            omega_RenderSupremeLedgerTable();
        }

        function omega_RenderSupremeLedgerTable() {
            const tableElement = document.getElementById('omega-data-table');
            if(!tableElement) return;

            let headerHtml = `<tr><th>TARİH</th><th>OPERASYON KODU</th><th>RİSK ($)</th><th>ORAN</th><th>DURUM</th><th>P/L</th></tr>`;
            let rowsHtml = "";
            
            const targetList = _ACTIVE_LEDGER_TAB === 'pend' ? _PENDING_OPS : _COMPLETED_LEDGER;

            if(targetList.length === 0) {
                rowsHtml = `<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--muted); font-weight:800;">VERİ BULUNAMADI.</td></tr>`;
            } else {
                targetList.forEach(item => {
                    const dateStr = new Date(item.id).toLocaleDateString('tr-TR');
                    let statusBadge = `<span style="color:var(--muted); font-weight:900;">BEKLEMEDE</span>`;
                    let pnlDisplay = "-";

                    if(item.res === 'win') {
                        statusBadge = `<b style="color:var(--green)">KAZANÇ</b>`;
                        pnlDisplay = `<span style="color:var(--green); font-weight:800;">+${item.pnl.toFixed(2)}</span>`;
                    } else if(item.res === 'loss') {
                        statusBadge = `<b style="color:var(--red)">KAYIP</b>`;
                        pnlDisplay = `<span style="color:var(--red); font-weight:800;">${item.pnl.toFixed(2)}</span>`;
                    }

                    rowsHtml += `
                        <tr>
                            <td style="font-family:'JetBrains Mono';">${dateStr}</td>
                            <td style="font-weight:800; color:#fff;">${item.name}</td>
                            <td style="font-family:'JetBrains Mono'; font-weight:700;">$${item.amt.toFixed(2)}</td>
                            <td style="font-family:'JetBrains Mono'; color:var(--gold);">@${item.odds.toFixed(2)}</td>
                            <td>${statusBadge}</td>
                            <td style="font-family:'JetBrains Mono';">${pnlDisplay}</td>
                            ${_ACTIVE_LEDGER_TAB === 'pend' ? `
                                <td style="text-align:right;">
                                    <button onclick="omega_ResolveOperation(${item.id}, 'win')" style="color:var(--green); background:none; border:none; cursor:pointer; font-weight:900; margin-right:15px; font-size:1.3em;">W</button>
                                    <button onclick="omega_ResolveOperation(${item.id}, 'loss')" style="color:var(--red); background:none; border:none; cursor:pointer; font-weight:900; font-size:1.3em;">L</button>
                                </td>
                            ` : "<td></td>"}
                        </tr>
                    `;
                });
            }
            tableElement.innerHTML = headerHtml + rowsHtml;
        }

        function omega_CommitNewOperation() {
            const opName = document.getElementById('op-in-name').value;
            const opAmt = parseFloat(document.getElementById('op-in-amt').value);
            const opOdds = parseFloat(document.getElementById('op-in-odds').value);

            if(!opName || isNaN(opAmt) || isNaN(opOdds)) {
                alert("Lütfen tüm alanları doldurun.");
                return;
            }

            const newOp = { id: Date.now(), name: opName, amt: opAmt, odds: opOdds };
            _PENDING_OPS.push(newOp);
            
            omega_PersistData(); 
            omega_RefreshFinanceDashboard();
            
            document.getElementById('op-in-name').value = "";
            document.getElementById('op-in-amt').value = "";
            document.getElementById('op-in-odds').value = "";
        }

        function omega_ResolveOperation(id, result) {
            const operation = _PENDING_OPS.find(x => x.id === id);
            let calculatedPnl = 0;

            if(result === 'win') {
                calculatedPnl = (operation.amt * operation.odds) - operation.amt;
            } else {
                calculatedPnl = -operation.amt;
            }
            
            _WALLET_BALANCE += calculatedPnl;
            _BALANCE_HISTORY.push(_WALLET_BALANCE);
            
            _COMPLETED_LEDGER.unshift({
                ...operation, 
                res: result, 
                pnl: calculatedPnl, 
                bal: _WALLET_BALANCE
            });
            
            _PENDING_OPS = _PENDING_OPS.filter(x => x.id !== id);

            omega_PersistData(); 
            omega_RefreshFinanceDashboard(); 
            omega_RenderApexSupremeChart();
        }

        function omega_HardSystemReset() { 
            const newBal = prompt("Sistem sıfırlanacak! Yeni başlangıç bakiyesi:", _WALLET_BALANCE);
            if(newBal && !isNaN(parseFloat(newBal))) {
                _WALLET_BALANCE = parseFloat(newBal);
                _BALANCE_HISTORY = [_WALLET_BALANCE];
                _PENDING_OPS = [];
                _COMPLETED_LEDGER = [];
                omega_PersistData();
                location.reload();
            }
        }

        function omega_PersistData() { 
            localStorage.setItem('v19_w', _WALLET_BALANCE); 
            localStorage.setItem('v19_h', JSON.stringify(_BALANCE_HISTORY)); 
            localStorage.setItem('v19_p', JSON.stringify(_PENDING_OPS)); 
            localStorage.setItem('v19_l', JSON.stringify(_COMPLETED_LEDGER)); 
        }

        // --- 13. APEX CHARTS MOTORU ---
        let _SUPREME_CHART_INSTANCE;
        function omega_RenderApexSupremeChart() {
            const chartDiv = document.querySelector("#omega-apex-chart-main");
            if(!chartDiv) return;

            if(_SUPREME_CHART_INSTANCE) _SUPREME_CHART_INSTANCE.destroy();
            
            const chartOptions = {
                series: [{ name: "USDT KASA", data: _BALANCE_HISTORY }],
                chart: { 
                    type: 'area', 
                    height: '100%', 
                    toolbar: { show: false }, 
                    background: 'transparent',
                    animations: { enabled: true, speed: 600, easing: 'easeinout' }
                },
                theme: { mode: 'dark' }, 
                colors: [_WALLET_BALANCE >= _BALANCE_HISTORY[0] ? '#10b981' : '#ef4444'], 
                stroke: { curve: 'straight', width: 3 },
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.05, stops: [0, 90, 100] } },
                xaxis: { labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } }, 
                yaxis: { 
                    opposite: true, 
                    labels: { style: { colors: '#71717a', fontSize: '11px', fontFamily: 'JetBrains Mono' }, formatter: (v) => '$' + v.toFixed(0) } 
                },
                grid: { borderColor: '#272727', strokeDashArray: 4 },
                annotations: { 
                    yaxis: [
                        {y:1000, borderColor:'#333', label:{text:'$1K', style:{background:'#333', color:'#fff'}}}, 
                        {y:10000, borderColor:'#fbbf24', label:{text:'$10K', style:{background:'#fbbf24', color:'#000', fontWeight:'bold'}}}, 
                        {y:100000, borderColor:'#10b981', label:{text:'$100K', style:{background:'#10b981', color:'#000', fontWeight:'bold'}}}
                    ] 
                }
            };
            
            _SUPREME_CHART_INSTANCE = new ApexCharts(chartDiv, chartOptions);
            _SUPREME_CHART_INSTANCE.render();
        }

    </script>
