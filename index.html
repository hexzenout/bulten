
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Veri Radarı</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .mac-karti { 
            background: #161616; border-radius: 10px; padding: 18px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 10px solid; transition: 0.3s;
        }
        .lig-bilgi { font-size: 0.85em; color: #888; text-transform: uppercase; }
        .takimlar { font-size: 1.25em; font-weight: bold; margin-top: 5px; color: #fff; }
        .saat { font-family: monospace; color: #00ff00; font-size: 1.3em; background: #222; padding: 5px 12px; border-radius: 5px; }
        h1 { color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 CANLI VERİ RADARI</h1>
        <p>GÜNCELLEME: 25.04.2026 11:21</p>
    </div>

    <div class="mac-karti" style="border-left-color: #FFD700;">
        <div>
            <div class="lig-bilgi">Futbol | Turkish Super Lig (Altın)</div>
            <div class="takimlar">Galatasaray - Beşiktaş</div>
        </div>
        <div class="saat">19:00</div>
    </div>
    
    <div class="mac-karti" style="border-left-color: #FFD700;">
        <div>
            <div class="lig-bilgi">Futbol | English Premier League (Altın)</div>
            <div class="takimlar">Liverpool - Chelsea</div>
        </div>
        <div class="saat">21:00</div>
    </div>
    
    <div class="mac-karti" style="border-left-color: #C0C0C0;">
        <div>
            <div class="lig-bilgi">Futbol | TFF 1. Lig (Gümüş)</div>
            <div class="takimlar">Sakaryaspor - Kocaelispor</div>
        </div>
        <div class="saat">18:00</div>
    </div>
    
    <div class="mac-karti" style="border-left-color: #FFD700;">
        <div>
            <div class="lig-bilgi">Basketbol | NBA (Altın)</div>
            <div class="takimlar">Lakers - Warriors</div>
        </div>
        <div class="saat">04:00</div>
    </div>
    </body></html>
