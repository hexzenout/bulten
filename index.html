<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;700;900&display=swap');
        :root { --gold: #fbbf24; --green: #10b981; --bg: #050505; --panel: #0f0f12; --border: #1f1f23; --text: #fff; --muted: #71717a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #000; border-right: 2px solid var(--border); flex-shrink: 0; transition: 0.3s ease-in-out; }
        .sidebar.closed { transform: translateX(-280px); margin-right: -280px; }
        .brand { padding: 40px 30px; font-weight: 900; font-size: 1.6em; color: var(--green); border-bottom: 1px solid var(--border); }
        .nav-item { padding: 22px 30px; cursor: pointer; color: var(--muted); font-weight: 700; font-size: 1.1em; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #0a0a0a; }
        .nav-item.active { color: var(--green); background: rgba(16,185,129,0.1); border-right: 4px solid var(--green); }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #000; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .quota-box { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 0.9em; display: flex; gap: 20px; }
        .content { flex-grow: 1; padding: 40px; overflow-y: auto; background: #070707; }
        .tabs { display: flex; gap: 12px; margin-bottom: 30px; }
        .tab { padding: 12px 28px; background: var(--panel); border: 1px solid var(--border); cursor: pointer; border-radius: 8px; color: var(--muted); font-weight: 900; font-size: 0.9em; }
        .tab.active.gold { border-color: var(--gold); color: var(--gold); }
        .date-divider { color: var(--green); font-family: 'JetBrains Mono'; font-weight: 800; font-size: 0.95em; margin: 40px 0 15px 0; border-left: 4px solid var(--green); padding-left: 15px; }
        .league-box { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); overflow: hidden; }
        .league-trigger { padding: 25px 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 900; font-size: 1.2em; background: #0c0c0e; }
        .league-content { display: none; padding: 20px; background: #050505; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 15px; }
        .league-content.open { display: grid; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; border-left: 5px solid #333; }
        .card-time { font-family: 'JetBrains Mono'; font-size: 0.9em; color: var(--green); margin-bottom: 12px; display: block; }
        .card-match { font-weight: 900; font-size: 1.4em; line-height: 1.2; margin-bottom: 15px; }
        .flag { width: 30px; height: 20px; border-radius: 4px; object-fit: cover; margin-right: 15px; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="brand">V19 TERMINAL</div>
        <div class="nav-item active" onclick="setSport('futbol', this)"><i class="fa-solid fa-futbol"></i> FUTBOL</div>
        <div class="nav-item" onclick="setSport('basketbol', this)"><i class="fa-solid fa-basketball"></i> BASKETBOL</div>
    </div>
    <div class="main">
        <div class="header">
            <div class="header-left">
                <button onclick="document.getElementById('sidebar').classList.toggle('closed')" style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;"><i class="fa-solid fa-bars"></i></button>
                <h2 id="title" style="margin:0; font-weight:900;">FUTBOL RADARI</h2>
            </div>
            <div class="quota-box">
                <div>KOTA: <span style="color:var(--green)" id="quota">--</span></div>
                <div id="scan-time" style="color:var(--muted)">--:--</div>
            </div>
        </div>
        <div class="content">
            <div class="tabs">
                <button class="tab active gold" onclick="setCategory('ALTIN', this)">ALTIN KATEGORİ</button>
                <button class="tab" onclick="setCategory('GÜMÜŞ', this)">GÜMÜŞ</button>
                <button class="tab" onclick="setCategory('BRONZ', this)">BRONZ</button>
            </div>
            <div id="content-area"></div>
        </div>
    </div>
    <script>
        let currentMode = 'futbol', currentCategory = 'ALTIN', allData = [];
        // YENİ: Favorileri Timestamp (Zaman Damgası) ile Yönetme
        let favorites = JSON.parse(localStorage.getItem('v19_favs_v2')) || {};
        
        // --- 24 SAATLİK İMHA PROTOKOLÜ ---
        function cleanExpiredFavorites() {
            const now = Date.now();
            const ONE_DAY = 24 * 60 * 60 * 1000; // 24 saatin milisaniye karşılığı
            let hasChanged = false;

            for (let mac in favorites) {
                if (now - favorites[mac] > ONE_DAY) {
                    delete favorites[mac];
                    hasChanged = true;
                }
            }
            if (hasChanged) {
                localStorage.setItem('v19_favs_v2', JSON.stringify(favorites));
            }
        }
        cleanExpiredFavorites(); // Sayfa açılır açılmaz temizlik yap

        const leagueMeta = {
            "SUPER LIG": {f:"tr", n:"TÜRKİYE"}, "BSL": {f:"tr", n:"TÜRKİYE"},
            "PREMIER LEAGUE": {f:"gb-eng", n:"İNGİLTERE"}, "CHAMPIONSHIP": {f:"gb-eng", n:"İNGİLTERE"},
            "LA LIGA": {f:"es", n:"İSPANYA"}, "LIGA ACB": {f:"es", n:"İSPANYA"},
            "BUNDESLIGA": {f:"de", n:"ALMANYA"}, "BBL": {f:"de", n:"ALMANYA"},
            "SERIE A": {f:"it", n:"İTALYA"}, "LEGA A": {f:"it", n:"İTALYA"},
            "LIGUE 1": {f:"fr", n:"FRANSA"}, "LNB PRO A": {f:"fr", n:"FRANSA"},
            "EREDIVISIE": {f:"nl", n:"HOLLANDA"}, "PRIMEIRA LIGA": {f:"pt", n:"PORTEKİZ"},
            "NBA": {f:"us", n:"ABD"}, "WNBA": {f:"us", n:"ABD"}, "NCAA": {f:"us", n:"ABD"}, "MLS": {f:"us", n:"ABD"},
            "SERIE A (BRAZIL)": {f:"br", n:"BREZİLYA"}, "PRIMERA DIVISION (ARGENTINA)": {f:"ar", n:"ARJANTİN"},
            "EUROLEAGUE": {f:"eu", n:"AVRUPA"}, "EUROCUP": {f:"eu", n:"AVRUPA"}, "BCL": {f:"eu", n:"AVRUPA"},
            "CHAMPIONS LEAGUE": {f:"eu", n:"AVRUPA"}, "EUROPA LEAGUE": {f:"eu", n:"AVRUPA"}, "CONFERENCE LEAGUE": {f:"eu", n:"AVRUPA"},
            "HEBA A1": {f:"gr", n:"YUNANİSTAN"}, "VTB": {f:"ru", n:"RUSYA"}, "WORLD CUP": {f:"un", n:"DÜNYA"}
        };
        const basketKeywords = ["NBA","EUROLEAGUE","ACB","LEGA A","LNB","BBL","NCAA","WNBA","EUROCUP","BSL","HEBA","VTB","BCL"];

        // HAMBURGER MENÜ AÇ/KAPA
        function toggleMenu() {
            document.getElementById('menu-items').classList.toggle('collapsed');
        }

        // FAVORİ EKLE/ÇIKAR (GÜNCELLENDİ)
        function toggleFav(macAdi, iconElement) {
            if(favorites[macAdi]) {
                delete favorites[macAdi]; // Varsa sil
                iconElement.classList.replace('fa-solid', 'fa-regular');
                iconElement.classList.remove('active');
            } else {
                favorites[macAdi] = Date.now(); // Yoksa ekle ve şu anki saati kaydet
                iconElement.classList.replace('fa-regular', 'fa-solid');
                iconElement.classList.add('active');
            }
            localStorage.setItem('v19_favs_v2', JSON.stringify(favorites));
            
            if(currentMode === 'favoriler') render();
        }

        async function update() {
            try {
                const r = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const d = await r.json();
                document.getElementById('quota').innerText = d.kalan_hak || "500";
                document.getElementById('scan-time').innerText = d.son_guncelleme.split(' ')[1];
                allData = d.veriler || []; 
                cleanExpiredFavorites(); // Her güncellemede kontrol et
                render();
            } catch(e) {}
        }

        function getDayLabel(iso) {
            if(!iso) return "BELİRSİZ";
            const d = new Date(iso), now = new Date();
            if(d.toDateString() === now.toDateString()) return "BUGÜN";
            now.setDate(now.getDate()+1);
            if(d.toDateString() === now.toDateString()) return "YARIN";
            return d.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
        }

        function render() {
            const area = document.getElementById('content-area'); area.innerHTML = "";
            
            let filtered = [];
            if(currentMode === 'favoriler') {
                // Object.keys(favorites) ile favori listesini alıyoruz
                filtered = allData.filter(m => Object.keys(favorites).includes(m.mac));
                document.getElementById('kategori-tabs').style.display = 'none';
            } else {
                document.getElementById('kategori-tabs').style.display = 'flex';
                filtered = allData.filter(m => {
                    const isB = basketKeywords.some(k => m.lig.toUpperCase().includes(k));
                    return (isB ? 'basketbol' : 'futbol') === currentMode && m.kategori === currentCategory;
                });
            }

            if(filtered.length === 0) {
                area.innerHTML = `<div class="empty-state">Bu kriterlere uygun maç bulunamadı.</div>`;
                return;
            }

            const days = {};
            filtered.forEach(m => {
                const day = getDayLabel(m.saat_raw);
                if(!days[day]) days[day] = {};
                if(!days[day][m.lig]) days[day][m.lig] = [];
                days[day][m.lig].push(m);
            });

            Object.keys(days).forEach(day => {
                area.innerHTML += `<div class="date-divider">${day}</div>`;
                for(let lig in days[day]) {
                    const mta = leagueMeta[lig.toUpperCase()] || {f:"un", n:"DİĞER"};
                    const lBox = document.createElement('div'); lBox.className = 'league-box';
                    lBox.innerHTML = `
                        <div class="league-trigger" onclick="this.nextElementSibling.classList.toggle('open')">
                            <span><img src="https://flagcdn.com/w40/${mta.f}.png" class="flag"> ${mta.n} - ${lig}</span>
                            <i class="fa-solid fa-chevron-down fa-xs" style="color:var(--muted)"></i>
                        </div>
                        <div class="league-content ${currentMode === 'favoriler' ? 'open' : ''}"></div>
                    `;
                    const content = lBox.querySelector('.league-content');
                    days[day][lig].sort((a,b)=>a.saat_raw.localeCompare(b.saat_raw)).forEach(m => {
                        const d = new Date(m.saat_raw);
                        const tsi = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
                        // Favori kontrolü güncellendi
                        const isFav = Object.keys(favorites).includes(m.mac);
                        
                        content.innerHTML += `
                            <div class="card">
                                <i class="fa-${isFav ? 'solid active' : 'regular'} fa-star fav-star" onclick="toggleFav('${m.mac}', this)"></i>
                                <span class="card-time"><i class="fa-regular fa-clock"></i> ${tsi} (TSİ)</span>
                                <div class="card-match">${m.mac}</div>
                                <div style="font-size:0.85em; color:var(--muted); border-top:1px solid #1f1f23; padding-top:12px;">
                                    <i class="fa-solid fa-satellite-dish" style="color:var(--green)"></i> ${m.uyari}
                                </div>
                            </div>
                        `;
                    });
                    area.appendChild(lBox);
                }
            });
        }

        function setMode(mode, el) { 
            currentMode = mode; 
            document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active')); 
            el.classList.add('active'); 
            
            if(mode === 'canli') {
                document.getElementById('bulten-view').style.display = 'none';
                document.getElementById('stream-view').classList.add('active');
                document.getElementById('title').innerText = "4'LÜ EKRAN CANLI YAYIN";
            } else {
                document.getElementById('stream-view').classList.remove('active');
                document.getElementById('bulten-view').style.display = 'block';
                document.getElementById('title').innerText = mode.toUpperCase() + (mode === 'favoriler' ? "" : " RADARI");
                render(); 
            }
        }
        function setCategory(c,el) { currentCategory=c; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active','gold')); el.classList.add('active','gold'); render(); }
        setInterval(update, 15000); update();
    </script>
</body>
</html>
