<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | CAPITAL TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;700;900&display=swap');
        :root { --gold: #fbbf24; --green: #10b981; --red: #ef4444; --orange: #f97316; --bg: #050505; --panel: #0c0c0e; --border: #1f1f23; --text: #fff; --muted: #71717a; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR (TEKLİ SEÇİM) */
        .sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 25px 20px; font-weight: 900; color: var(--green); border-bottom: 1px solid var(--border); text-align: center; font-size: 1.1em; letter-spacing: 1px; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: var(--muted); font-weight: 700; font-size: 0.85em; display: flex; align-items: center; border-bottom: 1px solid #0a0a0a; transition: 0.2s; }
        .nav-item i { margin-right: 12px; font-size: 1.2em; }
        .nav-item.active { background: rgba(16,185,129,0.05); color: #fff; border-left: 3px solid var(--green); }
        .nav-item.basket.active { border-left-color: var(--orange); }

        /* MAIN */
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid var(--border); }
        
        .content { flex-grow: 1; padding: 20px; overflow-y: auto; }

        /* MACKOLİK LİSTE (BAYRAK SAĞDA) */
        .filter-row { display: flex; gap: 10px; margin-bottom: 15px; background: var(--panel); padding: 10px; border-radius: 6px; border: 1px solid var(--border); align-items: center; }
        .tab { padding: 6px 15px; background: #000; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-size: 0.7em; font-weight: 800; cursor: pointer; }
        .tab.active.gold { border-color: var(--gold); color: var(--gold); }
        .c-select { background: #000; border: 1px solid var(--border); color: #fff; padding: 7px; border-radius: 4px; font-size: 0.75em; font-weight: bold; outline: none; }

        .league-head { background: #0f0f12; padding: 8px 15px; font-weight: 800; font-size: 0.75em; color: var(--text); border-bottom: 1px solid #000; display: flex; align-items: center; justify-content: space-between; text-transform: uppercase; }
        .match-row { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #161618; font-size: 0.8em; }
        .m-time { font-family: 'JetBrains Mono'; color: var(--green); width: 55px; font-weight: bold; }
        .m-teams { font-weight: 700; flex-grow: 1; color: #fff; }
        .flag { width: 22px; height: 14px; object-fit: cover; border-radius: 1px; }

        /* FİNANS */
        .fin-container { display: none; grid-template-columns: 350px 1fr; gap: 20px; }
        .fin-container.active { display: grid; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        .w-val { font-family: 'JetBrains Mono'; font-size: 2.2em; font-weight: 900; color: var(--gold); margin: 10px 0; }
        .op-row { background: #000; padding: 12px; border-radius: 4px; border-left: 4px solid var(--gold); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75em; font-weight: bold; }
        #chart { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">V19 ELITE</div>
        <div class="nav-item active" id="btn-f" onclick="switchSport('futbol')"><i class="fa-solid fa-futbol"></i> FUTBOL RADARI</div>
        <div class="nav-item basket" id="btn-b" onclick="switchSport('basketbol')"><i class="fa-solid fa-basketball" style="color:var(--orange)"></i> BASKET RADARI</div>
        <div class="nav-item" onclick="setMode('finance', this)" style="color:var(--gold); border-top:1px solid #111; margin-top:20px;"><i class="fa-solid fa-chart-line"></i> USDT FİNANS</div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="title" style="margin:0; font-size:0.9em; font-weight:900;">BÜLTEN RADARI</h2>
            <div id="h-wallet" style="font-family:'JetBrains Mono'; font-weight:900; color:var(--gold)">100.00 USDT</div>
        </div>

        <div class="content">
            <div id="v-bulletin">
                <div class="filter-row">
                    <button class="tab active gold">ALTIN LİGLER</button>
                    <select id="date-sel" class="c-select" onchange="render()"><option value="ALL">TARİH SEÇ</option></select>
                    <select id="league-sel" class="c-select" onchange="render()"><option value="ALL">LİG SEÇ</option></select>
                </div>
                <div id="list-area"></div>
            </div>

            <div class="fin-container" id="v-finance">
                <div class="card">
                    <div style="font-size:0.7em; font-weight:bold; color:var(--muted)">TOPLAM VARLIK</div>
                    <div class="w-val" id="w-val">100.00</div>
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="number" id="m-amt" class="c-select" style="flex:1" placeholder="Manuel Kasa">
                        <button onclick="setManual()" style="background:#333; color:#fff; border:none; padding:10px; border-radius:4px; font-weight:bold; cursor:pointer;">SET</button>
                    </div>
                    <h4 style="margin:10px 0; font-size:0.75em; color:var(--gold)">YENİ OPERASYON</h4>
                    <input type="text" id="b-name" class="c-select" style="width:100%; margin-bottom:10px;" placeholder="Maç Adı">
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <input type="number" id="b-amt" class="c-select" style="flex:1" placeholder="USDT">
                        <input type="number" id="b-odds" class="c-select" style="flex:1" placeholder="Oran">
                        <button onclick="addBet()" style="background:var(--green); border:none; padding:10px; border-radius:4px; cursor:pointer;"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div id="p-list"></div>
                </div>
                <div id="chart"></div>
            </div>
        </div>
    </div>

    <script>
        let allData = [], ligSayac = {}, activeSport = 'futbol', curMode = 'bulletin';
        let wallet = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let history = JSON.parse(localStorage.getItem('v19_h')) || [100];
        let pending = JSON.parse(localStorage.getItem('v19_p')) || [];

        const FLAGS = {"tr":"🇹🇷", "gb-eng":"🏴", "es":"🇪🇸", "de":"🇩🇪", "it":"🇮🇹", "fr":"🇫🇷", "eu":"🇪🇺", "us":"🇺🇸", "nl":"🇳🇱", "pt":"🇵🇹", "br":"🇧🇷", "ar":"🇦🇷", "un":"🏳️"};

        function switchSport(s) {
            activeSport = s;
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(s==='futbol'?'btn-f':'btn-b').classList.add('active');
            document.getElementById('v-bulletin').style.display = 'block';
            document.getElementById('v-finance').style.display = 'none';
            buildFilters(); render();
        }

        function setMode(m, el) {
            curMode = m;
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('v-bulletin').style.display = 'none';
            document.getElementById('v-finance').style.display = 'grid';
            setTimeout(initChart, 100);
        }

        async function load() {
            const r = await fetch('v19_rapor.json?t=' + Date.now());
            const d = await r.json();
            allData = d.veriler || []; ligSayac = d.sayac || {};
            buildFilters(); render();
        }

        function buildFilters() {
            const dSel = document.getElementById('date-sel'), lSel = document.getElementById('league-sel');
            const dates = [...new Set(allData.filter(m => m.t === activeSport).map(m => m.dt))].sort();
            dSel.innerHTML = '<option value="ALL">TARİH SEÇ</option>' + dates.map(d => `<option value="${d}">${d}</option>`).join('');
            lSel.innerHTML = '<option value="ALL">LİG SEÇ</option>';
            for(let l in ligSayac) {
                const isF = ["SUPER LIG", "PREMIER LEAGUE", "LA LIGA", "BUNDESLIGA", "SERIE A", "LIGUE 1", "CHAMPIONS LEAGUE", "EUROPA LEAGUE", "CONFERENCE LEAGUE", "CHAMPIONSHIP", "EREDIVISIE", "PRIMEIRA LIGA", "BRAZIL SERIE A", "ARGENTINA PRIMERA", "MLS"].includes(l);
                if((activeSport==='futbol' && isF) || (activeSport==='basketbol' && !isF)) lSel.innerHTML += `<option value="${l}">${l} (${ligSayac[l]})</option>`;
            }
        }

        function render() {
            if(curMode !== 'bulletin') return;
            const area = document.getElementById('list-area'); area.innerHTML = "";
            const dVal = document.getElementById('date-sel').value, lVal = document.getElementById('league-sel').value;
            let filtered = allData.filter(m => m.t === activeSport && (dVal==='ALL'||m.dt===dVal) && (lVal==='ALL'||m.l===lVal));
            const days = {};
            filtered.forEach(m => { if(!days[m.dt]) days[m.dt] = []; days[m.dt].push(m); });
            Object.keys(days).sort().forEach(day => {
                area.innerHTML += `<div style="background:#111; color:var(--green); font-size:0.7em; font-weight:900; padding:5px 15px; margin:10px 0; border-left:3px solid var(--green)">${day}</div>`;
                const groups = {};
                days[day].forEach(m => { if(!groups[m.l]) groups[m.l] = []; groups[m.l].push(m); });
                for(let lig in groups) {
                    area.innerHTML += `<div class="league-head"><div>${activeSport==='futbol'?'⚽':'🏀'} ${lig}</div><img src="https://flagcdn.com/w40/${groups[lig][0].f}.png" class="flag"></div>`;
                    groups[lig].sort((a,b)=>a.tm.localeCompare(b.tm)).forEach(m => {
                        area.innerHTML += `<div class="match-row"><div class="m-time">${m.tm}</div><div class="m-teams">${m.m}</div></div>`;
                    });
                }
            });
        }

        function setManual() {
            const val = parseFloat(document.getElementById('m-amt').value);
            if(!val) return; wallet = val; history.push(wallet); save(); updateUI(); initChart();
        }

        function addBet() {
            const name = document.getElementById('b-name').value, amt = parseFloat(document.getElementById('b-amt').value), odds = parseFloat(document.getElementById('b-odds').value);
            if(!name || !amt) return;
            pending.push({ id: Date.now(), name, amt, odds }); save(); renderP(); document.getElementById('b-name').value = '';
        }

        function resolve(id, res) {
            const b = pending.find(x => x.id === id);
            if(res === 'win') wallet += (b.amt * b.odds) - b.amt; else wallet -= b.amt;
            history.push(wallet); pending = pending.filter(x => x.id !== id); save(); updateUI(); renderP(); if(curMode==='finance') initChart();
        }

        function renderP() {
            const area = document.getElementById('p-list'); area.innerHTML = "";
            pending.forEach(b => {
                area.innerHTML += `<div class="op-row"><span>${b.name} ($${b.amt})</span><div><button onclick="resolve(${b.id}, 'win')" style="background:var(--green); border:none; padding:5px 10px; border-radius:3px; cursor:pointer; font-weight:900;">W</button> <button onclick="resolve(${b.id}, 'loss')" style="background:var(--red); border:none; padding:5px 10px; border-radius:3px; cursor:pointer; font-weight:900; color:#fff;">L</button></div></div>`;
            });
        }

        function save() {
            localStorage.setItem('v19_w', wallet); localStorage.setItem('v19_h', JSON.stringify(history)); localStorage.setItem('v19_p', JSON.stringify(pending));
        }

        function updateUI() {
            document.getElementById('w-val').innerText = wallet.toFixed(2);
            document.getElementById('h-wallet').innerText = wallet.toFixed(2) + " USDT";
        }

        function initChart() {
            new ApexCharts(document.querySelector("#chart"), {
                series: [{ name: "USDT", data: history }],
                chart: { type: 'area', height: 400, toolbar: false, animations: { enabled: false }, background: 'transparent' },
                theme: { mode: 'dark' },
                colors: [wallet >= history[0] ? '#10b981' : '#ef4444'],
                stroke: { curve: 'straight', width: 2 },
                xaxis: { labels: { show: false } },
                annotations: {
                    yaxis: [
                        { y: 500, borderColor: '#333', label: { text: '500$' } },
                        { y: 1000, borderColor: '#333', label: { text: '1K$' } },
                        { y: 2000, borderColor: '#333', label: { text: '2K$' } },
                        { y: 5000, borderColor: '#333', label: { text: '5K$' } },
                        { y: 10000, borderColor: '#fbbf24', label: { text: '10K$' } },
                        { y: 50000, borderColor: '#10b981', label: { text: '50K$' } },
                        { y: 100000, borderColor: '#10b981', label: { text: '100K$' } }
                    ]
                }
            }).render();
        }

        updateUI(); renderP(); load();
    </script>
</body>
</html>
