<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 GLOBAL COMMAND CENTER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --gold: #f59e0b; --silver: #9ca3af; --bronze: #b45309; --bg: #09090b; --panel: #18181b; --green: #10b981; --border: #27272a; --text-main: #f4f4f5; --text-muted: #a1a1aa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; overflow-x: hidden; }
        .sidebar { width: 260px; background: #0f0f12; height: 100vh; border-right: 1px solid var(--border); flex-shrink: 0; transition: transform 0.3s; }
        .sidebar.closed { transform: translateX(-260px); margin-right: -260px; }
        .brand { color: var(--green); text-align: center; margin: 30px 0; font-weight: 800; font-size: 1.5em; letter-spacing: 2px; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: var(--text-muted); font-weight: 600; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: rgba(16, 185, 129, 0.1); color: #fff; border-color: var(--green); }
        .main { flex-grow: 1; padding: 25px 40px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 25px; }
        .menu-btn { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
        .clock { font-family: monospace; font-size: 0.85em; background: rgba(16,185,129,0.1); color: var(--green); padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(16,185,129,0.2); }
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .tab { padding: 8px 20px; background: transparent; border: 1px solid var(--border); cursor: pointer; border-radius: 6px; color: var(--text-muted); font-weight: 600; font-size: 0.9em; }
        .tab.active.gold { border-color: var(--gold); color: var(--gold); background: rgba(245,158,11,0.05); }
        .league-group { margin-bottom: 40px; }
        .league-header { font-size: 1em; font-weight: 800; color: #fff; margin-bottom: 15px; padding: 12px 15px; background: #131316; border-left: 4px solid var(--green); border-radius: 0 6px 6px 0; display: flex; align-items: center; gap: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; position: relative; display: flex; flex-direction: column; gap: 10px; }
        .match-teams { font-size: 1.05em; font-weight: 800; color: #fff; }
        .alert-box { font-size: 0.85em; color: var(--text-muted); background: #0c0c0e; padding: 10px; border-radius: 6px; border: 1px dashed #27272a; }
        .empty-msg { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">V19 // GLOBAL</div>
        <div class="nav-item active" onclick="setSport('futbol', this)"><span>⚽</span> FUTBOL</div>
        <div class="nav-item" onclick="setSport('basketbol', this)"><span>🏀</span> BASKETBOL</div>
    </div>
    
    <div class="main">
        <div class="header">
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <h2 style="margin:0" id="title">⚽ FUTBOL RADARI</h2>
            </div>
            <div class="clock" id="clock">BAĞLANTI BEKLENİYOR...</div>
        </div>

        <div class="tabs">
            <button class="tab active gold" onclick="setCategory('ALTIN', this)">🏆 ALTIN KATEGORİ</button>
            <button class="tab" onclick="setCategory('GÜMÜŞ', this)">🥈 GÜMÜŞ KATEGORİ</button>
            <button class="tab" onclick="setCategory('BRONZ', this)">🥉 BRONZ KATEGORİ</button>
        </div>

        <div id="content-area"></div>
    </div>

    <script>
        let currentSport = 'futbol';
        let currentCategory = 'ALTIN';
        let allData = [];

        // ÜLKE VE BAYRAK EŞLEŞTİRME SÖZLÜĞÜ
        const countryMap = {
            "SUPER LIG": { flag: "🇹🇷", country: "Türkiye" },
            "PREMIER LEAGUE": { flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", country: "İngiltere" },
            "LA LIGA": { flag: "🇪🇸", country: "İspanya" },
            "LIGA ACB": { flag: "🇪🇸", country: "İspanya" },
            "BUNDESLIGA": { flag: "🇩🇪", country: "Almanya" },
            "BBL": { flag: "🇩🇪", country: "Almanya" },
            "SERIE A": { flag: "🇮🇹", country: "İtalya" },
            "LEGA A": { flag: "🇮🇹", country: "İtalya" },
            "LIGUE 1": { flag: "🇫🇷", country: "Fransa" },
            "LNB PRO A": { flag: "🇫🇷", country: "Fransa" },
            "EREDIVISIE": { flag: "🇳🇱", country: "Hollanda" },
            "PRIMEIRA LIGA": { flag: "🇵🇹", country: "Portekiz" },
            "NBA": { flag: "🇺🇸", country: "ABD" },
            "NCAA": { flag: "🇺🇸", country: "ABD" },
            "WNBA": { flag: "🇺🇸", country: "ABD" },
            "CHAMPIONS LEAGUE": { flag: "🇪🇺", country: "Avrupa" },
            "EUROPA LEAGUE": { flag: "🇪🇺", country: "Avrupa" },
            "CONFERENCE LEAGUE": { flag: "🇪🇺", country: "Avrupa" },
            "EUROLEAGUE": { flag: "🇪🇺", country: "Avrupa" },
            "EURO INTERNATIONAL": { flag: "🇪🇺", country: "Avrupa" },
            "SERIE A (BRAZIL)": { flag: "🇧🇷", country: "Brezilya" },
            "PRIMERA DIVISION (ARGENTINA)": { flag: "🇦🇷", country: "Arjantin" }
        };

        const basketLigleri = ["NBA", "EUROLEAGUE", "ACB", "LEGA A", "LNB", "BBL", "NCAA", "WNBA", "EUROCUP", "BSL"];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }

        function setSport(s, element) { 
            currentSport = s; 
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('title').innerText = s === 'futbol' ? '⚽ FUTBOL RADARI' : '🏀 BASKETBOL RADARI';
            render(); 
        }

        function setCategory(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active', 'gold'));
            element.classList.add('active', 'gold');
            render();
        }

        async function update() {
            try {
                const res = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const data = await res.json();
                document.getElementById('clock').innerText = "SON TARAMA: " + data.son_guncelleme;
                allData = data.veriler || [];
                render();
            } catch(e) { console.log("Hata:", e); }
        }

        function render() {
            const area = document.getElementById('content-area');
            area.innerHTML = "";

            const filtered = allData.filter(m => {
                const upperLig = m.lig.toUpperCase();
                const isBasket = basketLigleri.some(b => upperLig.includes(b));
                const matchSport = isBasket ? 'basketbol' : 'futbol';
                return matchSport === currentSport && m.kategori.toUpperCase() === currentCategory;
            });

            if (filtered.length === 0) {
                area.innerHTML = `<div class="empty-msg">Bu kategoride şu an aktif maç bulunmuyor.</div>`;
                return;
            }

            const grouped = {};
            filtered.forEach(m => {
                const ligUpper = m.lig.toUpperCase();
                if (!grouped[ligUpper]) grouped[ligUpper] = [];
                grouped[ligUpper].push(m);
            });

            for (let lig in grouped) {
                let info = { flag: "🏳️", country: "Diğer" };
                for (let key in countryMap) {
                    if (lig.includes(key)) { info = countryMap[key]; break; }
                }

                let ligHtml = `
                    <div class="league-group">
                        <div class="league-header">
                            <span>${info.flag}</span> ${info.country} - ${lig}
                        </div>
                        <div class="grid">
                `;

                grouped[lig].forEach(m => {
                    let cleanAlert = m.uyari.replace(" (UTC)", "");
                    let timeMatch = cleanAlert.match(/\d{2}:\d{2}/);
                    if(timeMatch) {
                        let [h, min] = timeMatch[0].split(':');
                        let trH = (parseInt(h) + 3) % 24;
                        cleanAlert = cleanAlert.replace(timeMatch[0], trH.toString().padStart(2, '0') + ":" + min + " (TSİ)");
                    }

                    ligHtml += `
                        <div class="card">
                            <div class="match-teams">${m.mac}</div>
                            <div class="alert-box">${cleanAlert}</div>
                        </div>
                    `;
                });
                ligHtml += `</div></div>`;
                area.innerHTML += ligHtml;
            }
        }
        setInterval(update, 15000);
        update();
    </script>
</body>
</html>
