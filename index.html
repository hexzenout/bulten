<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 COMMAND | ELITE TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;700;900&display=swap');
        :root { --gold: #fbbf24; --green: #10b981; --bg: #050505; --panel: #0c0c0e; --border: #1f1f23; --text: #fff; --muted: #71717a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: #000; border-right: 2px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; }
        .brand { padding: 30px 25px; font-weight: 900; font-size: 1.5em; color: var(--text); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .menu-btn:hover { color: #fff; }
        
        .menu-items { display: block; border-bottom: 1px solid var(--border); }
        .menu-items.collapsed { display: none; }
        
        .nav-item { padding: 18px 25px; cursor: pointer; color: var(--muted); font-weight: 700; font-size: 1em; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0a0a0a; transition: 0.2s; }
        .nav-item-left { display: flex; align-items: center; gap: 12px; }
        .check-box { font-size: 1.3em; color: var(--muted); transition: 0.2s; }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.03); border-left: 4px solid var(--green); }
        .nav-item.active .check-box { color: var(--green); }
        .nav-item.fav-tab.active { border-left-color: var(--gold); }
        .nav-item.canli-tab.active { border-left-color: var(--green); }
        
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #000; }
        .quota-box { background: rgba(16, 185, 129, 0.05); padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2); font-family: 'JetBrains Mono'; font-size: 0.9em; color: var(--green); }
        .content { flex-grow: 1; padding: 30px; overflow-y: auto; }

        .stream-grid { display: none; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 15px; height: calc(100vh - 140px); }
        .stream-grid.active { display: grid; }
        .stream-box { background: #000; border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .stream-header { padding: 8px 12px; background: #0a0a0c; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); }
        .stream-input { flex-grow: 1; background: #050505; border: 1px solid #222; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 0.75em; font-family: 'JetBrains Mono'; }
        
        .stream-btn { background: var(--green); color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.7em; }
        .stream-close-btn { background: #ef4444; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.7em; }
        
        .stream-frame { flex-grow: 1; border: none; background: #000; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { padding: 10px 24px; background: var(--panel); border: 1px solid var(--border); cursor: pointer; border-radius: 6px; color: var(--muted); font-weight: 900; font-size: 0.8em; }
        .tab.active.gold { border-color: var(--gold); color: var(--gold); background: rgba(251,191,36,0.05); }
        .tab.active.silver { border-color: #fff; color: #fff; }
        .tab.active.bronze { border-color: #b45309; color: #b45309; }
        
        .date-divider { color: var(--green); font-family: 'JetBrains Mono'; font-weight: 800; font-size: 0.9em; margin: 30px 0 10px 0; border-left: 4px solid var(--green); padding-left: 12px; }
        .league-box { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); overflow: hidden; }
        .league-trigger { padding: 18px 22px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 900; font-size: 1em; background: #0a0a0c; }
        .league-content { display: none; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; }
        .league-content.open { display: grid; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 10px; position: relative; border-left: 4px solid #222; }
        .card-match { font-weight: 900; font-size: 1.2em; color: #fff; margin: 10px 0; padding-right:30px; }
        .fav-star { position: absolute; top: 18px; right: 18px; font-size: 1.3em; color: #222; cursor: pointer; }
        .fav-star.active { color: var(--gold); }
        .flag { width: 30px; height: 20px; object-fit: cover; border-radius: 3px; margin-right: 12px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <span>V19 TERMINAL</span>
        </div>
        <div class="menu-items" id="menu-items">
            <div class="nav-item active" id="filter-futbol" onclick="toggleSport('futbol')">
                <div class="nav-item-left"><i class="fa-solid fa-futbol"></i> Futbol</div>
                <i class="fa-solid fa-square-check check-box" id="icon-futbol"></i>
            </div>
            <div class="nav-item active" id="filter-basketbol" onclick="toggleSport('basketbol')">
                <div class="nav-item-left"><i class="fa-solid fa-basketball"></i> Basketbol</div>
                <i class="fa-solid fa-square-check check-box" id="icon-basketbol"></i>
            </div>
            <div class="nav-item fav-tab" id="nav-fav" onclick="setAppMode('favoriler', this)">
                <div class="nav-item-left"><i class="fa-solid fa-star"></i> Favoriler</div>
            </div>
            <div class="nav-item canli-tab" id="nav-canli" onclick="setAppMode('canli', this)" style="color:var(--gold)">
                <div class="nav-item-left"><i class="fa-solid fa-tv"></i> 6'LI EKRAN İZLE</div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="title" style="margin:0; font-weight:900;">BÜLTEN RADARI</h2>
            <div class="quota-box">KOTA: <span id="quota">--</span> | <span id="scan-time">--:--</span></div>
        </div>
        <div class="content">
            <div id="bulten-view">
                <div class="tabs" id="kategori-tabs">
                    <button class="tab active gold" onclick="setCategory('ALTIN', this)">ALTIN LİGLER</button>
                    <button class="tab" onclick="setCategory('GÜMÜŞ', this)">GÜMÜŞ LİGLER</button>
                    <button class="tab" onclick="setCategory('BRONZ', this)">BRONZ (DİĞER)</button>
                </div>
                <div id="content-area"></div>
            </div>
            <div class="stream-grid" id="stream-view">
                <script>
                    for(let i=1; i<=6; i++) {
                        document.write(`
                        <div class="stream-box">
                            <div class="stream-header">
                                <span style="color:var(--green); font-weight:bold; font-size:0.7em;">CH${i}</span>
                                <input type="text" class="stream-input" id="input-${i}" placeholder="Link..." oninput="handleInputClear(${i})">
                                <button class="stream-close-btn" onclick="clearStream(${i})" title="Kapat"><i class="fa-solid fa-xmark"></i></button>
                                <button class="stream-btn" onclick="loadStream(${i})">İZLE</button>
                            </div>
                            <iframe id="frame-${i}" class="stream-frame" src="about:blank" allowfullscreen></iframe>
                        </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <script>
        let activeSports = ['futbol', 'basketbol']; 
        let currentAppMode = 'bulten'; 
        let currentCategory = 'ALTIN';
        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('v19_favs_v3')) || {};

        function cleanExpiredFavorites() {
            const now = Date.now();
            let changed = false;
            for (let m in favorites) {
                if (now - favorites[m] > (24 * 60 * 60 * 1000)) { delete favorites[m]; changed = true; }
            }
            if (changed) localStorage.setItem('v19_favs_v3', JSON.stringify(favorites));
        }

        function toggleMenu() { document.getElementById('menu-items').classList.toggle('collapsed'); }
        
        // YAYIN KONTROLLERİ: Çarpı Butonu ve Anında Temizleme
        function loadStream(id) { document.getElementById(`frame-${id}`).src = document.getElementById(`input-${id}`).value || "about:blank"; }
        function handleInputClear(id) { if(document.getElementById(`input-${id}`).value.trim() === "") document.getElementById(`frame-${id}`).src = "about:blank"; }
        function clearStream(id) { document.getElementById(`input-${id}`).value = ''; document.getElementById(`frame-${id}`).src = "about:blank"; }

        function toggleSport(sport) {
            setAppMode('bulten'); 
            const el = document.getElementById('filter-' + sport);
            const icon = document.getElementById('icon-' + sport);
            if (activeSports.includes(sport)) {
                if (activeSports.length > 1) { 
                    activeSports = activeSports.filter(s => s !== sport);
                    el.classList.remove('active');
                    icon.classList.replace('fa-square-check', 'fa-square'); 
                }
            } else {
                activeSports.push(sport);
                el.classList.add('active');
                icon.classList.replace('fa-square', 'fa-square-check'); 
            }
            render();
        }

        function setAppMode(mode, el) {
            currentAppMode = mode;
            if(el) {
                document.getElementById('nav-fav').classList.remove('active');
                document.getElementById('nav-canli').classList.remove('active');
                el.classList.add('active');
            }
            if(mode === 'canli') {
                document.getElementById('bulten-view').style.display = 'none';
                document.getElementById('stream-view').classList.add('active');
            } else {
                document.getElementById('stream-view').classList.remove('active');
                document.getElementById('bulten-view').style.display = 'block';
                render();
            }
        }

        // LİG - BAYRAK SÖZLÜĞÜ
        const leagueMeta = {
            "SUPER LIG": {f:"tr", n:"TÜRKİYE"}, "BSL": {f:"tr", n:"TÜRKİYE"},
            "PREMIER LEAGUE": {f:"gb-eng", n:"İNGİLTERE"}, "CHAMPIONSHIP": {f:"gb-eng", n:"İNGİLTERE"},
            "LA LIGA": {f:"es", n:"İSPANYA"}, "LIGA ACB": {f:"es", n:"İSPANYA"},
            "BUNDESLIGA": {f:"de", n:"ALMANYA"}, "BBL": {f:"de", n:"ALMANYA"},
            "SERIE A": {f:"it", n:"İTALYA"}, "LEGA A": {f:"it", n:"İTALYA"},
            "LIGUE 1": {f:"fr", n:"FRANSA"}, "LNB PRO A": {f:"fr", n:"FRANSA"}, "PRO A": {f:"fr", n:"FRANSA"},
            "EREDIVISIE": {f:"nl", n:"HOLLANDA"}, "PRIMEIRA LIGA": {f:"pt", n:"PORTEKİZ"},
            "NBA": {f:"us", n:"ABD"}, "WNBA": {f:"us", n:"ABD"}, "NCAA": {f:"us", n:"ABD"}, "MLS": {f:"us", n:"ABD"},
            "SERIE A (BRAZIL)": {f:"br", n:"BREZİLYA"}, "PRIMERA DIVISION (ARGENTINA)": {f:"ar", n:"ARJANTİN"},
            "EUROLEAGUE": {f:"eu", n:"AVRUPA"}, "EUROCUP": {f:"eu", n:"AVRUPA"}, "BCL": {f:"eu", n:"AVRUPA"},
            "CHAMPIONS LEAGUE": {f:"eu", n:"AVRUPA"}, "EUROPA LEAGUE": {f:"eu", n:"AVRUPA"}, "CONFERENCE LEAGUE": {f:"eu", n:"AVRUPA"},
            "HEBA A1": {f:"gr", n:"YUNANİSTAN"}, "VTB": {f:"ru", n:"RUSYA"}, "WORLD CUP": {f:"un", n:"DÜNYA"}
        };

        async function update() {
            try {
                const r = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const d = await r.json();
                document.getElementById('quota').innerText = d.kalan_hak || "500";
                document.getElementById('scan-time').innerText = d.son_guncelleme.split(' ')[1];
                allData = d.veriler || []; render();
            } catch(e) {}
        }

        // GÜVENLİ TARİH FONKSİYONU (Zaman Dilimi Hatasını Engeller)
        function toLocalISODate(dateObj) {
            const offset = dateObj.getTimezoneOffset() * 60000;
            return new Date(dateObj.getTime() - offset).toISOString().split('T')[0];
        }

        function render() {
            const area = document.getElementById('content-area'); area.innerHTML = "";
            
            let filtered = allData.filter(m => {
                return currentAppMode === 'favoriler' ? favorites[m.mac] : (activeSports.includes(m.tur) && m.kategori === currentCategory);
            });

            if(filtered.length === 0) { area.innerHTML = `<div style="text-align:center; padding:50px; color:#555;">Kriterlere uygun maç bulunamadı.</div>`; return; }

            const days = {};
            filtered.forEach(m => {
                // Saat Python'dan zaten TSİ ve YYYY-MM-DD olarak hazır geliyor. Çeviriye gerek yok!
                const dateKey = m.tarih; 
                if(!days[dateKey]) days[dateKey] = [];
                days[dateKey].push(m);
            });

            Object.keys(days).sort().forEach(dateKey => {
                const now = new Date();
                const todayStr = toLocalISODate(now);
                const tmrw = new Date(now.getTime() + 86400000);
                const tmrwStr = toLocalISODate(tmrw);

                let label = "";
                if(dateKey === todayStr) label = "BUGÜN";
                else if(dateKey === tmrwStr) label = "YARIN";
                else if(dateKey === "BİLİNMİYOR") label = "BELİRSİZ TARİH";
                else {
                    const parts = dateKey.split('-');
                    const dateObj = new Date(parts[0], parts[1]-1, parts[2]);
                    label = dateObj.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
                }

                area.innerHTML += `<div class="date-divider">${label}</div>`;
                const groups = {};
                days[dateKey].forEach(m => { if(!groups[m.lig]) groups[m.lig] = []; groups[m.lig].push(m); });
                
                for(let lig in groups) {
                    let mta = { f: "un", n: "DİĞER LİGLER" };
                    for (let key in leagueMeta) {
                        if (lig.toUpperCase().includes(key)) { mta = leagueMeta[key]; break; }
                    }

                    const lBox = document.createElement('div'); lBox.className = 'league-box';
                    lBox.innerHTML = `<div class="league-trigger" onclick="this.nextElementSibling.classList.toggle('open')"><span><img src="https://flagcdn.com/w40/${mta.f}.png" class="flag"> ${mta.n} - ${lig}</span><i class="fa-solid fa-chevron-down fa-xs"></i></div><div class="league-content"></div>`;
                    const cont = lBox.querySelector('.league-content');
                    
                    groups[lig].sort((a,b)=>a.saat.localeCompare(b.saat)).forEach(m => {
                        cont.innerHTML += `<div class="card"><i class="fa-solid fa-star fav-star ${favorites[m.mac]?'active':''}" onclick="toggleFav('${m.mac}', this)"></i><span class="card-time">${m.saat} (TSİ)</span><div class="card-match">${m.mac}</div><div style="font-size:0.85em; color:var(--muted); border-top:1px solid #1f1f23; padding-top:10px;"><i class="fa-solid fa-satellite-dish" style="color:var(--green)"></i> ${m.uyari}</div></div>`;
                    });
                    area.appendChild(lBox);
                }
            });
        }
        
        function toggleFav(m, el) { if(favorites[m]) delete favorites[m]; else favorites[m] = Date.now(); localStorage.setItem('v19_favs_v3', JSON.stringify(favorites)); render(); }
        function setCategory(c,el) { currentCategory=c; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active','gold','silver','bronze')); 
            const colorClass = c === 'ALTIN' ? 'gold' : c === 'GÜMÜŞ' ? 'silver' : 'bronze';
            el.classList.add('active', colorClass); render(); 
        }
        
        update(); setInterval(update, 15000);
    </script>
</body>
</html>
