<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 STRATEJİ MERKEZİ</title>
    <style>
        :root { --gold: #FFD700; --silver: #C0C0C0; --bg: #0a0a0a; --green: #00ff41; --panel: #151515; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; }
        .sidebar { width: 250px; background: #111; height: 100vh; border-right: 1px solid #333; flex-shrink: 0; }
        .main { flex-grow: 1; padding: 20px; height: 100vh; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Lig Grupları */
        .league-group { margin-bottom: 30px; border: 1px solid #222; border-radius: 8px; background: rgba(255,255,255,0.02); padding: 15px; }
        .league-header { font-size: 1.2em; font-weight: bold; color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; display: flex; align-items: center; }
        .league-header::before { content: '◈'; margin-right: 10px; color: var(--green); }
        
        /* Maç Kartları - Grid Ayarı */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--panel); border: 1px solid #333; padding: 15px; border-radius: 6px; position: relative; }
        .match-info { font-weight: bold; color: var(--green); margin-bottom: 8px; }
        .time-tag { font-size: 0.8em; color: #888; background: #000; padding: 2px 6px; border-radius: 3px; }
        .alert-text { font-size: 0.9em; color: #ccc; margin-top: 10px; border-top: 1px solid #222; pt: 8px; }
        
        .nav-item { padding: 15px; cursor: pointer; color: #888; border-left: 3px solid transparent; }
        .nav-item.active { background: rgba(0,255,65,0.1); color: #fff; border-color: var(--green); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="text-align:center; color:var(--green)">V19 BÜLTEN</h2>
        <div class="nav-item active" onclick="setSport('futbol')">⚽ FUTBOL</div>
        <div class="nav-item" onclick="setSport('basketbol')">🏀 BASKETBOL</div>
    </div>
    
    <div class="main">
        <div class="header">
            <h2 id="title">⚽ FUTBOL RADARI</h2>
            <div id="clock" style="color:var(--green)">BAĞLANILIYOR...</div>
        </div>

        <div id="content-area">
            </div>
    </div>

    <script>
        let currentSport = 'futbol';
        const basketLigleri = ["NBA", "Euroleague", "BSL", "Liga ACB", "NCAA", "EuroCup"];

        async function update() {
            try {
                const res = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const data = await res.json();
                document.getElementById('clock').innerText = "GÜNCELLEME: " + data.son_guncelleme;
                render(data.veriler);
            } catch(e) { console.log("Veri bekleniyor..."); }
        }

        function render(veriler) {
            const area = document.getElementById('content-area');
            area.innerHTML = "";

            // 1. Spor Türüne Göre Filtrele
            const filtered = veriler.filter(m => {
                const isBasket = basketLigleri.some(b => m.lig.includes(b));
                return currentSport === 'futbol' ? !isBasket : isBasket;
            });

            // 2. LİG BAZLI GRUPLA (Dağınıklığı Önleyen Kısım)
            const grouped = {};
            filtered.forEach(m => {
                if (!grouped[m.lig]) grouped[m.lig] = [];
                grouped[m.lig].push(m);
            });

            // 3. Ekrana Bas
            for (let lig in grouped) {
                let ligHtml = `
                    <div class="league-group">
                        <div class="league-header">${lig.toUpperCase()}</div>
                        <div class="grid">
                `;

                grouped[lig].forEach(m => {
                    // UTC -> TRT Dönüşümü (+3 Saat)
                    let timeStr = m.uyari.match(/\d{2}:\d{2}/);
                    if(timeStr) {
                        let [h, m_val] = timeStr[0].split(':');
                        let newH = (parseInt(h) + 3) % 24;
                        let trTime = `${newH.toString().padStart(2, '0')}:${m_val}`;
                        m.uyari = m.uyari.replace(timeStr[0], trTime + " (TSİ)");
                    }

                    ligHtml += `
                        <div class="card">
                            <div class="match-info">${m.mac}</div>
                            <div class="alert-text">${m.uyari}</div>
                        </div>
                    `;
                });

                ligHtml += `</div></div>`;
                area.innerHTML += ligHtml;
            }
        }

        function setSport(s) { 
            currentSport = s; 
            document.getElementById('title').innerText = s === 'futbol' ? '⚽ FUTBOL RADARI' : '🏀 BASKETBOL RADARI';
            update(); 
        }

        setInterval(update, 15000);
        update();
    </script>
</body>
</html>
