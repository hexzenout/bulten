<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 GLOBAL COMMAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --gold: #f59e0b; --silver: #9ca3af; --bg: #09090b; --panel: #18181b; --green: #10b981; --border: #27272a; --text: #f4f4f5; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; overflow: hidden; }
        
        .sidebar { width: 260px; background: #0f0f12; height: 100vh; border-right: 1px solid var(--border); transition: 0.3s; flex-shrink: 0; }
        .sidebar.closed { transform: translateX(-260px); margin-right: -260px; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #a1a1aa; font-weight: 700; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: rgba(16, 185, 129, 0.1); color: #fff; border-color: var(--green); }
        
        .main { flex-grow: 1; padding: 25px 40px; height: 100vh; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 25px; }
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab { padding: 10px 20px; background: transparent; border: 1px solid var(--border); cursor: pointer; border-radius: 6px; color: #a1a1aa; font-weight: 700; }
        .tab.active.gold { border-color: var(--gold); color: var(--gold); background: rgba(245,158,11,0.05); }
        
        .league-group { margin-bottom: 40px; }
        .league-header { font-size: 1.1em; font-weight: 900; color: #fff; margin-bottom: 15px; padding: 12px 15px; background: #131316; border-left: 4px solid var(--green); border-radius: 0 6px 6px 0; display: flex; align-items: center; gap: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; position: relative; }
        .match-teams { font-size: 1.1em; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .alert-box { font-size: 0.85em; color: #a1a1aa; background: #0c0c0e; padding: 10px; border-radius: 6px; border: 1px dashed #27272a; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div style="color:var(--green); text-align:center; margin:30px 0; font-weight:900; font-size:1.5em;">V19 GLOBAL</div>
        <div class="nav-item active" onclick="setSport('futbol', this)"><span>⚽</span> FUTBOL RADARI</div>
        <div class="nav-item" onclick="setSport('basketbol', this)"><span>🏀</span> BASKETBOL RADARI</div>
    </div>
    
    <div class="main">
        <div class="header">
            <div style="display:flex; align-items:center; gap:15px;">
                <button onclick="document.getElementById('sidebar').classList.toggle('closed')" style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;">☰</button>
                <h2 style="margin:0" id="title">⚽ FUTBOL RADARI</h2>
            </div>
            <div id="clock" style="font-family:monospace; color:var(--green); background:rgba(16,185,129,0.1); padding:6px 12px; border-radius:6px; border:1px solid rgba(16,185,129,0.2);">YÜKLENİYOR...</div>
        </div>

        <div class="tabs">
            <button class="tab active gold" onclick="setCategory('ALTIN', this)">🏆 ALTIN KATEGORİ</button>
            <button class="tab" onclick="setCategory('GÜMÜŞ', this)">🥈 GÜMÜŞ KATEGORİ</button>
        </div>

        <div id="content-area"></div>
    </div>

    <script>
        let currentSport = 'futbol', currentCategory = 'ALTIN', allData = [];
        const countryMap = {
            "SUPER LIG": { flag: "🇹🇷", country: "Türkiye" }, "BSL": { flag: "🇹🇷", country: "Türkiye" },
            "PREMIER LEAGUE": { flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", country: "İngiltere" }, "LA LIGA": { flag: "🇪🇸", country: "İspanya" },
            "LIGA ACB": { flag: "🇪🇸", country: "İspanya" }, "BUNDESLIGA": { flag: "🇩🇪", country: "Almanya" },
            "BBL": { flag: "🇩🇪", country: "Almanya" }, "SERIE A": { flag: "🇮🇹", country: "İtalya" },
            "LEGA A": { flag: "🇮🇹", country: "İtalya" }, "LIGUE 1": { flag: "🇫🇷", country: "Fransa" },
            "LNB PRO A": { flag: "🇫🇷", country: "Fransa" }, "EREDIVISIE": { flag: "🇳🇱", country: "Hollanda" },
            "PRIMEIRA LIGA": { flag: "🇵🇹", country: "Portekiz" }, "NBA": { flag: "🇺🇸", country: "ABD" },
            "NCAA": { flag: "🇺🇸", country: "ABD" }, "WNBA": { flag: "🇺🇸", country: "ABD" }, "MLS": { flag: "🇺🇸", country: "ABD" },
            "CHAMPIONS LEAGUE": { flag: "🇪🇺", country: "Avrupa" }, "EUROPA LEAGUE": { flag: "🇪🇺", country: "Avrupa" },
            "CONFERENCE LEAGUE": { flag: "🇪🇺", country: "Avrupa" }, "EUROLEAGUE": { flag: "🇪🇺", country: "Avrupa" },
            "EURO INTERNATIONAL": { flag: "🇪🇺", country: "Avrupa" }, "EUROCUP": { flag: "🇪🇺", country: "Avrupa" },
            "BCL": { flag: "🇪🇺", country: "Avrupa" }, "HEBA A1": { flag: "🇬🇷", country: "Yunanistan" },
            "VTB": { flag: "🇷🇺", country: "Rusya" }, "SERIE A (BRAZIL)": { flag: "🇧🇷", country: "Brezilya" },
            "PRIMERA DIVISION (ARGENTINA)": { flag: "🇦🇷", country: "Arjantin" }
        };
        const basketLigleri = ["NBA", "EUROLEAGUE", "ACB", "LEGA A", "LNB", "BBL", "NCAA", "WNBA", "EUROCUP", "BSL", "HEBA", "VTB", "BCL"];

        async function update() {
            try {
                const res = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const data = await res.json();
                document.getElementById('clock').innerText = "SON TARAMA: " + data.son_guncelleme;
                allData = data.veriler || [];
                render();
            } catch(e) { console.log("Hata:", e); }
        }

        function render() {
            const area = document.getElementById('content-area'); area.innerHTML = "";
            const filtered = allData.filter(m => {
                const isBasket = basketLigleri.some(b => m.lig.toUpperCase().includes(b));
                return (isBasket ? 'basketbol' : 'futbol') === currentSport && m.kategori.toUpperCase() === currentCategory;
            });
            if (filtered.length === 0) { area.innerHTML = `<div style="text-align:center; padding:50px; color:#555;">Maç bulunamadı.</div>`; return; }
            
            const grouped = {};
            filtered.forEach(m => { if (!grouped[m.lig]) grouped[m.lig] = []; grouped[m.lig].push(m); });
            for (let lig in grouped) {
                let info = { flag: "🏳️", country: "Uluslararası" };
                for (let key in countryMap) { if (lig.includes(key)) { info = countryMap[key]; break; } }
                let ligHtml = `<div class="league-group"><div class="league-header"><span>${info.flag}</span> ${info.country} - ${lig}</div><div class="grid">`;
                grouped[lig].forEach(m => {
                    let cleanAlert = m.uyari;
                    let timeMatch = cleanAlert.match(/\d{2}:\d{2}/);
                    if(timeMatch) {
                        let [h, min] = timeMatch[0].split(':');
                        let trH = (parseInt(h) + 3) % 24;
                        cleanAlert = cleanAlert.replace(timeMatch[0], trH.toString().padStart(2, '0') + ":" + min + " (TSİ)");
                    }
                    ligHtml += `<div class="card"><div class="match-teams">${m.mac}</div><div class="alert-box">${cleanAlert}</div></div>`;
                });
                ligHtml += `</div></div>`; area.innerHTML += ligHtml;
            }
        }
        function setSport(s, el) { currentSport = s; document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); el.classList.add('active'); render(); }
        function setCategory(c, el) { currentCategory = c; document.querySelectorAll('.tab').forEach(x => x.classList.remove('active', 'gold')); el.classList.add('active', 'gold'); render(); }
        setInterval(update, 15000); update();
    </script>
</body>
</html>
