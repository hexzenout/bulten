<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 ELITE | SUPREME COMMAND CENTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <style>
        /* V19 SUPREME STYLING SYSTEM
           Satır sayısı kısıtlaması olmadan tüm görsel detaylar işlenmiştir.
           Master CSS - v4.0
        */
        
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');

        :root { 
            --gold: #fbbf24; 
            --gold-glow: rgba(251, 191, 36, 0.3);
            --green: #10b981; 
            --green-glow: rgba(16, 185, 129, 0.2);
            --red: #ef4444; 
            --red-glow: rgba(239, 68, 68, 0.2);
            --orange: #f97316; 
            --orange-glow: rgba(249, 115, 22, 0.3);
            --bg: #050505; 
            --panel: #0c0c0e; 
            --panel-light: #161618;
            --border: #1f1f23; 
            --border-bright: #2d2d33;
            --text: #ffffff; 
            --muted: #71717a;
            --sidebar-w: 260px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- BASIC RESET & SCROLLBAR --- */
        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
        
        html, body { 
            width: 100vw; height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* --- SIDEBAR DESIGN --- */
        .sidebar { 
            width: var(--sidebar-w); 
            background: #000; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            height: 100%;
            z-index: 1000;
        }

        .brand-container { 
            padding: 40px 20px; 
            border-bottom: 1px solid var(--border); 
            text-align: center;
        }

        .brand-logo { 
            font-weight: 900; 
            color: var(--green); 
            font-size: 1.3em; 
            letter-spacing: 3px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--green-glow);
        }

        .nav-scroller { padding: 25px 0; flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }

        .nav-item { 
            padding: 16px 25px; 
            cursor: pointer; 
            color: var(--muted); 
            font-weight: 700; 
            font-size: 0.85em; 
            display: flex; 
            align-items: center; 
            transition: var(--transition);
            border-left: 4px solid transparent;
        }

        .nav-item i { margin-right: 18px; font-size: 1.25em; width: 22px; text-align: center; }
        .nav-item:hover { background: #0a0a0a; color: #fff; padding-left: 30px; }
        
        /* Aktif Menü Kimlikleri */
        .nav-item.active { background: rgba(16,185,129,0.08); color: #fff; border-left-color: var(--green); }
        .nav-item.basket.active { border-left-color: var(--orange); }
        .nav-item.stream.active { border-left-color: var(--gold); }
        .nav-item.favs.active { border-left-color: var(--red); }
        .nav-item.finance.active { border-left-color: var(--green); }

        /* --- MAIN VIEWPORT --- */
        .main-viewport { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }

        .top-bar { 
            padding: 0 35px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000; 
            border-bottom: 1px solid var(--border); 
            min-height: 80px;
        }

        .page-title-box h2 { margin: 0; font-size: 1.1em; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; }

        .top-wallet-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-wallet-box label { font-size: 0.6em; color: var(--muted); font-weight: 900; text-transform: uppercase; }
        .top-wallet-box b { font-family: 'JetBrains Mono'; color: var(--gold); font-size: 1.1em; }

        .content-scroller { flex-grow: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at 50% 0%, #0a0a0c 0%, #050505 100%); }

        /* --- RADAR CONTROLS --- */
        .radar-controls { margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .filter-panel { display: flex; gap: 15px; background: var(--panel); padding: 15px; border-radius: 10px; border: 1px solid var(--border); align-items: center; }
        
        .sort-switcher { display: flex; gap: 10px; }
        .btn-sort { 
            background: transparent; border: 1.5px solid var(--orange); color: var(--orange); 
            padding: 10px 20px; border-radius: 6px; font-size: 0.75em; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; transition: var(--transition);
        }
        .btn-sort.active { background: var(--orange); color: #000; box-shadow: 0 0 15px var(--orange-glow); }

        .supreme-select { 
            background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; 
            border-radius: 6px; font-size: 0.8em; font-weight: 700; cursor: pointer; min-width: 180px;
        }

        /* --- CUSTOM LEAGUE DROPDOWN --- */
        .c-drop-wrapper { position: relative; min-width: 300px; }
        .c-drop-trigger { 
            background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 20px; 
            border-radius: 6px; font-size: 0.8em; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; 
        }
        .c-drop-menu { 
            display: none; position: absolute; top: 110%; left: 0; right: 0; 
            background: #0a0a0c; border: 1px solid var(--border-bright); 
            z-index: 2000; max-height: 400px; overflow-y: auto; border-radius: 8px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .c-drop-item { 
            padding: 14px 20px; font-size: 0.85em; display: flex; align-items: center; 
            cursor: pointer; border-bottom: 1px solid #161618; transition: 0.2s;
        }
        .c-drop-item:hover { background: #1f1f23; padding-left: 25px; }
        .c-drop-item img { width: 20px; height: 14px; margin-right: 15px; border-radius: 2px; }

        /* --- LIST RENDER STYLES --- */
        .league-block { margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .league-title-bar { 
            background: #1e293b; padding: 15px 25px; font-weight: 900; font-size: 0.75em; 
            color: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .league-title-bar:hover { background: #273549; }
        .fav-star-icon { color: var(--muted); margin-right: 15px; font-size: 1.2em; cursor: pointer; transition: 0.3s; }
        .fav-star-icon.active { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }

        .match-row-box { 
            display: flex; align-items: center; padding: 12px 25px; border-bottom: 1px solid #161618; 
            font-size: 0.8em; background: #0a0a0c; transition: 0.2s;
        }
        .match-row-box:hover { background: #111115; }
        .match-clock { font-family: 'JetBrains Mono'; color: var(--green); width: 60px; font-weight: 800; font-size: 1em; }
        .match-ico-span { margin-right: 12px; font-size: 0.9em; opacity: 0.6; }
        .match-teams-info { font-weight: 700; flex-grow: 1; display: flex; align-items: center; color: #f4f4f5; }
        .match-flag-img { width: 18px; height: 12px; object-fit: cover; border-radius: 1px; margin-left: 12px; }
        
        /* SAAT SIRALI ETİKET */
        .match-league-tag { 
            font-size: 0.72em; color: var(--muted); background: #18181b; padding: 3px 10px; 
            border-radius: 5px; margin-left: 20px; font-weight: 800; border: 1px solid #27272a; 
        }

        /* --- MULTI-STREAM HUB --- */
        .stream-layout-bar { 
            display: flex; gap: 12px; margin-bottom: 25px; background: var(--panel); 
            padding: 15px; border-radius: 12px; border: 1px solid var(--border); 
        }
        .btn-lt-sel { 
            background: #1f1f23; color: var(--muted); border: 1px solid #333; 
            padding: 10px 25px; border-radius: 8px; font-size: 0.8em; font-weight: 900; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-lt-sel.active { background: var(--green); color: #000; border-color: var(--green); }

        .stream-grid-master { display: none; gap: 15px; height: calc(100vh - 300px); width: 100%; }
        .stream-grid-master.active { display: grid; }
        .grid-lay-1 { grid-template-columns: 1fr; }
        .grid-lay-2 { grid-template-columns: 1fr 1fr; }
        .grid-lay-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-lay-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }

        .stream-unit-box { background: #000; border: 1px solid #222; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .stream-unit-nav { padding: 8px; background: #0a0a0c; display: flex; gap: 8px; border-bottom: 1px solid var(--border); }
        .stream-unit-input { flex: 1; background: #000; border: 1px solid #333; color: #fff; font-size: 11px; padding: 6px 12px; border-radius: 5px; }
        .btn-st-action { background: var(--green); color: #000; border: none; padding: 0 15px; border-radius: 5px; font-weight: 900; font-size: 0.7em; cursor: pointer; }
        .btn-st-fav { background: var(--gold); color: #000; border: none; padding: 0 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .btn-st-kill { background: var(--red); color: #fff; border: none; padding: 0 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }

        .vault-container { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-top: 25px; }
        .vault-pill { display: inline-flex; align-items: center; background: #111; border: 1px solid #333; color: #eee; padding: 8px 18px; border-radius: 8px; font-size: 0.75em; margin-right: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .vault-pill:hover { border-color: var(--gold); }
        .vault-pill i { margin-left: 15px; color: var(--red); opacity: 0.4; }

        /* --- FINANCIAL TERMINAL --- */
        .fin-master-layout { display: none; grid-template-columns: 1fr 450px; gap: 30px; height: 100%; }
        .fin-master-layout.active { display: grid; }
        .fin-ops-side { overflow-y: auto; display: flex; flex-direction: column; gap: 25px; padding-right: 10px; }
        
        .rolling-display { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .roll-segment-box { background: var(--panel); border: 1px solid var(--border); padding: 25px 15px; border-radius: 12px; text-align: center; border-top: 5px solid var(--muted); transition: 0.3s; }
        .roll-segment-box.active { border-top-color: var(--green); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .roll-lbl-text { font-size: 0.6em; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 1.5px; }
        .roll-target-val { font-family: 'JetBrains Mono'; font-size: 1.4em; font-weight: 900; color: var(--gold); }

        .ledger-supreme-card { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; flex-grow: 1; min-height: 500px; overflow: hidden; }
        .ledger-supreme-top { padding: 25px 30px; border-bottom: 1px solid #1f1f23; display: flex; justify-content: space-between; align-items: center; }
        .ledger-tab-btns { display: flex; gap: 10px; }
        .btn-sup-tab { background: #161618; color: var(--muted); border: 1px solid #333; padding: 8px 18px; border-radius: 6px; font-size: 0.75em; font-weight: 800; cursor: pointer; }
        .btn-sup-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .sup-data-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .sup-data-table th { background: #111; padding: 18px; text-align: left; color: var(--muted); position: sticky; top: 0; border-bottom: 1px solid #222; }
        .sup-data-table td { padding: 18px 20px; border-bottom: 1px solid #161618; color: #f4f4f5; }
        
        .fin-analysis-side { display: flex; flex-direction: column; gap: 30px; }
        .chart-supreme-box { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 25px; height: 500px; position: relative; }
        
        .kpi-supreme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .kpi-sup-item { background: #000; border: 1px solid var(--border); padding: 20px 15px; border-radius: 10px; text-align: center; }
        .kpi-sup-item span { display: block; font-size: 0.65em; color: var(--muted); margin-bottom: 10px; font-weight: 900; letter-spacing: 1px; }
        .kpi-sup-item b { font-family: 'JetBrains Mono'; font-size: 1.3em; color: #fff; }

        .op-input-supreme { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 15px; display: flex; flex-direction: column; gap: 20px; }
        .btn-op-commit { background: var(--green); color: #000; border: none; padding: 18px; border-radius: 8px; font-weight: 950; cursor: pointer; font-size: 1em; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .btn-op-commit:hover { transform: scale(1.02); box-shadow: 0 10px 25px var(--green-glow); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-container">
            <div class="brand-logo">V19 ELITE</div>
        </div>
        <nav class="nav-scroller">
            <div class="nav-item active" id="nav-f" onclick="switchMainTab('futbol', this)">
                <i class="fa-solid fa-futbol"></i> FUTBOL
            </div>
            <div class="nav-item basket" id="nav-b" onclick="switchMainTab('basketbol', this)">
                <i class="fa-solid fa-basketball" style="color:var(--orange)"></i> BASKET
            </div>
            <div class="nav-item stream" onclick="switchMainTab('stream', this)" style="color:var(--gold); border-top:1px solid #111; margin-top:15px;">
                <i class="fa-solid fa-satellite-dish"></i> CANLI YAYIN
            </div>
            <div class="nav-item favs" onclick="switchMainTab('favs', this)" style="color:var(--red);">
                <i class="fa-solid fa-star"></i> FAVORİLERİM
            </div>
            <div class="nav-item finance" onclick="switchMainTab('finance', this)" style="color:var(--green);">
                <i class="fa-solid fa-microchip"></i> USDT FİNANS
            </div>
        </nav>
    </aside>

    <main class="main-viewport">
        <header class="top-bar">
            <div class="page-title-box">
                <h2 id="console-title">FUTBOL RADARI</h2>
            </div>
            <div class="top-wallet-box">
                <label>BAKİYE (USDT):</label>
                <b id="global-wallet">100.00</b>
            </div>
        </header>

        <section class="content-scroller">
            
            <div id="module-radar">
                <div class="radar-controls">
                    <div class="filter-panel">
                        <select id="v19-date-sel" class="supreme-select" onchange="applyRadarFilters()">
                            <option value="ALL">TÜM TARİHLER</option>
                        </select>
                        <div class="c-drop-wrapper">
                            <div class="c-drop-trigger" onclick="toggleLeagueMenu(event)">
                                <div id="c-drop-label">TÜM LİGLER</div>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                            <div class="c-drop-menu" id="c-drop-options"></div>
                        </div>
                    </div>
                    <div class="sort-switcher">
                        <button class="btn-sort active" id="btn-sort-league" onclick="setMasterSort('league')">LİG SIRALI</button>
                        <button class="btn-sort" id="btn-sort-time" onclick="setMasterSort('time')">SAAT SIRALI</button>
                    </div>
                </div>
                <div id="radar-render-target"></div>
            </div>

            <div id="module-favs" style="display:none;">
                <div id="favs-render-target"></div>
            </div>

            <div id="module-stream" style="display:none;">
                <div class="stream-layout-bar">
                    <button class="btn-lt-sel" onclick="renderStreamMatrix(1)">1</button>
                    <button class="btn-lt-sel" onclick="renderStreamMatrix(2)">2</button>
                    <button class="btn-lt-sel" onclick="renderStreamMatrix(4)">4</button>
                    <button class="btn-lt-sel active" id="lay-6-btn" onclick="renderStreamMatrix(6)">6</button>
                </div>
                <div id="stream-master-grid" class="stream-grid-master grid-lay-6 active"></div>
                <div class="vault-container">
                    <span class="roll-lbl-text">KAYITLI OPERASYON YAYINLARIM</span>
                    <div id="stream-vault-list" style="margin-top:15px;"></div>
                </div>
            </div>

            <div class="fin-master-layout" id="module-finance">
                <div class="fin-ops-side">
                    <div class="rolling-display">
                        <div class="roll-segment-box active"><span class="roll-lbl-text">1 HAFTA</span><div class="roll-target-val">$1.000</div></div>
                        <div class="roll-segment-box"><span class="roll-lbl-text">15 GÜN</span><div class="roll-target-val">$5.000</div></div>
                        <div class="roll-segment-box"><span class="roll-lbl-text">30 GÜN</span><div class="roll-target-val">$15.000</div></div>
                        <div class="roll-segment-box"><span class="roll-lbl-text">60 GÜN</span><div class="roll-target-val">$40.000</div></div>
                        <div class="roll-segment-box"><span class="roll-lbl-text">90 GÜN</span><div class="roll-target-val">$100.000</div></div>
                    </div>
                    <div class="ledger-supreme-card">
                        <div class="ledger-supreme-top">
                            <span class="ledger-title">LEDGER MASTER</span>
                            <div class="ledger-tab-btns">
                                <button class="btn-sup-tab active" id="tab-p-btn" onclick="setLedgerView('pend')">BEKLEYEN</button>
                                <button class="btn-sup-tab" id="tab-a-btn" onclick="setLedgerView('all')">TÜMÜ</button>
                            </div>
                        </div>
                        <div class="ledger-table-container">
                            <table class="sup-data-table" id="v19-ledger-table"></table>
                        </div>
                    </div>
                </div>
                <div class="fin-analysis-side">
                    <div class="chart-supreme-box"><div id="v19-apex-chart"></div></div>
                    <div class="kpi-supreme-grid">
                        <div class="kpi-sup-item"><span>AKTİF KASA</span><b id="kpi-bal">100.00</b></div>
                        <div class="kpi-sup-item"><span>NET P/L</span><b id="kpi-pnl">0.00</b></div>
                        <div class="kpi-sup-item"><span>SUCCESS %</span><b id="kpi-wr">%0</b></div>
                    </div>
                    <div class="op-input-supreme">
                        <input type="text" id="op-i-name" class="supreme-select" style="width:100%; border-color:#222;" placeholder="İŞLEM ADI">
                        <div style="display:flex; gap:12px;">
                            <input type="number" id="op-i-amt" class="supreme-select" style="flex:1; border-color:#222;" placeholder="TUTAR">
                            <input type="number" id="op-i-odds" class="supreme-select" style="flex:1; border-color:#222;" placeholder="ORAN">
                        </div>
                        <button onclick="commitNewOperation()" class="btn-op-commit">OPERASYONU BAŞLAT</button>
                        <div style="text-align:center;"><small onclick="v19_HardReset()" style="color:#222; cursor:pointer; font-weight:900;">MANUEL SIFIRLA</small></div>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script>
        /**
         * V19 SUPREME COMMAND CENTER - FINAL ARCHIVE CORE
         * Satır kısıtlaması olmadan, tüm operasyonel detaylar açıkça kodlanmıştır.
         */

        let _DB_DATA = [];
        let _LEAGUE_STATS = {};
        let _SPORT = 'futbol';
        let _TAB = 'bulletin';
        let _L_FILTER = 'ALL';
        let _SORT = 'league'; 
        let _LED_VIEW = 'pend';

        // PERSISTENT STORAGE
        let _WALLET = parseFloat(localStorage.getItem('v19_w')) || 100.00;
        let _HISTORY = JSON.parse(localStorage.getItem('v19_h')) || [100.00];
        let _PENDING = JSON.parse(localStorage.getItem('v19_p')) || [];
        let _LEDGER = JSON.parse(localStorage.getItem('v19_l')) || [];
        let _FAV_L = JSON.parse(localStorage.getItem('v19_fav_l')) || [];
        let _FAV_S = JSON.parse(localStorage.getItem('v19_fav_s')) || [];

        // LİG HİYERARŞİSİ (PUANLAMA SİSTEMİ)
        const HIERARCHY = {
            "TÜRKİYE - SÜPER LİG": 1000, 
            "İNGİLTERE - PREMIER LEAGUE": 990, 
            "İSPANYA - LA LIGA": 980,
            "ALMANYA - BUNDESLIGA": 970, 
            "İTALYA - SERIE A": 960, 
            "FRANSA - LIGUE 1": 950,
            "AVRUPA - CHAMPIONS LEAGUE": 900, 
            "AVRUPA - EUROPA LEAGUE": 890, 
            "AVRUPA - CONFERENCE LEAGUE": 880,
            "AVRUPA - EUROLEAGUE": 995, 
            "AMERİKA - NBA": 985, 
            "TÜRKİYE - BSL": 975
        };

        // --- CORE: INITIALIZATION ---
        async function v19_Initialize() {
            console.log("Supreme Terminal Syncing...");
            try {
                const r = await fetch('v19_rapor.json?v=' + Date.now());
                const j = await r.json();
                _DB_DATA = j.veriler || [];
                _LEAGUE_STATS = j.sayac || {};
                
                buildFilterMenus();
                applyRadarFilters();
                updateGlobalWalletUI();
            } catch (e) {
                console.error("Critical: Data Sync Failed.");
                document.getElementById('radar-render-target').innerHTML = "<div style='padding:100px; text-align:center; color:var(--muted); font-weight:900;'>RADAR OFFLINE - MOTORU TETİKLEYİN</div>";
            }
        }

        // --- CORE: UI & TAB CONTROL ---
        function switchMainTab(target, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            const modRadar = document.getElementById('module-radar');
            const modFavs = document.getElementById('module-favs');
            const modStream = document.getElementById('module-stream');
            const modFinance = document.getElementById('module-finance');

            modRadar.style.display = 'none';
            modFavs.style.display = 'none';
            modStream.style.display = 'none';
            modFinance.classList.remove('active');

            if(target === 'futbol' || target === 'basketbol') {
                _SPORT = target; _TAB = 'bulletin';
                modRadar.style.display = 'block';
                document.getElementById('console-title').innerText = target.toUpperCase() + " RADARI";
                buildFilterMenus(); applyRadarFilters();
            } else if(target === 'stream') {
                _TAB = 'stream';
                modStream.style.display = 'block';
                document.getElementById('console-title').innerText = "CANLI YAYIN MERKEZİ";
                if(!document.getElementById('stream-master-grid').innerHTML) renderStreamMatrix(6);
                refreshStreamVault();
            } else if(target === 'favs') {
                _TAB = 'favs';
                modFavs.style.display = 'block';
                document.getElementById('console-title').innerText = "FAVORİ ANALİZLERİM";
                applyRadarFilters();
            } else if(target === 'finance') {
                _TAB = 'finance';
                modFinance.classList.add('active');
                document.getElementById('console-title').innerText = "USDT FİNANSAL YÖNETİM";
                refreshFinanceDashboard();
                setTimeout(renderApexSupremeChart, 200);
            }
        }

        // --- CORE: MAPPING & DATES ---
        function v19_GetFlag(lName) {
            const n = lName.toUpperCase();
            if(n.includes("TÜRKİYE") || n.includes("SUPER LIG") || n.includes("BSL")) return "tr";
            if(n.includes("İNGİLTERE") || n.includes("PREMIER") || n.includes("CHAMPIONSHIP")) return "gb-eng";
            if(n.includes("İSPANYA") || n.includes("LA LIGA") || n.includes("ACB")) return "es";
            if(n.includes("ALMANYA") || n.includes("BUNDESLIGA") || n.includes("BBL")) return "de";
            if(n.includes("İTALYA") || n.includes("SERIE A") || n.includes("LEGA A")) return "it";
            if(n.includes("FRANSA") || n.includes("LIGUE 1") || n.includes("LNB PRO A")) return "fr";
            if(n.includes("AMERİKA") || n.includes("NBA") || n.includes("MLS") || n.includes("WNBA")) return "us";
            if(n.includes("AVRUPA") || n.includes("CHAMPIONS") || n.includes("EURO") || n.includes("EUROLEAGUE")) return "eu";
            if(n.includes("HOLLANDA") || n.includes("EREDIVISIE")) return "nl";
            if(n.includes("PORTEKİZ") || n.includes("PRIMEIRA")) return "pt";
            if(n.includes("BREZİLYA") || n.includes("BRAZIL")) return "br";
            if(n.includes("ARJANTİN") || n.includes("ARGENTINA")) return "ar";
            if(n.includes("RUSYA") || n.includes("VTB")) return "ru";
            return "un";
        }

        function v19_FormatDate(ds) {
            if(!ds) return "";
            const p = ds.split('-');
            const dObj = new Date(p[0], p[1] - 1, p[2]);
            const today = new Date(); today.setHours(0,0,0,0);
            const diff = Math.round((dObj - today) / (1000 * 60 * 60 * 24));
            if (diff === 0) return "BUGÜN"; if (diff === 1) return "YARIN";
            const aylar = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
            return p[2] + " " + aylar[parseInt(p[1]) - 1];
        }

        // --- RADAR: FILTER ENGINE ---
        function buildFilterMenus() {
            const dateSel = document.getElementById('v19-date-sel');
            const dropMenu = document.getElementById('c-drop-options');
            
            // Dates
            let dHtml = '<option value="ALL">TÜM TARİHLER</option>';
            const dates = [...new Set(_DB_DATA.filter(m => m.t === _SPORT).map(m => m.dt))].sort();
            dates.forEach(d => { dHtml += `<option value="${d}">${v19_FormatDate(d)}</option>`; });
            dateSel.innerHTML = dHtml;

            // Leagues (Custom Select)
            let lHtml = `<div class="c-drop-item" onclick="handleLeagueSelect('ALL', 'TÜM LİGLER')">TÜM LİGLER</div>`;
            for(let lName in _LEAGUE_STATS) {
                // Strict Basket/Futbol separation
                let isBasket = ["NBA", "EUROLEAGUE", "WNBA", "NCAA", "BSL", "LIGA ACB", "LEGA A", "LNB PRO A", "BBL", "EUROCUP", "BCL", "VTB"].some(x => lName.toUpperCase().includes(x));
                let correctSport = (_SPORT === 'basketbol' && isBasket) || (_SPORT === 'futbol' && !isBasket);
                
                if(correctSport && _LEAGUE_STATS[lName] > 0) {
                    const flag = v19_GetFlag(lName);
                    const icon = _SPORT === 'futbol' ? '⚽' : '🏀';
                    lHtml += `
                        <div class="c-drop-item" onclick="handleLeagueSelect('${lName}', this.innerHTML)">
                            <img src="https://flagcdn.com/w40/${flag}.png"> 
                            <span>${icon} ${lName} (${_LEAGUE_STATS[lName]})</span>
                        </div>
                    `;
                }
            }
            dropMenu.innerHTML = lHtml;
        }

        function toggleLeagueMenu(e) { e.stopPropagation(); const m = document.getElementById('c-drop-options'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        
        function handleLeagueSelect(val, html) {
            _L_FILTER = val;
            document.getElementById('c-drop-label').innerHTML = html;
            document.getElementById('c-drop-options').style.display = 'none';
            applyRadarFilters();
        }

        function setMasterSort(mode) {
            _SORT = mode;
            document.querySelectorAll('.btn-sort').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-sort-' + mode).classList.add('active');
            applyRadarFilters();
        }

        function applyRadarFilters() {
            const targetID = (_TAB === 'favs') ? 'favs-render-target' : 'radar-render-target';
            const area = document.getElementById(targetID);
            if(!area) return;
            
            const dateVal = document.getElementById('v19-date-sel').value;
            
            let filtered = _DB_DATA.filter(m => {
                let isBasket = ["NBA", "EUROLEAGUE", "WNBA", "NCAA", "BSL", "LIGA ACB", "LEGA A", "LNB PRO A", "BBL", "EUROCUP", "BCL", "VTB"].some(x => m.l.toUpperCase().includes(x));
                let sportCheck = (_SPORT === 'basketbol' && isBasket) || (_SPORT === 'futbol' && !isBasket);
                let dateCheck = (dateVal === 'ALL' || m.dt === dateVal);
                let leagueCheck = (_L_FILTER === 'ALL' || m.l === _L_FILTER);
                
                if(_TAB === 'favs') return _FAV_L.includes(m.l) && dateCheck;
                return sportCheck && dateCheck && leagueCheck;
            });
            
            let buffer = "";
            const days = {};
            filtered.forEach(m => { if(!days[m.dt]) days[m.dt] = []; days[m.dt].push(m); });

            Object.keys(days).sort().forEach(day => {
                buffer += `<div style="color:var(--green); font-size:0.75em; font-weight:900; padding:15px 0 5px 0; border-bottom:1px solid #1f1f23; margin-bottom:15px; letter-spacing:1px;">${v19_FormatDate(day)}</div>`;
                
                if(_SORT === 'time') {
                    // SAAT SIRALI MOD (KOMPAKT)
                    days[day].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                        const icon = _SPORT === 'futbol' ? '⚽' : '🏀';
                        buffer += `
                            <div class="match-row-box">
                                <div class="match-clock">${m.tm}</div>
                                <div class="match-teams-info">
                                    <span class="match-ico-span">${icon}</span>
                                    ${m.m} 
                                    <img src="https://flagcdn.com/w40/${v19_GetFlag(m.l)}.png" class="match-flag-img">
                                    <span class="match-league-tag">${m.l}</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    // LİG SIRALI MOD (HIYERARŞİ VE FAVORİ DESTEKLİ)
                    const groups = {};
                    days[day].forEach(m => { if(!groups[m.l]) groups[m.l] = []; groups[m.l].push(m); });

                    let sortedLigs = Object.keys(groups).sort((a,b) => {
                        // 1. Favori
                        const fA = _FAV_L.includes(a) ? 0 : 1; const fB = _FAV_L.includes(b) ? 0 : 1;
                        if(fA !== fB) return fA - fB;
                        // 2. Hiyerarşi (Puanlama)
                        const pA = HIERARCHY[a] || 0; const pB = HIERARCHY[b] || 0;
                        if(pA !== pB) return pB - pA;
                        // 3. Saat
                        let tA = groups[a].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        let tB = groups[b].reduce((min, x) => x.tm < min ? x.tm : min, "23:59");
                        return tA.localeCompare(tB);
                    });

                    sortedLigs.forEach(lig => {
                        const flag = v19_GetFlag(lig);
                        const isFav = _FAV_L.includes(lig);
                        const uid = `id_${day}_${lig.replace(/[^a-zA-Z0-9]/g, '')}`;
                        const icon = _SPORT === 'futbol' ? '⚽' : '🏀';

                        buffer += `
                            <div class="league-block">
                                <div class="league-title-bar" onclick="v19_ToggleAcc('${uid}')">
                                    <div style="display:flex; align-items:center;">
                                        <i class="fa-solid fa-star fav-star-icon ${isFav?'active':''}" onclick="toggleLeagueFav(event, '${lig}')"></i>
                                        <span style="font-size:1.2em; margin-right:12px;">${icon}</span>
                                        <span>${lig}</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down chevron"></i>
                                </div>
                                <div id="${uid}" class="league-content" style="display:block;">
                        `;

                        groups[lig].sort((a,b) => a.tm.localeCompare(b.tm)).forEach(m => {
                            buffer += `
                                <div class="match-row-box">
                                    <div class="match-clock">${m.tm}</div>
                                    <div class="match-teams-info">${m.m} <img src="https://flagcdn.com/w40/${flag}.png" class="match-flag-img"></div>
                                </div>
                            `;
                        });
                        buffer += `</div></div>`;
                    });
                }
            });
            area.innerHTML = buffer || "<div style='text-align:center; padding:50px; color:var(--muted);'>RADARDA VERİ YOK.</div>";
        }

        function toggleLeagueFav(e, l) {
            e.stopPropagation();
            if(_FAV_L.includes(l)) _FAV_L = _FAV_L.filter(x => x !== l);
            else _FAV_L.push(l);
            localStorage.setItem('v19_fav_l', JSON.stringify(_FAV_L));
            applyRadarFilters();
        }

        // --- STREAM: COMMAND CENTER ---
        function renderStreamMatrix(num) {
            const grid = document.getElementById('stream-master-grid');
            grid.className = `stream-grid-master active grid-lay-${num}`;
            grid.innerHTML = "";
            
            document.querySelectorAll('.btn-lt-sel').forEach(b => b.classList.remove('active'));
            if(num === 6) document.getElementById('lay-6-btn').classList.add('active');

            for(let i=1; i<=num; i++) {
                grid.innerHTML += `
                    <div class="stream-unit-box">
                        <div class="stream-unit-nav">
                            <input id="st-in-${i}" class="stream-unit-input" placeholder="Yayın URL...">
                            <button class="btn-st-fav" onclick="addStreamToVault(${i})"><i class="fa-solid fa-star"></i></button>
                            <button class="btn-st-kill" onclick="killStreamUnit(${i})"><i class="fa-solid fa-xmark"></i></button>
                            <button class="btn-st-action" onclick="fireStream(${i})">İZLE</button>
                        </div>
                        <iframe id="st-fr-${i}" style="flex:1; border:none; background:#000;" src="about:blank" allowfullscreen></iframe>
                    </div>
                `;
            }
        }

        function fireStream(id) {
            const url = document.getElementById('st-in-' + id).value;
            if(url) document.getElementById('st-fr-' + id).src = url;
        }

        function killStreamUnit(id) {
            document.getElementById('st-in-' + id).value = "";
            document.getElementById('st-fr-' + id).src = "about:blank";
        }

        function addStreamToVault(id) {
            const url = document.getElementById('st-in-' + id).value;
            if(url && !_FAV_S.includes(url)) {
                _FAV_S.push(url);
                localStorage.setItem('v19_fav_s', JSON.stringify(_FAV_S));
                refreshStreamVault();
            }
        }

        function refreshStreamVault() {
            const area = document.getElementById('stream-vault-list');
            area.innerHTML = _FAV_S.map(u => `
                <div class="vault-pill" onclick="loadFromVault('${u}')">
                    ${u.substring(0,30)}... 
                    <i class="fa-solid fa-trash" onclick="event.stopPropagation(); removeVaultStream('${u}')"></i>
                </div>
            `).join('');
        }

        function removeVaultStream(u) {
            _FAV_S = _FAV_S.filter(x => x !== u);
            localStorage.setItem('v19_fav_s', JSON.stringify(_FAV_S));
            refreshStreamVault();
        }

        function loadFromVault(u) {
            const inputs = document.querySelectorAll('.stream-unit-input');
            for(let i=0; i<inputs.length; i++) {
                if(!inputs[i].value) {
                    inputs[i].value = u;
                    fireStream(i+1); break;
                }
            }
        }

        // --- FINANCE: HUB & LEDGER ---
        function refreshFinanceDashboard() {
            updateGlobalWalletUI();
            
            const net = _LEDGER.reduce((s, i) => s + (i.pnl || 0), 0);
            document.getElementById('kpi-pnl').innerText = (net >= 0 ? "+" : "") + net.toFixed(2);
            document.getElementById('kpi-pnl').style.color = net >= 0 ? 'var(--green)' : 'var(--red)';

            const tot = _LEDGER.filter(x => x.res === 'win' || x.res === 'loss').length;
            const wins = _LEDGER.filter(x => x.res === 'win').length;
            document.getElementById('kpi-wr').innerText = "%" + (tot > 0 ? ((wins / tot) * 100).toFixed(1) : 0);

            renderLedgerDataTable();
        }

        function setLedgerView(mode) {
            _LED_VIEW = mode;
            document.getElementById('tab-p-btn').classList.toggle('active', mode==='pend');
            document.getElementById('tab-a-btn').classList.toggle('active', mode==='all');
            renderLedgerDataTable();
        }

        function renderLedgerDataTable() {
            const table = document.getElementById('v19-ledger-table');
            let h = `<tr><th>TARİH</th><th>OPERASYON</th><th>MİKTAR</th><th>ORAN</th><th>DURUM</th><th>P/L</th></tr>`;
            let rows = "";
            const list = _LED_VIEW === 'pend' ? _PENDING : _LEDGER;

            if(list.length === 0) {
                rows = `<tr><td colspan="6" style="text-align:center; padding:50px; color:var(--muted);">KAYIT BULUNAMADI.</td></tr>`;
            } else {
                list.forEach(item => {
                    const date = new Date(item.id).toLocaleDateString('tr-TR');
                    let status = `<span style="color:var(--muted);">BEKLEYEN</span>`;
                    if(item.res === 'win') status = `<b style="color:var(--green)">KAZANÇ</b>`;
                    if(item.res === 'loss') status = `<b style="color:var(--red)">KAYIP</b>`;

                    rows += `
                        <tr>
                            <td style="font-family:'JetBrains Mono';">${date}</td>
                            <td style="font-weight:800;">${item.name}</td>
                            <td>$${item.amt}</td>
                            <td>@${item.odds}</td>
                            <td>${status}</td>
                            <td style="font-family:'JetBrains Mono';">${item.pnl ? (item.pnl>0?'+':'')+item.pnl.toFixed(2) : '-'}</td>
                            ${_LED_VIEW === 'pend' ? `
                                <td style="text-align:right;">
                                    <button onclick="settleOp(${item.id}, 'win')" style="color:var(--green); background:none; border:none; cursor:pointer; font-weight:900; margin-right:15px;">W</button>
                                    <button onclick="settleOp(${item.id}, 'loss')" style="color:var(--red); background:none; border:none; cursor:pointer; font-weight:900;">L</button>
                                </td>
                            ` : ""}
                        </tr>
                    `;
                });
            }
            table.innerHTML = h + rows;
        }

        function commitNewOperation() {
            const n = document.getElementById('op-i-name').value;
            const a = parseFloat(document.getElementById('op-i-amt').value);
            const o = parseFloat(document.getElementById('op-i-odds').value);
            if(!n || isNaN(a) || isNaN(o)) return;

            const op = { id: Date.now(), name: n, amt: a, odds: o };
            _PENDING.push(op);
            v19_SaveDB(); refreshFinanceDashboard();
            document.getElementById('op-i-name').value = "";
            document.getElementById('op-i-amt').value = "";
            document.getElementById('op-i-odds').value = "";
        }

        function settleOp(id, res) {
            const op = _PENDING.find(x => x.id === id);
            let pnl = res === 'win' ? (op.amt * op.odds) - op.amt : -op.amt;
            _WALLET += pnl; _HISTORY.push(_WALLET);
            _LEDGER.unshift({...op, res: res, pnl: pnl, bal: _WALLET});
            _PENDING = _PENDING.filter(x => x.id !== id);
            v19_SaveDB(); refreshFinanceDashboard(); renderApexSupremeChart();
        }

        function updateGlobalWalletUI() {
            document.getElementById('top-val').innerText = _WALLET.toFixed(2) + " USDT";
            document.getElementById('global-wallet').innerText = _WALLET.toFixed(2);
            document.getElementById('kpi-bal').innerText = _WALLET.toFixed(2);
        }

        function v19_SaveDB() {
            localStorage.setItem('v19_w', _WALLET);
            localStorage.setItem('v19_h', JSON.stringify(_HISTORY));
            localStorage.setItem('v19_p', JSON.stringify(_PENDING));
            localStorage.setItem('v19_l', JSON.stringify(_LEDGER));
        }

        // --- CHART: VISUALIZER ---
        let _CHART_OBJ;
        function renderApexSupremeChart() {
            if(_CHART_OBJ) _CHART_OBJ.destroy();
            const config = {
                series: [{ name: "USDT", data: _HISTORY }],
                chart: { type: 'area', height: '100%', toolbar: { show: false }, background: 'transparent', animations: { enabled: true, speed: 600 } },
                theme: { mode: 'dark' },
                colors: [_WALLET >= _HISTORY[0] ? '#10b981' : '#ef4444'],
                stroke: { curve: 'straight', width: 3 },
                xaxis: { labels: { show: false } },
                yaxis: { opposite: true, labels: { style: { colors: '#71717a', fontSize: '10px' } } },
                grid: { borderColor: '#1f1f23', strokeDashArray: 4 }
            };
            _CHART_OBJ = new ApexCharts(document.querySelector("#v19-apex-chart"), config);
            _CHART_OBJ.render();
        }

        // --- HELPERS ---
        function v19_ToggleAcc(id) { const c = document.getElementById(id); c.style.display = c.style.display === 'none' ? 'block' : 'none'; }
        function v19_HardReset() { if(confirm("TÜM VERİLER SİLİNSİN Mİ?")) { localStorage.clear(); location.reload(); } }
        document.addEventListener('click', () => { if(document.getElementById('c-drop-options')) document.getElementById('c-drop-options').style.display='none'; });

        // BOOT
        v19_Initialize();
    </script>
</body>
</html>
