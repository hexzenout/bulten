<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 COMMAND | ELITE TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;700;900&display=swap');
        :root { --gold: #fbbf24; --green: #10b981; --bg: #050505; --panel: #0c0c0e; --border: #1f1f23; --border-light: #27272a; --text: #fff; --muted: #a1a1aa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; }
        .brand { padding: 25px 20px; font-weight: 900; font-size: 1.3em; color: var(--text); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .menu-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; transition: 0.2s; }
        .menu-btn:hover { color: #fff; }
        
        .menu-items { display: block; border-bottom: 1px solid var(--border); }
        .menu-items.collapsed { display: none; }
        
        .nav-item { padding: 15px 20px; cursor: pointer; color: var(--muted); font-weight: 700; font-size: 0.95em; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0a0a0a; transition: 0.2s; }
        .nav-item-left { display: flex; align-items: center; gap: 10px; }
        .check-box { font-size: 1.2em; color: var(--muted); transition: 0.2s; }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.03); border-left: 3px solid var(--green); }
        .nav-item.active .check-box { color: var(--green); }
        .nav-item.fav-tab.active { border-left-color: var(--gold); }
        .nav-item.canli-tab.active { border-left-color: var(--green); }
        
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #000; }
        .quota-box { background: rgba(16, 185, 129, 0.05); padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(16, 185, 129, 0.2); font-family: 'JetBrains Mono'; font-size: 0.8em; color: var(--green); }
        .content { flex-grow: 1; padding: 20px 30px; overflow-y: auto; }

        /* YAYIN EKRANI */
        .stream-grid { display: none; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; height: calc(100vh - 100px); }
        .stream-grid.active { display: grid; }
        .stream-box { background: #000; border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .stream-header { padding: 6px 10px; background: #0a0a0c; display: flex; gap: 6px; align-items: center; border-bottom: 1px solid var(--border); }
        .stream-input { flex-grow: 1; background: #050505; border: 1px solid #222; color: #fff; padding: 4px 8px; border-radius: 3px; font-size: 0.7em; font-family: 'JetBrains Mono'; }
        .stream-btn { background: var(--green); color: #000; border: none; padding: 4px 10px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 0.7em; }
        .stream-close-btn { background: #ef4444; color: #fff; border: none; padding: 4px 8px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 0.7em; }
        .stream-frame { flex-grow: 1; border: none; background: #000; }

        /* KATEGORİ VE TARİH FİLTRELERİ */
        .filter-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .tab { padding: 8px 18px; background: var(--panel); border: 1px solid var(--border); cursor: pointer; border-radius: 4px; color: var(--muted); font-weight: 800; font-size: 0.75em; text-transform: uppercase; transition: 0.2s; }
        .tab.active { background: #18181b; color: #fff; border-color: #3f3f46; }
        .tab.active.gold { border-color: var(--gold); color: var(--gold); background: rgba(251,191,36,0.05); }
        .date-btn { padding: 6px 14px; background: transparent; border: 1px solid var(--border); cursor: pointer; border-radius: 20px; color: var(--muted); font-weight: 700; font-size: 0.75em; transition: 0.2s; }
        .date-btn:hover { background: #111; }
        .date-btn.active { background: var(--green); color: #000; border-color: var(--green); }
        .filter-divider { width: 1px; height: 20px; background: var(--border); margin: 0 5px; }

        /* MACKOLİK TARZI KOMPAKT LİSTELEME */
        .league-box { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); overflow: hidden; }
        .league-trigger { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.85em; background: #0f0f12; border-bottom: 1px solid #000; }
        .league-trigger:hover { background: #18181b; }
        .league-content { display: none; background: #050505; }
        .league-content.open { display: block; }
        
        .match-row { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--border-light); font-size: 0.85em; transition: 0.1s; }
        .match-row:hover { background: #0a0a0c; }
        .match-row:last-child { border-bottom: none; }
        
        .m-time { font-family: 'JetBrains Mono'; color: var(--green); font-weight: bold; width: 60px; flex-shrink: 0; }
        .m-fav { width: 30px; color: #3f3f46; cursor: pointer; font-size: 1.1em; flex-shrink: 0; text-align: center; }
        .m-fav:hover { color: var(--muted); }
        .m-fav.active { color: var(--gold); }
        .m-teams { font-weight: 700; color: #fff; flex-grow: 1; }
        .m-alert { font-size: 0.8em; color: var(--muted); display: flex; align-items: center; gap: 5px; }
        
        .flag { width: 20px; height: 14px; object-fit: cover; border-radius: 2px; margin-right: 8px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <span>V19 TERMINAL</span>
        </div>
        <div class="menu-items" id="menu-items">
            <div class="nav-item active" id="filter-futbol" onclick="toggleSport('futbol')">
                <div class="nav-item-left"><i class="fa-solid fa-futbol"></i> Futbol</div>
                <i class="fa-solid fa-square-check check-box" id="icon-futbol"></i>
            </div>
            <div class="nav-item active" id="filter-basketbol" onclick="toggleSport('basketbol')">
                <div class="nav-item-left"><i class="fa-solid fa-basketball"></i> Basketbol</div>
                <i class="fa-solid fa-square-check check-box" id="icon-basketbol"></i>
            </div>
            <div class="nav-item fav-tab" id="nav-fav" onclick="setAppMode('favoriler', this)">
                <div class="nav-item-left"><i class="fa-solid fa-star"></i> Favoriler</div>
            </div>
            <div class="nav-item canli-tab" id="nav-canli" onclick="setAppMode('canli', this)" style="color:var(--gold)">
                <div class="nav-item-left"><i class="fa-solid fa-tv"></i> 6'LI EKRAN İZLE</div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="title" style="margin:0; font-weight:900; font-size:1.2em;">BÜLTEN RADARI</h2>
            <div class="quota-box">KOTA: <span id="quota">--</span> | <span id="scan-time">--:--</span></div>
        </div>
        <div class="content">
            <div id="bulten-view">
                <div class="filter-row">
                    <button class="tab active gold" id="cat-ALTIN" onclick="setCategory('ALTIN')">ALTIN</button>
                    <button class="tab" id="cat-GÜMÜŞ" onclick="setCategory('GÜMÜŞ')">GÜMÜŞ</button>
                    <button class="tab" id="cat-BRONZ" onclick="setCategory('BRONZ')">BRONZ</button>
                    <div class="filter-divider"></div>
                    <div id="date-filters-container" style="display: flex; gap: 8px; flex-wrap: wrap;">
                        </div>
                </div>
                
                <div id="content-area"></div>
            </div>
            
            <div class="stream-grid" id="stream-view">
                <script>
                    for(let i=1; i<=6; i++) {
                        document.write(`
                        <div class="stream-box">
                            <div class="stream-header">
                                <span style="color:var(--green); font-weight:bold; font-size:0.8em;">CH${i}</span>
                                <input type="text" class="stream-input" id="input-${i}" placeholder="Link..." oninput="handleInputClear(${i})">
                                <button class="stream-close-btn" onclick="clearStream(${i})" title="Kapat"><i class="fa-solid fa-xmark"></i></button>
                                <button class="stream-btn" onclick="loadStream(${i})">İZLE</button>
                            </div>
                            <iframe id="frame-${i}" class="stream-frame" src="about:blank" allowfullscreen></iframe>
                        </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <script>
        let activeSports = ['futbol', 'basketbol']; 
        let currentAppMode = 'bulten'; 
        let currentCategory = 'ALTIN';
        let currentDate = 'ALL'; // Tarih filtresi
        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('v19_favs_v4')) || {};

        function cleanExpiredFavorites() {
            const now = Date.now();
            let changed = false;
            for (let m in favorites) {
                if (now - favorites[m] > (24 * 60 * 60 * 1000)) { delete favorites[m]; changed = true; }
            }
            if (changed) localStorage.setItem('v19_favs_v4', JSON.stringify(favorites));
        }

        function toggleMenu() { document.getElementById('menu-items').classList.toggle('collapsed'); }
        
        // YAYIN KONTROLLERİ
        function loadStream(id) { document.getElementById(`frame-${id}`).src = document.getElementById(`input-${id}`).value || "about:blank"; }
        function handleInputClear(id) { if(document.getElementById(`input-${id}`).value.trim() === "") document.getElementById(`frame-${id}`).src = "about:blank"; }
        function clearStream(id) { document.getElementById(`input-${id}`).value = ''; document.getElementById(`frame-${id}`).src = "about:blank"; }

        function toggleSport(sport) {
            setAppMode('bulten'); 
            const el = document.getElementById('filter-' + sport);
            const icon = document.getElementById('icon-' + sport);
            if (activeSports.includes(sport)) {
                if (activeSports.length > 1) { 
                    activeSports = activeSports.filter(s => s !== sport);
                    el.classList.remove('active');
                    icon.classList.replace('fa-square-check', 'fa-square'); 
                }
            } else {
                activeSports.push(sport);
                el.classList.add('active');
                icon.classList.replace('fa-square', 'fa-square-check'); 
            }
            render();
        }

        function setAppMode(mode, el) {
            currentAppMode = mode;
            if(el) {
                document.getElementById('nav-fav').classList.remove('active');
                document.getElementById('nav-canli').classList.remove('active');
                el.classList.add('active');
            }
            if(mode === 'canli') {
                document.getElementById('bulten-view').style.display = 'none';
                document.getElementById('stream-view').classList.add('active');
            } else {
                document.getElementById('stream-view').classList.remove('active');
                document.getElementById('bulten-view').style.display = 'block';
                render();
            }
        }

        // AKILLI BAYRAK VE İSİM SÖZLÜĞÜ (İçinde geçiyorsa yakalar)
        const leagueKeywords = {
            "TÜRKİYE": ["SUPER LIG", "SÜPER LİG", "TURKEY", "1. LIG", "BSL", "TBSL"],
            "İNGİLTERE": ["PREMIER", "CHAMPIONSHIP", "ENGLAND", "FA CUP"],
            "İSPANYA": ["LA LIGA", "PRIMERA", "SPAIN", "ACB"],
            "ALMANYA": ["BUNDESLIGA", "GERMANY", "BBL"],
            "İTALYA": ["SERIE A", "ITALY", "LEGA A", "SERIE B"],
            "FRANSA": ["LIGUE 1", "FRANCE", "PRO A", "LNB"],
            "HOLLANDA": ["EREDIVISIE", "NETHERLANDS"],
            "PORTEKİZ": ["PRIMEIRA", "PORTUGAL"],
            "BREZİLYA": ["BRAZIL", "BRASILEIRO"],
            "ARJANTİN": ["ARGENTINA", "PRIMERA DIVISION"],
            "ABD": ["NBA", "WNBA", "NCAA", "MLS", "USA"],
            "AVRUPA": ["EUROLEAGUE", "EUROCUP", "CHAMPIONS LEAGUE", "EUROPA", "CONFERENCE", "BCL"]
        };
        const flagCodes = {"TÜRKİYE": "tr", "İNGİLTERE": "gb-eng", "İSPANYA": "es", "ALMANYA": "de", "İTALYA": "it", "FRANSA": "fr", "HOLLANDA": "nl", "PORTEKİZ": "pt", "BREZİLYA": "br", "ARJANTİN": "ar", "ABD": "us", "AVRUPA": "eu"};

        function getLeagueInfo(ligAdi) {
            let upperLig = ligAdi.toUpperCase();
            for (let country in leagueKeywords) {
                if (leagueKeywords[country].some(keyword => upperLig.includes(keyword))) {
                    return { n: country, f: flagCodes[country] };
                }
            }
            return { n: "DİĞER", f: "un" };
        }

        async function update() {
            try {
                const r = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const d = await r.json();
                document.getElementById('quota').innerText = d.kalan_hak || "500";
                document.getElementById('scan-time').innerText = d.son_guncelleme.split(' ')[1];
                allData = d.veriler || []; 
                cleanExpiredFavorites();
                render();
            } catch(e) {}
        }

        function setCategory(c) { 
            currentCategory = c; 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active', 'gold')); 
            const activeTab = document.getElementById('cat-' + c);
            activeTab.classList.add('active');
            if(c==='ALTIN') activeTab.classList.add('gold');
            render(); 
        }

        function setDateFilter(date) {
            currentDate = date;
            render();
        }

        function buildDateFilters(availableDates) {
            const container = document.getElementById('date-filters-container');
            container.innerHTML = `<button class="date-btn ${currentDate === 'ALL' ? 'active' : ''}" onclick="setDateFilter('ALL')">HEPSİNİ GÖSTER</button>`;
            
            const now = new Date();
            const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Istanbul' }).format(now);
            const tmrwStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Istanbul' }).format(new Date(now.getTime() + 86400000));

            availableDates.forEach(dateKey => {
                if(dateKey === "BİLİNMİYOR") return;
                let label = "";
                if(dateKey === todayStr) label = "BUGÜN";
                else if(dateKey === tmrwStr) label = "YARIN";
                else {
                    const parts = dateKey.split('-');
                    label = `${parts[2]} ${new Date(parts[0], parts[1]-1, parts[2]).toLocaleDateString('tr-TR', {month:'short'}).toUpperCase()}`;
                }
                
                container.innerHTML += `<button class="date-btn ${currentDate === dateKey ? 'active' : ''}" onclick="setDateFilter('${dateKey}')">${label}</button>`;
            });
        }

        function render() {
            const area = document.getElementById('content-area'); area.innerHTML = "";
            
            // ANA FİLTRELEME (Spor Türü ve Kategori)
            let filtered = allData.filter(m => {
                if(currentAppMode === 'favoriler') return favorites[m.mac];
                return activeSports.includes(m.tur) && m.kategori === currentCategory;
            });

            if(filtered.length === 0) { area.innerHTML = `<div style="text-align:center; padding:50px; color:#555;">Kriterlere uygun maç bulunamadı.</div>`; return; }

            // TARİHLERİ ÇIKART VE FİLTRE BUTONLARINI GÜNCELLE
            const uniqueDates = [...new Set(filtered.map(m => m.tarih))].sort();
            buildDateFilters(uniqueDates);

            // TARİH FİLTRESİ UYGULA
            if(currentDate !== 'ALL') {
                filtered = filtered.filter(m => m.tarih === currentDate);
            }

            // GÜNLERE GÖRE GRUPLA
            const days = {};
            filtered.forEach(m => {
                if(!days[m.tarih]) days[m.tarih] = [];
                days[m.tarih].push(m);
            });

            Object.keys(days).sort().forEach(dateKey => {
                // LİGLERE GÖRE GRUPLA
                const groups = {};
                days[dateKey].forEach(m => { if(!groups[m.lig]) groups[m.lig] = []; groups[m.lig].push(m); });
                
                for(let lig in groups) {
                    const info = getLeagueInfo(lig);
                    const lBox = document.createElement('div'); lBox.className = 'league-box';
                    
                    // Tarih başlığını lig satırına küçük olarak ekliyoruz (Çok daha kompakt)
                    let displayDate = dateKey;
                    if(dateKey !== "BİLİNMİYOR") {
                        const parts = dateKey.split('-');
                        displayDate = `${parts[2]}/${parts[1]}`;
                    }

                    lBox.innerHTML = `
                        <div class="league-trigger" onclick="this.nextElementSibling.classList.toggle('open')">
                            <span><img src="https://flagcdn.com/w40/${info.f}.png" class="flag"> ${info.n} - ${lig} <span style="color:var(--muted); font-size:0.8em; margin-left:10px;">[${displayDate}]</span></span>
                            <i class="fa-solid fa-chevron-down fa-xs" style="color:var(--muted)"></i>
                        </div>
                        <div class="league-content open"></div>
                    `;
                    const cont = lBox.querySelector('.league-content');
                    
                    groups[lig].sort((a,b)=>a.saat.localeCompare(b.saat)).forEach(m => {
                        const isFav = favorites[m.mac];
                        cont.innerHTML += `
                            <div class="match-row">
                                <div class="m-time">${m.saat}</div>
                                <div class="m-fav ${isFav?'active':''}" onclick="toggleFav('${m.mac}', this)"><i class="fa-${isFav?'solid':'regular'} fa-star"></i></div>
                                <div class="m-teams">${m.mac}</div>
                                <div class="m-alert"><i class="fa-solid fa-satellite-dish" style="color:var(--green)"></i> ${m.kategori}</div>
                            </div>
                        `;
                    });
                    area.appendChild(lBox);
                }
            });
        }
        
        function toggleFav(m, el) { 
            if(favorites[m]) {
                delete favorites[m];
                el.classList.remove('active');
                el.innerHTML = '<i class="fa-regular fa-star"></i>';
            } else {
                favorites[m] = Date.now();
                el.classList.add('active');
                el.innerHTML = '<i class="fa-solid fa-star"></i>';
            }
            localStorage.setItem('v19_favs_v4', JSON.stringify(favorites)); 
            if(currentAppMode === 'favoriler') render();
        }
        
        update(); setInterval(update, 15000);
    </script>
</body>
</html>
