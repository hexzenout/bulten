<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>V19 STRATEJİ MERKEZİ</title>
    <style>
        :root { --gold: #FFD700; --silver: #C0C0C0; --bg: #0a0a0a; --green: #00ff41; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid var(--green); padding-bottom: 15px; margin-bottom: 30px; text-align: center; }
        .section-title { font-size: 1.5em; margin: 20px 0; border-left: 5px solid var(--gold); padding-left: 10px; color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: #151515; border: 1px solid #333; padding: 15px; border-radius: 4px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--green); transform: scale(1.02); }
        .card.gold { border: 1px solid var(--gold); box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.1); }
        .tag { position: absolute; top: 0; right: 0; padding: 3px 10px; font-size: 0.7em; font-weight: bold; background: var(--gold); color: #000; }
        .match-info { font-weight: bold; color: var(--green); margin-bottom: 10px; }
        .alert-text { font-size: 0.9em; color: #ccc; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <h1>V19 COMMAND CENTER // LIVE RADAR</h1>
        <div id="clock">YÜKLENİYOR... LÜTFEN BEKLEYİN</div>
    </div>

    <div class="section-title">🏆 ALTIN KATEGORİ (KRİTİK LİGLER)</div>
    <div class="grid" id="gold-matches"></div>

    <div class="section-title" style="border-color: var(--silver); color: var(--silver);">🥈 GÜMÜŞ KATEGORİ</div>
    <div class="grid" id="silver-matches"></div>

    <script>
        // ARTIL GITHUB LINKI YOK. DOGRUDAN YANINDAKI DOSYAYI OKUYACAK.
        async function update() {
            try {
                // Tarayıcı önbelleğe almasın diye sonuna rastgele rakam ekliyoruz
                const res = await fetch(`v19_rapor.json?t=${Date.now()}`);
                const data = await res.json();
                document.getElementById('clock').innerText = "SON GÜNCELLEME: " + data.son_guncelleme;
                
                let goldHtml = "", silverHtml = "";
                data.veriler.forEach(m => {
                    let card = `<div class="card ${m.kategori.toLowerCase()}">
                        <div class="tag">${m.kategori}</div>
                        <div style="font-size: 0.7em; color: #888;">${m.lig.toUpperCase()}</div>
                        <div class="match-info">${m.mac}</div>
                        <div class="alert-text">${m.uyari}</div>
                    </div>`;
                    if(m.kategori === "ALTIN") goldHtml += card;
                    else silverHtml += card;
                });
                document.getElementById('gold-matches').innerHTML = goldHtml || "<p>Altın kategoride canlı fırsat yok.</p>";
                document.getElementById('silver-matches').innerHTML = silverHtml || "<p>Gümüş kategoride canlı fırsat yok.</p>";
            } catch(e) { 
                console.log("JSON henüz oluşmamış veya okunuyor..."); 
            }
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
