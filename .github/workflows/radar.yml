name: V19 İstihbarat Radarı

on:
  schedule:
    - cron: '*/15 6-23 * * *'
  workflow_dispatch:

jobs:
  operasyon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      
      - name: MOTORU ATEŞLE!
        env:
          ODDS_KEYS: ${{ secrets.ODDS_KEYS }}
          RAPID_KEYS: ${{ secrets.RAPID_KEYS }}
        run: python v19_motor.py
        
      - name: Siteyi Güncelle
        run: |
          git config --global user.name "V19-Bot"
          git config --global user.email "bot@v19.com"
          git add v19_rapor.json
          git commit -m "🚨 Radar Verileri Yenilendi" || echo "Degisiklik yok"
          git push
