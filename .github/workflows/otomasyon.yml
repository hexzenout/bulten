name: Radari Guncelle

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  tara_ve_guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Yukle
        run: pip install requests
      - name: Calistir
        env:
          ODDS_KEYS: ${{ secrets.ODDS_KEYS }}
        run: python v19_motor.py
      - name: Kaydet
        run: |
          git config --global user.name "V19-Bot"
          git config --global user.email "bot@v19.radar"
          git add v19_rapor.json
          git commit -m "📡 Otomatik Radar Taraması" || echo "No changes"
          git push
