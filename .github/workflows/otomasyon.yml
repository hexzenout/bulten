name: Radari Guncelle
on:
  schedule:
    - cron: '*/30 * * * *' # Her 30 dakikada bir otomatik çalışır
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Botu Çalıştır
        run: python bulten.py

      - name: Siteyi Güncelle
        run: |
          git config --global user.name 'RadarBot'
          git config --global user.email 'bot@radar.com'
          git add index.html
          git commit -m "Radar Terminal Guncellendi" || exit 0
          git push
